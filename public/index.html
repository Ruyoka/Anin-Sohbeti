<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anın Sohbeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 class="app-header__title">Anın Sohbeti</h1>
      <p class="app-header__subtitle">Anonim olarak sohbet et, bağ kur ve bir sonraki hikâyeye geç.</p>
    </header>

    <div id="statusBadge" class="status-badge status-badge--idle">Eşleşme bekleniyor</div>

    <section class="chat-panel" aria-live="polite">
      <div id="log" class="message-feed" role="log"></div>
      <form id="controls" class="controls" autocomplete="off">
        <label class="sr-only" for="msg">Mesaj yaz</label>
        <input id="msg" class="controls__input" placeholder="Mesaj yaz..." aria-label="Mesaj yaz" required>
        <button id="send" class="button button--primary" type="submit">Gönder</button>
        <button id="next" class="button button--secondary" type="button">Sonraki</button>
      </form>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" integrity="sha384-CTSz1McYT9whm8+AVlC1OVQoWTnx57uFD7Y1nUmkxBp4IBQ658kQP+PrpA7/lf1k" crossorigin="anonymous"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const controls = document.getElementById("controls");
    const statusBadge = document.getElementById("statusBadge");
    const nextButton = document.getElementById("next");
    const sendButton = document.getElementById("send");

    function setStatus(text, state = "idle") {
      statusBadge.textContent = text;
      statusBadge.className = `status-badge status-badge--${state}`;
    }

    function setControlsEnabled(isEnabled) {
      msg.disabled = !isEnabled;
      sendButton.disabled = !isEnabled;
      nextButton.disabled = !isEnabled;
      controls.classList.toggle("controls--disabled", !isEnabled);
    }

    setControlsEnabled(false);

    function formatTime(date) {
      return date.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
    }

    function line(text, type = "system") {
      const article = document.createElement("article");
      article.className = `message message--${type}`;

      const bubble = document.createElement("div");
      bubble.className = "message__bubble";
      bubble.textContent = text;
      article.appendChild(bubble);

      const now = new Date();

      if (type !== "system") {
        const meta = document.createElement("div");
        meta.className = "message__meta";

        const author = document.createElement("span");
        author.textContent = type === "me" ? "Sen" : "Yabancı";

        const timestamp = document.createElement("span");
        timestamp.textContent = formatTime(now);

        meta.append(author, timestamp);
        article.appendChild(meta);
      } else {
        const timestamp = document.createElement("div");
        timestamp.className = "message__meta";
        timestamp.style.justifyContent = "center";
        timestamp.textContent = formatTime(now);
        article.appendChild(timestamp);
      }

      log.appendChild(article);
      log.scrollTop = log.scrollHeight;
    }

    socket.on("connect", () => {
      setControlsEnabled(false);
      setStatus("Eşleşme bekleniyor", "idle");
      line("Eşleşme bekleniyor...", "system");
      socket.emit("join");
    });

    socket.on("matched", () => {
      setControlsEnabled(true);
      setStatus("Bir yabancıyla eşleştiniz", "active");
      line("✓ Bir yabancı ile eşleştiniz!", "system");
      msg.focus();
    });

    socket.on("message", (txt) => {
      line(txt, "stranger");
    });

    socket.on("ended", () => {
      setControlsEnabled(false);
      setStatus("Bağlantı sonlandı", "ended");
      line("— Bağlantı sonlandı.", "system");
      socket.emit("join");
      setStatus("Yeni eşleşme aranıyor", "idle");
    });

    socket.on("disconnect", () => {
      setControlsEnabled(false);
      setStatus("Bağlantı koptu", "ended");
      line("Bağlantı koptu. Yeniden bağlanmaya çalışılıyor...", "system");
    });

    controls.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!msg.value.trim()) {
        return;
      }
      socket.emit("message", msg.value);
      line(msg.value, "me");
      msg.value = "";
      msg.focus();
    });

    nextButton.addEventListener("click", () => {
      setControlsEnabled(false);
      socket.emit("next");
      socket.emit("join");
      setStatus("Yeni eşleşme aranıyor", "idle");
      line("Yeni eşleşme aranıyor...", "system");
    });

    msg.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        msg.blur();
      }
    });
  </script>
</body>
</html>
