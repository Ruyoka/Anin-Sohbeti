    function openAttachmentSheet() {
      if (!attachmentSheet || !isMatched || isAttachmentSheetOpen) {
        return;
      }
      isAttachmentSheetOpen = true;
      attachmentSheet.dataset.open = "true";
      attachmentSheet.setAttribute("aria-hidden", "false");
      lastFocusBeforeAttachment =
        document.activeElement instanceof HTMLElement ? document.activeElement : null;
      const focusTarget =
        (attachmentCameraBtn && !attachmentCameraBtn.disabled
          ? attachmentCameraBtn
          : attachmentPhotoBtn) || attachmentSheet.querySelector("button");
      if (focusTarget && typeof focusTarget.focus === "function") {
        window.requestAnimationFrame(() => {
          focusTarget.focus({ preventScroll: true });
        });
      }
    }

    function closeAttachmentSheet(options = {}) {
      if (!attachmentSheet) {
        return;
      }
      const immediate = Boolean(options.immediate);
      const restoreFocus = options.restoreFocus !== false;
      attachmentSheet.removeAttribute("data-open");
      attachmentSheet.setAttribute("aria-hidden", "true");
      const previousFocus = lastFocusBeforeAttachment;
      lastFocusBeforeAttachment = null;
      isAttachmentSheetOpen = false;
      if (restoreFocus && previousFocus && typeof previousFocus.focus === "function") {
        const delay = immediate ? 0 : 220;
        setTimeout(() => {
          previousFocus.focus({ preventScroll: true });
        }, delay);
      }
    }

    function readImageDimensions(url) {
      return new Promise((resolve) => {
        if (!url) {
          resolve(null);
          return;
        }
        const img = new Image();
        img.decoding = "async";
        img.onload = () => {
          resolve({ width: img.naturalWidth, height: img.naturalHeight });
        };
        img.onerror = () => {
          resolve(null);
        };
        img.src = url;
      });
    }

    function getRetryButton(bubble) {

    function resetRetryButtonState(bubble, disabled) {

    function handleUploadErrorPopoverPointerDown(event) {

      const target = event ? event.target : null;
      if (!target) {
        hideUploadErrorPopover();
        return;

      const anchorContainsTarget =
        activeUploadErrorAnchor &&
        typeof activeUploadErrorAnchor.contains === "function" &&
        activeUploadErrorAnchor.contains(target);
      if (
        uploadErrorPopover === target ||
        uploadErrorPopover.contains(target) ||
        anchorContainsTarget
      ) {
        return;
      }
      hideUploadErrorPopover();
    }

    function createUploadErrorPopover() {
      if (typeof document === "undefined" || !document.body) {
        return null;
      }
      const existing = document.getElementById("upload-error-popover");
      if (existing) {
        existing.hidden = true;
        existing.dataset.open = "false";
        return existing;

      const element = document.createElement("div");
      element.id = "upload-error-popover";
      element.className = "upload-error-popover";
      element.setAttribute("role", "status");
      element.setAttribute("aria-live", "polite");
      element.hidden = true;
      const textElement = document.createElement("span");
      textElement.className = "upload-error-popover__text";
      element.appendChild(textElement);

      return element;

    function showUploadErrorPopover(anchor, message) {
      if (!uploadErrorPopover || !uploadErrorPopoverText || !anchor) {
        return;
      }
      const textValue = message ? message.toString().trim() : "";
      if (!textValue) {
        hideUploadErrorPopover();
        return;
      }
      if (!document.body.contains(uploadErrorPopover)) {
        document.body.appendChild(uploadErrorPopover);
      }
      uploadErrorPopoverText.textContent = textValue;
      uploadErrorPopover.hidden = false;
      uploadErrorPopover.dataset.open = "false";
      window.requestAnimationFrame(() => {
        const anchorRect = anchor.getBoundingClientRect();
        const popRect = uploadErrorPopover.getBoundingClientRect();
        let top = anchorRect.top - popRect.height - 12;
        if (top < 12) {
          top = anchorRect.bottom + 12;
        }
        let left = anchorRect.left + anchorRect.width / 2 - popRect.width / 2;
        const maxLeft = window.innerWidth - popRect.width - 12;
        if (left < 12) {
          left = 12;
        } else if (left > maxLeft) {
          left = maxLeft;
        }
        uploadErrorPopover.style.top = `${Math.round(top)}px`;
        uploadErrorPopover.style.left = `${Math.round(left)}px`;
        uploadErrorPopover.dataset.open = "true";
      });
      if (uploadErrorPopoverTimer) {
        window.clearTimeout(uploadErrorPopoverTimer);
      }
      uploadErrorPopoverTimer = window.setTimeout(() => {
        hideUploadErrorPopover();
      }, 3800);
      activeUploadErrorAnchor = anchor;
    }

    function hideUploadErrorPopover() {
      if (!uploadErrorPopover) {
        return;
      }
      if (uploadErrorPopoverTimer) {
        window.clearTimeout(uploadErrorPopoverTimer);
        uploadErrorPopoverTimer = null;
      }
      if (uploadErrorPopover.dataset.open === "true") {
        uploadErrorPopover.dataset.open = "false";
        const element = uploadErrorPopover;
        window.setTimeout(() => {
          if (element.dataset.open !== "true") {
            element.hidden = true;
            element.style.top = "";
            element.style.left = "";
          }
        }, 180);
      } else if (!uploadErrorPopover.hidden) {
        uploadErrorPopover.hidden = true;
        uploadErrorPopover.style.top = "";
        uploadErrorPopover.style.left = "";
      }
      activeUploadErrorAnchor = null;
    }

    function describeImageUploadError(error) {
      const fallbackOverlay = "Yükleme tamamlanamadı";
      let rawMessage = "";
      if (error && typeof error === "object" && typeof error.message === "string") {
        rawMessage = error.message;
      } else if (typeof error === "string") {
        rawMessage = error;
      }
      const normalized = rawMessage.toLowerCase();

      if (
        error &&
        typeof error === "object" &&
        error.uploadResponse &&
        typeof error.uploadResponse === "object"
      ) {
        const { status, statusText, responseText } = error.uploadResponse;
        const numericStatus =
          typeof status === "number" && Number.isFinite(status)
            ? status
            : Number.parseInt(status, 10);
        const trimmedBody =
          typeof responseText === "string" ? responseText.trim() : "";
        const hasDetailedResponse =
          Number.isFinite(numericStatus) ||
          (typeof statusText === "string" && statusText.trim() !== "") ||
          trimmedBody !== "";

        if (hasDetailedResponse) {
          const statusLabel = [
            Number.isFinite(numericStatus) ? String(numericStatus) : "",
            typeof statusText === "string" ? statusText.trim() : "",
          ]
            .filter(Boolean)
            .join(" ");
          const overlayMessage = trimmedBody || statusLabel || fallbackOverlay;

          const logFragments = [];
          if (Number.isFinite(numericStatus)) {
            logFragments.push(`status ${numericStatus}`);
          }
          if (statusText) {
            logFragments.push(String(statusText));
          }
          if (trimmedBody && trimmedBody !== statusText) {
            logFragments.push(`body: ${trimmedBody}`);
          }

          return {
            overlayMessage,
            logMessage:
              logFragments.length > 0
                ? `R2 upload failed (${logFragments.join(" | ")})`
                : "R2 upload failed",
            rawMessage,
          };
        }
      }

      if (rawMessage.indexOf("presign-") === 0) {
        const statusCode = rawMessage.slice("presign-".length) || "unknown";
        let overlayMessage = "Yükleme hazırlığı başarısız";
        const leading = statusCode.charAt(0);
        if (statusCode === "503") {
          overlayMessage = "Yükleme servisi kullanılamıyor";
        } else if (leading === "4") {
          overlayMessage = "Sunucu dosyayı reddetti";
        } else if (leading === "5") {
          overlayMessage = "Yükleme servisi hata verdi";
        }
        return {
          overlayMessage,
          logMessage: `Presign request failed with status ${statusCode}`,
          rawMessage,
        };
      }

      if (rawMessage.indexOf("upload-") === 0) {
        const statusCode = rawMessage.slice("upload-".length) || "unknown";
        let overlayMessage = "Yükleme tamamlanamadı";
        const leading = statusCode.charAt(0);
        if (statusCode === "408" || statusCode === "504") {
          overlayMessage = "Zaman aşımı";
        } else if (leading === "4") {
          overlayMessage = "Sunucu dosyayı reddetti";
        }
        return {
          overlayMessage,
          logMessage: `R2 upload failed with status ${statusCode}`,
          rawMessage,
        };
      }

      if (normalized === "invalid-presign") {
        return {
          overlayMessage: "Yükleme hazırlığı başarısız",
          logMessage: "Received invalid presign payload",
          rawMessage,
        };
      }

      const isAbortError =
        error &&
        typeof error === "object" &&
        ((error.name && error.name === "AbortError") ||
          (error.cause && error.cause.name === "AbortError"));
      if (isAbortError || normalized.indexOf("timeout") !== -1) {
        const logMessage = rawMessage || "Upload timed out";
        return {
          overlayMessage: "Zaman aşımı",
          logMessage,
          rawMessage,
        };
      }

      if (error && typeof error === "object" && error.name === "TypeError" && !rawMessage) {
        return {
          overlayMessage: "Ağ hatası",
          logMessage: "Network error while uploading image",
          rawMessage,
        };
      }

      if (normalized.indexOf("network") !== -1) {
        const logMessage = rawMessage || "Network error while uploading image";
        return {
          overlayMessage: "Ağ hatası",
          logMessage,
          rawMessage,
        };
      }

      const logMessage = rawMessage || (error && typeof error === "object" && error.toString ? error.toString() : "Unknown error");
      return {
        overlayMessage: fallbackOverlay,
        logMessage,
        rawMessage,
      };
    }

    async function performImageUpload(bubble) {
      const uploadEntry = pendingImageUploads.get(bubble);
      if (!uploadEntry) {
        return;
      }

      const { file, dimensions, objectUrl, metadata } = uploadEntry;
      const uploadMetadata = metadata || prepareUploadMetadata(file);
      uploadEntry.metadata = uploadMetadata;
      let userErrorMessage = IMAGE_UPLOAD_ERROR_MESSAGE;

      resetRetryButtonState(bubble, true);
      updateImageMessageState(bubble, "uploading");
      updateImageUploadProgress(bubble, 0);

      try {
        if (!uploadEntry.loggedPreparing) {
          logUploadStep("preparing", uploadMetadata.safeFileName);
          uploadEntry.loggedPreparing = true;
        }
        logUploadStep("requesting", uploadMetadata.safeFileName);
        const presignResponse = await fetch("/api/uploads/presign", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contentType: uploadMetadata.mimeType || file.type || "image/jpeg",
            fileName: uploadMetadata.safeFileName,
            nickname,
            fileSize: uploadMetadata.size || file.size,
            originalName: uploadMetadata.originalName,
          }),
        });

        if (!presignResponse.ok) {
          let errorBody = null;
          try {
            errorBody = await presignResponse.json();
          } catch (parseError) {
            errorBody = null;
          }

          if (presignResponse.status === 413 || errorBody?.error === "file_too_large") {
            userErrorMessage = "Görsel 10 MB veya daha küçük olmalı.";
          }

          throw new Error(`presign-${presignResponse.status}`);
        }

        const presignData = await presignResponse.json();
        if (!presignData?.uploadUrl || !presignData?.assetUrl || !presignData?.key) {
          throw new Error("invalid-presign");
        }

        logUploadStep("uploading", uploadMetadata.safeFileName);
        const uploadResult = await uploadFileToR2({
          url: presignData.uploadUrl,
          file,
          contentType: presignData.contentType || uploadMetadata.mimeType || file.type,
          onProgress: (progressValue) => {
            updateImageUploadProgress(bubble, progressValue);
          },
        });

        updateImageUploadProgress(bubble, 100);

        if (uploadResult.status !== 200 && uploadResult.status !== 204) {
          throw new Error(`upload-${uploadResult.status}`);
        }

        logUploadStep("uploaded", uploadMetadata.safeFileName);

        updateImageMessageSource(bubble, presignData.assetUrl, dimensions || {});
        updateImageMessageState(bubble, "sent");
        bubble.dataset.imageUrl = presignData.assetUrl;

        socket.emit("image-message", {
          url: presignData.assetUrl,
          key: presignData.key,
          width: dimensions?.width,
          height: dimensions?.height,
          nickname,
        });

        if (objectUrl) {
          try {
            URL.revokeObjectURL(objectUrl);
          } catch (revokeError) {
            console.warn("Preview URL could not be revoked", revokeError);
          }
        }

        pendingImageUploads.delete(bubble);
        const retryButton = getRetryButton(bubble);
        if (retryButton) {
          retryButton.remove();
        }
      } catch (error) {
        logUploadStep("error", uploadMetadata.safeFileName);
        console.error("Image upload failed", {
          message: error && typeof error === "object" ? error.message : String(error),
          uploadResponse:
            error && typeof error === "object" && "uploadResponse" in error
              ? error.uploadResponse
              : undefined,
          stack: error && typeof error === "object" && error.stack ? error.stack : undefined,
        });
        const errorDetails = describeImageUploadError(error);
        updateImageMessageState(bubble, "error", {
          errorMessage: errorDetails.overlayMessage,
          errorReason: errorDetails.logMessage,
        });
        uploadEntry.loggedPreparing = false;
        const statusElement = bubble.querySelector(".message__media-status");
        if (statusElement) {
          showUploadErrorPopover(statusElement, errorDetails.overlayMessage);
        }
        console.error("Görsel yüklenemedi", errorDetails.logMessage, error);
        appendMessage(userErrorMessage, "system");
        resetRetryButtonState(bubble, false);
      }
    }

    voiceCallManager = (() => {

      const remotePulseDots = Array.from(

      );
      const ICE_SERVERS = [
        { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
      ];

      let state = "idle";
      let role = null;
      let peerConnection = null;
      let localStream = null;
      let remoteStream = null;
      let hasAddedLocalTracks = false;
      let analyserContext = null;
      let localAnalyser = null;
      let remoteAnalyser = null;
      let localSource = null;
      let remoteSource = null;
      let levelAnimationFrame = null;
      let pendingRemoteCandidates = [];
      let pendingRemoteOffer = null;
      let closeTimer = null;
      let shouldNotifyPeerOnEnd = false;

      function setStatus(text, stateKey = "connecting") {

      }

      function updateLocalLevel(level) {
        voiceCallLocalLevel?.style.setProperty("--level", level.toFixed(3));
      }

      function updateRemoteLevel(level) {
        voiceCallRemotePulse?.style.setProperty("--level", level.toFixed(3));
        remotePulseDots.forEach((dot, index) => {
          const intensity = Math.min(1, level * (0.6 + index * 0.25));
          dot.style.setProperty("--pulse-intensity", intensity.toFixed(3));
          dot.style.setProperty("--pulse-alpha", (0.28 + intensity * 0.5).toFixed(3));
        });
      }

      function resetCallUi() {
        setStatus("Bağlanıyor…", "connecting");
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        updateLocalLevel(0);
        updateRemoteLevel(0);
        updateMuteState(false, { applyTracks: false });
        voiceCallMuteBtn.disabled = true;
      }

      function ensureAnalyserContext() {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          return null;
        }
        if (!analyserContext) {
          analyserContext = new AudioContextCtor();
        }
        if (analyserContext.state === "suspended") {
          analyserContext.resume().catch(() => {});
        }
        return analyserContext;
      }

      function computeLevel(analyser) {
        if (!analyser) {
          return 0;
        }
        const length = analyser.fftSize;
        const data = new Uint8Array(length);
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < length; i += 1) {
          const value = (data[i] - 128) / 128;
          sum += value * value;
        }
        const rms = Math.sqrt(sum / length);
        return Math.min(1, rms * 2.2);
      }

      function monitorLevels() {
        const localLevel = localAnalyser ? computeLevel(localAnalyser) : 0;
        const remoteLevel = remoteAnalyser ? computeLevel(remoteAnalyser) : 0;
        updateLocalLevel(localLevel);
        updateRemoteLevel(remoteLevel);
        levelAnimationFrame = requestAnimationFrame(monitorLevels);
      }

      function startLevelMonitoring() {
        if (levelAnimationFrame) {
          cancelAnimationFrame(levelAnimationFrame);
        }
        levelAnimationFrame = requestAnimationFrame(monitorLevels);
      }

      function stopLevelMonitoring() {
        if (levelAnimationFrame) {
          cancelAnimationFrame(levelAnimationFrame);
          levelAnimationFrame = null;
        }
        if (localSource) {
          try {
            localSource.disconnect();
          } catch {
            /* noop */
          }
          localSource = null;
        }
        if (remoteSource) {
          try {
            remoteSource.disconnect();
          } catch {
            /* noop */
          }
          remoteSource = null;
        }
        localAnalyser = null;
        remoteAnalyser = null;
        updateLocalLevel(0);
        updateRemoteLevel(0);
      }

      function connectLocalAnalyser(stream) {
        const context = ensureAnalyserContext();
        if (!context) {
          return;
        }
        if (localSource) {
          try {
            localSource.disconnect();
          } catch {
            /* noop */
          }
        }
        localAnalyser = context.createAnalyser();
        localAnalyser.fftSize = 512;
        localSource = context.createMediaStreamSource(stream);
        localSource.connect(localAnalyser);
        startLevelMonitoring();
      }

      function connectRemoteAnalyser(stream) {
        const context = ensureAnalyserContext();
        if (!context) {
          return;
        }
        if (remoteSource) {
          try {
            remoteSource.disconnect();
          } catch {
            /* noop */
          }
        }
        remoteAnalyser = context.createAnalyser();
        remoteAnalyser.fftSize = 512;
        remoteSource = context.createMediaStreamSource(stream);
        remoteSource.connect(remoteAnalyser);
        startLevelMonitoring();
      }

      function updateMuteState(muted, { applyTracks = true } = {}) {
        voiceCallMuteBtn.dataset.muted = muted ? "true" : "false";
        if (voiceCallMuteLabel) {
          voiceCallMuteLabel.textContent = muted ? "Sesi Aç" : "Sesi Kapat";
        }
        if (applyTracks && localStream) {
          localStream.getAudioTracks().forEach((track) => {
            track.enabled = !muted;
          });
        }
      }

      function toggleMute() {
        const nextMuted = voiceCallMuteBtn.dataset.muted !== "true";
        updateMuteState(nextMuted);
      }

      async function ensureLocalStream() {
        if (localStream) {
          return localStream;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true },
          });
          localStream = stream;
          voiceCallMuteBtn.disabled = false;
          updateMuteState(false);
          connectLocalAnalyser(stream);
          return stream;
        } catch (error) {
          handlePermissionDenied(error);
          throw error;
        }
      }

      function handlePermissionDenied(error) {
        console.error("Mikrofon izni alınamadı:", error);
        state = "permission-denied";
        permissionDeniedActive = true;
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = false;
        }
        setStatus("Mikrofon izni gerekli. Tekrar dene.", "permission");
        voiceCallMuteBtn.disabled = true;
        stopLevelMonitoring();
        updateControls();
      }

      function finalizePermissionDenied() {
        if (!permissionDeniedActive) {
          return;
        }
        permissionDeniedActive = false;
        const previousIntent = lastIntent;
        const shouldEmitEnd = socket.connected && !hasSentEndSignal;
        if (shouldEmitEnd) {
          socket.emit("voice-call:end");
          hasSentEndSignal = true;
        }
        const infoMessage =
          previousIntent === "incoming"
            ? "Mikrofon izni vermediğin için aramaya katılamadın."
            : "Mikrofon izni verilmediği için arama iptal edildi.";
        handleEnd({ notifyPeer: false, showStatus: false });
        appendMessage(infoMessage, "system");
      }

      function createPeerConnection() {
        if (peerConnection) {
          return peerConnection;
        }
        peerConnection = new RTCPeerConnection({ iceServers: ICE_SERVERS });
        peerConnection.onicecandidate = (event) => {
          if (event.candidate && socket.connected) {
            socket.emit("voice-call:candidate", { candidate: event.candidate.toJSON() });
          }
        };
        peerConnection.ontrack = (event) => {
          const [stream] = event.streams;
          if (!stream) {
            return;
          }
          remoteStream = stream;
          if (voiceCallRemoteAudio) {
            voiceCallRemoteAudio.srcObject = stream;
            voiceCallRemoteAudio.play?.().catch(() => {});
          }
          connectRemoteAnalyser(stream);
        };
        peerConnection.onconnectionstatechange = () => {
          if (!peerConnection) {
            return;
          }
          const connectionState = peerConnection.connectionState;
          if (connectionState === "connected") {
            state = "connected";
            setStatus("Görüşme başladı", "connected");
          } else if (
            (connectionState === "failed" || connectionState === "disconnected") &&
            !isCleaningUp
          ) {
            handlePeerEnded();
          }
        };
        peerConnection.oniceconnectionstatechange = () => {
          if (!peerConnection) {
            return;
          }
          const iceState = peerConnection.iceConnectionState;
          if ((iceState === "failed" || iceState === "disconnected") && !isCleaningUp) {
            handlePeerEnded();
          }
        };
        if (localStream && !hasAddedLocalTracks) {
          addLocalTracks(peerConnection, localStream);
        }
        return peerConnection;
      }

      function addLocalTracks(pc, stream) {
        if (hasAddedLocalTracks) {
          return;
        }
        stream.getAudioTracks().forEach((track) => {
          pc.addTrack(track, stream);
        });
        hasAddedLocalTracks = true;
      }

      async function flushPendingCandidates() {
        if (!peerConnection || !peerConnection.remoteDescription) {
          return;
        }
        const candidates = [...pendingRemoteCandidates];
        pendingRemoteCandidates = [];
        for (const candidateInit of candidates) {
          try {
            await peerConnection.addIceCandidate(candidateInit);
          } catch (error) {
            console.error("ICE adayı eklenemedi:", error);
          }
        }
      }

      async function startOutgoingCall({ fromRetry = false } = {}) {
        if (!isMatched) {
          return;
        }
        if (!fromRetry && state !== "idle") {
          return;
        }
        if (fromRetry && state !== "permission-denied") {
          return;
        }
        lastIntent = "outgoing";
        if (!fromRetry) {
          resetCallUi();
          showOverlay();
        } else {
          if (voiceCallPermissionNotice) {
            voiceCallPermissionNotice.hidden = true;
          }
          setStatus("Bağlanıyor…", "connecting");
        }
        state = "requesting-stream";
        try {
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          addLocalTracks(pc, stream);
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          role = "caller";
          shouldNotifyPeerOnEnd = true;
          hasSentEndSignal = false;
          state = "awaiting-answer";
          socket.emit("voice-call:offer", { sdp: offer });
        } catch (error) {
          if (state === "permission-denied") {
            finalizePermissionDenied();
            return;
          }
          console.error("Sesli arama başlatılamadı:", error);
          handleEnd({ notifyPeer: false, showStatus: true });
        }
      }

      async function beginIncomingCall() {
        if (!pendingRemoteOffer) {
          return;
        }
        state = "requesting-stream";
        try {
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          addLocalTracks(pc, stream);
          await pc.setRemoteDescription(pendingRemoteOffer);
          pendingRemoteOffer = null;
          await flushPendingCandidates();
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          role = "callee";
          state = "connecting";
          socket.emit("voice-call:answer", { sdp: answer });
        } catch (error) {
          if (state === "permission-denied") {
            finalizePermissionDenied();
            return;
          }
          console.error("Sesli arama yanıtı gönderilemedi:", error);
          handleEnd({ notifyPeer: true, showStatus: true });
        }
      }

      async function handleOffer(payload) {
        if (!payload || !payload.sdp) {
          return;
        }
        if (!isMatched) {
          socket.emit("voice-call:end");
          return;
        }
        if (overlayVisible() && state !== "permission-denied") {
          socket.emit("voice-call:end");
          return;
        }
        pendingRemoteOffer = payload.sdp;
        lastIntent = "incoming";
        shouldNotifyPeerOnEnd = true;
        hasSentEndSignal = false;
        resetCallUi();
        showOverlay();
        state = "incoming";
        await beginIncomingCall();
      }

      async function handleAnswer(payload) {
        if (!payload || !payload.sdp) {
          return;
        }
        if (!peerConnection || role !== "caller") {
          return;
        }
        try {
          await peerConnection.setRemoteDescription(payload.sdp);
          await flushPendingCandidates();
        } catch (error) {
          console.error("Sesli arama cevabı uygulanamadı:", error);
          handleEnd({ notifyPeer: false, showStatus: true });
        }
      }

      async function handleCandidate(payload) {
        if (!payload || !payload.candidate) {
          return;
        }
        if (!peerConnection || !peerConnection.remoteDescription) {
          pendingRemoteCandidates.push(payload.candidate);
          return;
        }
        try {
          await peerConnection.addIceCandidate(payload.candidate);
        } catch (error) {
          console.error("ICE adayı eklenemedi:", error);
        }
      }

      function handleRetry() {
        if (state !== "permission-denied") {
          return;
        }
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        setStatus("Bağlanıyor…", "connecting");
        if (lastIntent === "outgoing") {
          startOutgoingCall({ fromRetry: true });
        } else if (lastIntent === "incoming") {
          beginIncomingCall();
        }
      }

      function handlePeerEnded() {
        if (isCleaningUp) {
          return;
        }
        shouldNotifyPeerOnEnd = false;
        hasSentEndSignal = true;
        setStatus("Bağlantı koptu", "ended");
        teardown({ keepOverlay: true });
        scheduleOverlayClose();
      }

      function handleEnd({ notifyPeer = true, showStatus = true } = {}) {
        if (!overlayVisible() && state === "idle" && !peerConnection) {
          hideOverlay();
          return;
        }
        const permissionBlocked = state === "permission-denied";
        if (notifyPeer && shouldNotifyPeerOnEnd && !hasSentEndSignal && socket.connected) {
          socket.emit("voice-call:end");
          hasSentEndSignal = true;
        }
        if (showStatus && !permissionBlocked) {
          setStatus("Bağlantı koptu", "ended");
        }
        const keepOverlay = showStatus && !permissionBlocked;
        teardown({ keepOverlay });
        if (showStatus && !permissionBlocked) {
          scheduleOverlayClose();
        }
      }

      function teardown({ keepOverlay = false } = {}) {
        isCleaningUp = true;
        cleanupCloseTimer();
        stopLevelMonitoring();
        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }
        if (remoteStream) {
          remoteStream.getTracks().forEach((track) => track.stop());
          remoteStream = null;
        }
        if (voiceCallRemoteAudio) {
          voiceCallRemoteAudio.srcObject = null;
        }
        if (peerConnection) {
          try {
            peerConnection.close();
          } catch {
            /* noop */
          }
        }
        if (peerConnection) {
          peerConnection.onicecandidate = null;
          peerConnection.ontrack = null;
          peerConnection.onconnectionstatechange = null;
          peerConnection.oniceconnectionstatechange = null;
        }
        peerConnection = null;
        hasAddedLocalTracks = false;
        pendingRemoteCandidates = [];
        pendingRemoteOffer = null;
        updateMuteState(false, { applyTracks: false });
        voiceCallMuteBtn.disabled = true;
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        shouldNotifyPeerOnEnd = false;
        hasSentEndSignal = false;
        role = null;
        lastIntent = null;
        state = "idle";
        permissionDeniedActive = false;
        isCleaningUp = false;
        updateControls();
        if (!keepOverlay) {
          hideOverlay();
        }
      }

      function handleMatchStateChange(isActive) {
        if (!isActive && (overlayVisible() || state !== "idle")) {
          handleEnd({ notifyPeer: true, showStatus: false });
        }
      }

      function handleDisconnect() {
        if (overlayVisible() || state !== "idle") {
          shouldNotifyPeerOnEnd = false;
          hasSentEndSignal = true;
          handleEnd({ notifyPeer: false, showStatus: false });
        }
      }

      function isBusy() {
        return overlayVisible() || state !== "idle";
      }

      voiceCallMuteBtn.addEventListener("click", () => {
        if (voiceCallMuteBtn.disabled) {
          return;
        }
        toggleMute();
      });

      voiceCallEndBtn.addEventListener("click", () => {
        const shouldShowStatus = state !== "permission-denied";
        handleEnd({ notifyPeer: true, showStatus: shouldShowStatus });
      });

      voiceCallCloseBtn?.addEventListener("click", () => {
        const shouldShowStatus = state !== "permission-denied";
        handleEnd({ notifyPeer: true, showStatus: shouldShowStatus });
      });

      voiceCallRetryBtn?.addEventListener("click", () => {
        handleRetry();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && overlayVisible()) {
          handleEnd({ notifyPeer: true, showStatus: false });
        }
      });

      return {
        startOutgoingCall,
        handleOffer,
        handleAnswer,
        handleCandidate,
        handlePeerEnded,
        handleMatchStateChange,
        handleDisconnect,
        isBusy,
      };
    })();

    callRequestOverlay?.setAttribute("aria-labelledby", "call-request-title");

    callRequestController = (() => {
      if (
        !callRequestOverlay ||
        !callRequestTitle ||
        !callRequestText ||
        !callRequestCancelBtn ||
        !callRequestAcceptBtn ||
        !callRequestRejectBtn
      ) {
        return {
          startOutgoingRequest: () => {
            startCallCooldown({ reset: true });
            socket.emit("voice-call:request");
          },
          handleIncoming: () => {
            socket.emit("voice-call:request-response", { accepted: false });
          },
          handleAccepted: () => {},
          handleRejected: (payload) => {
            if (payload?.recipientRole === "caller") {
              appendMessage("Bu kişi aramanızı reddetti.", "system");
              startCallCooldown({ reset: true });
            }
          },
          handleCancelled: () => {},
          handleError: () => {},
          handleMatchStateChange: () => {},
          handleDisconnect: () => {},
          isActive: () => false,
        };
      }

      const overlay = callRequestOverlay;
      const titleEl = callRequestTitle;
      const textEl = callRequestText;
      const countdownEl = callRequestCountdown;
      const cancelBtn = callRequestCancelBtn;
      const acceptBtn = callRequestAcceptBtn;
      const rejectBtn = callRequestRejectBtn;

      let state = "idle";
      let autoRejectTimer = null;
      let autoRejectRemaining = 0;
      let hasResponded = false;

      function isOverlayOpen() {
        return overlay.dataset.open === "true";
      }

      function openOverlay(mode) {
        overlay.dataset.mode = mode;
        overlay.hidden = false;
        overlay.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => {
          overlay.dataset.open = "true";
        });
        updateControls();
      }

      function closeOverlay() {
        overlay.dataset.open = "false";
        overlay.setAttribute("aria-hidden", "true");
        const handleTransitionEnd = (event) => {
          if (event.target !== overlay) {
            return;
          }
          overlay.removeEventListener("transitionend", handleTransitionEnd);
          if (!isOverlayOpen()) {
            overlay.hidden = true;
          }
        };
        overlay.addEventListener("transitionend", handleTransitionEnd);
        setTimeout(() => {
          if (!isOverlayOpen()) {
            overlay.hidden = true;
          }
        }, 220);
        updateControls();
      }

      function clearAutoRejectTimer() {
        if (autoRejectTimer) {
          clearInterval(autoRejectTimer);
          autoRejectTimer = null;
        }
      }

      function resetState() {
        clearAutoRejectTimer();
        hasResponded = false;
        state = "idle";
        overlay.dataset.mode = "";
        if (countdownEl) {
          countdownEl.hidden = true;
          countdownEl.textContent = "";
        }
        cancelBtn.disabled = false;
        acceptBtn.disabled = false;
        rejectBtn.disabled = false;
      }

      function closeAndResetOverlay() {
        resetState();
        closeOverlay();
      }

      function updateCountdownText() {
        if (!countdownEl) {
          return;
        }
        countdownEl.textContent = `${Math.max(autoRejectRemaining, 0)} sn içinde otomatik reddedilecek.`;
      }

      function scheduleAutoReject() {
        clearAutoRejectTimer();
        if (!countdownEl) {
          autoRejectTimer = setTimeout(() => {
            triggerAutoReject();
          }, CALL_REQUEST_TIMEOUT_SECONDS * 1000);
          return;
        }
        autoRejectRemaining = CALL_REQUEST_TIMEOUT_SECONDS;
        countdownEl.hidden = false;
        updateCountdownText();
        autoRejectTimer = setInterval(() => {
          autoRejectRemaining -= 1;
          if (autoRejectRemaining <= 0) {
            clearAutoRejectTimer();
            triggerAutoReject();
          } else {
            updateCountdownText();
          }
        }, 1000);
      }

      function sendResponse(accepted, reason) {
        if (hasResponded) {
          return;
        }
        hasResponded = true;
        clearAutoRejectTimer();
        const payload = accepted ? { accepted: true } : { accepted: false };
        if (!accepted && reason) {
          payload.reason = reason;
        }
        socket.emit("voice-call:request-response", payload);
      }

      function triggerAutoReject() {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        sendResponse(false, "timeout");
        closeAndResetOverlay();
      }

      function startOutgoingRequest() {
        if (!isMatched || state !== "idle" || voiceCallManager?.isBusy?.()) {
          return;
        }
        startCallCooldown({ reset: true });
        state = "outgoing";
        titleEl.textContent = "Arama başlatılıyor…";
        textEl.textContent = "Karşı tarafın yanıtı bekleniyor.";
        if (countdownEl) {
          countdownEl.hidden = true;
          countdownEl.textContent = "";
        }
        cancelBtn.disabled = false;
        openOverlay("outgoing");
        socket.emit("voice-call:request");
      }

      function handleIncomingRequest() {
        if (!isMatched || state !== "idle") {
          socket.emit("voice-call:request-response", { accepted: false, reason: "busy" });
          return;
        }
        if (voiceCallManager?.isBusy?.()) {
          socket.emit("voice-call:request-response", { accepted: false, reason: "busy" });
          return;
        }
        state = "incoming";
        hasResponded = false;
        titleEl.textContent = "Bu kişi sesinizi duymak istiyor.";
        textEl.textContent = "Yanıtlamak için 10 saniyen var.";
        if (countdownEl) {
          countdownEl.hidden = false;
        }
        cancelBtn.disabled = false;
        acceptBtn.disabled = false;
        rejectBtn.disabled = false;
        openOverlay("incoming");
        scheduleAutoReject();
      }

      function handleRequestAccepted() {
        if (state === "outgoing" || state === "incoming") {
          closeAndResetOverlay();
        } else {
          resetState();
        }
        updateControls();
      }

      function handleRequestRejected(payload) {
        if (state === "outgoing" || state === "incoming") {
          closeAndResetOverlay();
        } else {
          resetState();
        }
        if (payload?.recipientRole === "caller") {
          appendMessage("Bu kişi aramanızı reddetti.", "system");
          startCallCooldown({ reset: true });
        }
        updateControls();
      }

      function handleRequestCancelled() {
        if (state === "incoming" || state === "outgoing") {
          closeAndResetOverlay();
        } else {
          resetState();
          if (!isOverlayOpen()) {
            overlay.hidden = true;
            overlay.setAttribute("aria-hidden", "true");
          }
        }
        updateControls();
      }

      function handleRequestError() {
        closeAndResetOverlay();
        appendMessage("Arama başlatılamadı. Lütfen tekrar deneyin.", "system");
        updateControls();
      }

      function handleMatchStateChange(isActive) {
        if (!isActive && (state === "incoming" || state === "outgoing")) {
          closeAndResetOverlay();
        }
      }

      function handleDisconnect() {
        if (state === "incoming" || state === "outgoing") {
          closeAndResetOverlay();
        }
      }

      cancelBtn.addEventListener("click", () => {
        if (state !== "outgoing") {
          return;
        }
        cancelBtn.disabled = true;
        socket.emit("voice-call:cancel-request");
        closeAndResetOverlay();
      });

      acceptBtn.addEventListener("click", () => {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        acceptBtn.disabled = true;
        rejectBtn.disabled = true;
        sendResponse(true);
        closeAndResetOverlay();
      });

      rejectBtn.addEventListener("click", () => {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        acceptBtn.disabled = true;
        rejectBtn.disabled = true;
        sendResponse(false, "declined");
        closeAndResetOverlay();
      });

      return {
        startOutgoingRequest,
        handleIncoming: handleIncomingRequest,
        handleAccepted: handleRequestAccepted,
        handleRejected: handleRequestRejected,
        handleCancelled: handleRequestCancelled,
        handleError: handleRequestError,
        handleMatchStateChange,
        handleDisconnect,
        isActive: () => state === "incoming" || state === "outgoing",
      };
    })();

    function createMessageElement(txt, type, prefixText) {
      const bubble = document.createElement("div");
      bubble.classList.add("message", `message--${type}`);

      if (type === "stranger" || type === "me") {
        if (prefixText) {
          const prefix = document.createElement("span");
          prefix.className = "message__prefix";
          prefix.textContent = `${prefixText}:`;
          bubble.appendChild(prefix);
        }

        const content = document.createElement("span");
        content.className = "message__text";
        content.textContent = txt;
        bubble.appendChild(content);
      } else {
        bubble.textContent = txt;
      }

      return bubble;
    }

    function createImageMessageElement(options) {
      const {
        src,
        type,
        prefixText,
        state = "sent",
        width,
        height,
        altText = "Gönderilen görsel",
      } = options;

      const bubble = document.createElement("div");
      bubble.classList.add("message", `message--${type}`, "message--image");
      bubble.dataset.state = state;

      if (type === "stranger" || type === "me") {
        const finalPrefix = prefixText ? `${prefixText}:` : "";
        if (finalPrefix) {
          const prefix = document.createElement("span");
          prefix.className = "message__prefix";
          prefix.textContent = finalPrefix;
          bubble.appendChild(prefix);
        }
      }

      const trigger = document.createElement("button");
      trigger.type = "button";
      trigger.className = "message__media-trigger";
      trigger.setAttribute("aria-label", "Görseli büyüt");

      const image = document.createElement("img");
      image.decoding = "async";
      image.loading = "lazy";
      image.alt = altText;
      if (typeof width === "number" && typeof height === "number") {
        image.width = width;
        image.height = height;
      }
      image.src = src;
      trigger.appendChild(image);

      const status = document.createElement("span");
      status.className = "message__media-status";
      if (state === "error") {
        status.textContent = "Gönderilemedi";
      } else if (state === "uploading") {
        status.textContent = "Yükleniyor...";
      } else {
        status.textContent = "";
      }
      status.addEventListener("click", (event) => {
        if (!status.dataset.errorMessage) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        showUploadErrorPopover(status, status.dataset.errorMessage);
      });
      trigger.appendChild(status);

      trigger.addEventListener("click", () => {
        const targetUrl = bubble.dataset.imageUrl || src;
        if (targetUrl) {
          openImagePreview(targetUrl, { alt: image.alt });
        }
      });

      bubble.dataset.imageUrl = src;
      bubble.appendChild(trigger);

      if (type === "me") {
        const retryButton = document.createElement("button");
        retryButton.type = "button";
        retryButton.className = "message__media-retry";
        retryButton.textContent = "Retry";
        retryButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          retryImageUpload(bubble);
        });
        bubble.appendChild(retryButton);
      }

      return bubble;
    }

    function updateImageMessageState(bubble, state, options = {}) {
      if (!bubble) {
        return;
      }
      bubble.dataset.state = state;
      const status = bubble.querySelector(".message__media-status");
      if (!status) {
        return;
      }
      if (state !== "error" && activeUploadErrorAnchor && bubble.contains(activeUploadErrorAnchor)) {
        hideUploadErrorPopover();
      }
      if (state === "uploading") {
        const currentProgress = Number.parseInt(status.dataset.progress || "0", 10);
        const progressValue = Number.isFinite(currentProgress) ? currentProgress : 0;
        status.dataset.progress = String(progressValue);
        status.textContent = `Yükleniyor… %${Math.max(
          0,
          Math.min(100, Math.round(progressValue)),
        )}`;
        delete status.dataset.errorMessage;
        delete status.dataset.errorReason;
        status.removeAttribute("title");
      } else if (state === "error") {
        status.textContent = "Gönderilemedi";
        delete status.dataset.progress;
        const message = options && options.errorMessage ? options.errorMessage.toString().trim() : "";
        if (message) {
          status.dataset.errorMessage = message;
          status.title = message;
        } else {
          delete status.dataset.errorMessage;
          status.removeAttribute("title");
        }
        const reason = options && options.errorReason ? options.errorReason.toString() : "";
        if (reason) {
          status.dataset.errorReason = reason;
        } else {
          delete status.dataset.errorReason;
        }
      } else {
        status.textContent = "";
        delete status.dataset.errorMessage;
        delete status.dataset.errorReason;
        status.removeAttribute("title");
        delete status.dataset.progress;
      }
    }

    function updateImageMessageSource(bubble, src, options = {}) {
      if (!bubble) {
        return;
      }
      const trigger = bubble.querySelector(".message__media-trigger img");
      if (trigger && src) {
        trigger.src = src;
        if (options.width && options.height) {
          trigger.width = options.width;
          trigger.height = options.height;
        }
      }
      bubble.dataset.imageUrl = src;
    }

    function appendImageMessage(options) {
      const bubble = createImageMessageElement(options);
      log.appendChild(bubble);
      scrollChatToBottom();
      return bubble;
    }

    function openImagePreview(url, options = {}) {
      if (!imagePreviewOverlay || !imagePreviewElement || !url) {
        return;
      }
      imagePreviewElement.src = url;
      imagePreviewElement.alt = options.alt || "Gönderilen görsel";
      imagePreviewOverlay.hidden = false;
      imagePreviewOverlay.dataset.open = "true";
    }

    function closeImagePreview() {
      if (!imagePreviewOverlay || !imagePreviewElement) {
        return;
      }
      imagePreviewOverlay.removeAttribute("data-open");
      imagePreviewOverlay.hidden = true;
      imagePreviewElement.src = "";
    }

    function scrollChatToBottom() {
      log.scrollTop = log.scrollHeight;

      if (!mobileViewportMatcher.matches) {
        return;
      }

      window.requestAnimationFrame(() => {
        const scrollElement = document.scrollingElement || document.documentElement;
        if (!scrollElement) {
          return;
        }
        scrollElement.scrollTop = scrollElement.scrollHeight;
      });
    }

    function appendMessage(txt, type = "system", prefixText) {
      const bubble = createMessageElement(txt, type, prefixText);
      log.appendChild(bubble);
      scrollChatToBottom();
      return bubble;
    }

    function resetChat(statusText) {
      hideUploadErrorPopover();
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      hideWaitingStatus();
      setUserTypingState(false);
      hidePartnerTypingIndicator();
      closeAttachmentSheet({ immediate: true, restoreFocus: false });
      closeImagePreview();
      updateControls();
      if (statusText) {
        appendMessage(statusText, "system");
      }
    }

    function beginMatchSearch(arg) {
      const options =
        arg && typeof arg === "object"
          ? arg
          : { messagePrefix: typeof arg === "string" ? arg : MATCH_SEARCH_TEXT };

      const countdownSeconds =
        typeof options.countdownSeconds === "number"
          ? options.countdownSeconds
          : MATCH_SEARCH_COUNTDOWN_SECONDS;
      const messagePrefix = options.messagePrefix || MATCH_SEARCH_TEXT;
      const finalText = options.finalText || WAITING_STATUS_TEXT;
      const onCountdownFinished = options.onCountdownFinished;
      const countdownFormatter = options.countdownFormatter;
      const initialMessage = options.initialMessage;
      const reason = options.reason || null;

      hideWaitingStatus();
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      setMatchedState(false);
      updateControls();
      if (initialMessage) {
        appendMessage(initialMessage, "system");
      }
      startSearchCountdown(countdownSeconds, {
        prefix: messagePrefix,
        finalText,
        countdownFormatter,
        onCountdownFinished,
        reason,
      });
    }

    function showWaitingStatus(text) {
      setWaitingStatusText(text);
    }

    function beginReportCountdown(messageText) {
      const sanitizedMessage = (messageText || BLOCK_SEARCH_TEXT).toString();
      beginMatchSearch({
        countdownSeconds: MATCH_SEARCH_COUNTDOWN_SECONDS,
        messagePrefix: sanitizedMessage,
        countdownFormatter: (remainingSeconds) =>
          `${sanitizedMessage} ${Math.max(remainingSeconds, 0)}`,
        reason: "report",
        onCountdownFinished: () => {
          if (nickname) {
            socket.emit("join", getJoinPayload());
          }
        },
      });
    }

    function hideWaitingStatus() {
      clearSearchCountdown();
      shouldShowMiniGameInvitation = false;
      updateMiniGameInvitationVisibility();
      if (waitingMiniGameController) {
        waitingMiniGameController.stop({ hide: true });
      }
      if (waitingStatusBubble && waitingStatusBubble.parentNode) {
        waitingStatusBubble.remove();
      }
      waitingStatusBubble = null;
      waitingStatusMessageEl = null;
      waitingStatusInviteTextEl = null;
      waitingMiniGameContainer = null;
      waitingMiniGameStartButton = null;
      waitingMiniGameController = null;
      updateControls();
    }

    function getJoinPayload() {
      return {
        nickname,
        blockedUsers: Array.from(blockedUsers),
      };
    }

    function joinQueue() {
      if (!nickname || !socket.connected) {
        return;
      }
      beginMatchSearch({ countdownSeconds: MATCH_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("join", getJoinPayload());
    }

    function handleNicknameSubmit() {
      const isValid = updateNicknameValidity();
      const cleaned = sanitizeNickname(nicknameInput.value).slice(0, 12);
      if (!isValid) {
        nicknameInput.focus();
        return;
      }

      nickname = cleaned;
      nicknameInput.value = cleaned;
      updateNicknameValidity();
      refreshHeaderNicknameDisplay();
      sessionStorage.setItem("nickname", nickname);
      hideNicknameOverlay();
      requestNotificationPermission();
      joinQueue();
    }

    const storedNickname = sessionStorage.getItem("nickname");
    if (storedNickname) {
      const cleanedStored = sanitizeNickname(storedNickname).slice(0, 12);
      if (cleanedStored) {
        nickname = cleanedStored;
        sessionStorage.setItem("nickname", nickname);
        refreshHeaderNicknameDisplay();
        hideNicknameOverlay();
        if (nicknameInput) {
          nicknameInput.value = nickname;
          updateNicknameValidity();
        }
      } else {
        sessionStorage.removeItem("nickname");
        nickname = "";
        refreshHeaderNicknameDisplay();
        nicknameInput.value = sanitizeNickname(storedNickname).slice(0, 12);
        updateNicknameValidity({ preserveCaret: true });
        showNicknameOverlay();
      }
    } else {
      nickname = "";
      refreshHeaderNicknameDisplay();
      nicknameInput.value = "";
      updateNicknameValidity();
      showNicknameOverlay();
    }

    updateControls();
    setupNotificationPermissionWatcher();

    socket.on("connect", () => {
      setMatchedState(false);
      if (nickname) {
        joinQueue();
      } else {
        resetChat("Sohbete katılmak için bir rumuz seç.");
        showNicknameOverlay();
      }
    });

    socket.on("matched", (payload) => {
      currentPartnerId =
        payload && typeof payload === "object" && typeof payload.partnerId === "string"
          ? payload.partnerId
          : null;
      const partnerNickname =
        payload && typeof payload === "object"
          ? sanitizeNickname(payload.partnerNickname).slice(0, 50)
          : "";
      const displayNickname = partnerNickname || "YABANCI";
      currentPartnerNickname = displayNickname;
      updateReportOverlayMessage();
      const matchText = `${displayNickname} İLE EŞLEŞTİN`;
      resetChat(`✓ ${matchText}`);
      setMatchedState(true);
      playMatchSound();
      triggerChatNotification("Yeni eşleşme!", matchText);
      if (!isCoolingDown) {
        msg.focus();
      }
    });

    socket.on("waitingStatus", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? payload
          : { active: Boolean(payload), message: MATCH_SEARCH_TEXT };
      if (data.active) {
        clearSearchCountdown();
        showWaitingStatus((data.message || WAITING_STATUS_TEXT).toString());
      } else {
        if (!isSearchCountdownActive) {
          hideWaitingStatus();
        }
      }
    });

    socket.on("message", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? {
              text: (payload.text ?? "").toString(),
              nickname: (payload.nickname ?? "").toString(),
            }
          : { text: (payload ?? "").toString(), nickname: "" };

      const senderName = sanitizeNickname(data.nickname).slice(0, 50) || "YABANCI";
      hidePartnerTypingIndicator();
      appendMessage(data.text, "stranger", senderName);
      if (data.text) {
        const previewText = data.text.length > 120 ? `${data.text.slice(0, 117)}...` : data.text;
        triggerChatNotification("Yeni mesaj", `${senderName}: ${previewText}`);
      }
    });

    socket.on("image-message", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? {
              url: typeof payload.url === "string" ? payload.url : "",
              nickname: (payload.nickname ?? "").toString(),
              width: Number(payload.width),
              height: Number(payload.height),
            }
          : { url: "", nickname: "", width: null, height: null };

      if (!data.url) {
        return;
      }

      const senderName = sanitizeNickname(data.nickname).slice(0, 50) || "YABANCI";
      hidePartnerTypingIndicator();
      appendImageMessage({
        src: data.url,
        type: "stranger",
        prefixText: senderName,
        state: "sent",
        width: Number.isFinite(data.width) && data.width > 0 ? Math.round(data.width) : undefined,
        height:
          Number.isFinite(data.height) && data.height > 0
            ? Math.round(data.height)
            : undefined,
        altText: `${senderName} tarafından gönderilen görsel`,
      });

      triggerChatNotification("Yeni mesaj", `${senderName}: 📷 Fotoğraf gönderdi`);
    });

    socket.on("typing", (payload) => {
      const isTyping =
        payload && typeof payload === "object" ? Boolean(payload.isTyping) : Boolean(payload);
      if (!isMatched) {
        hidePartnerTypingIndicator();
        return;
      }
      if (isTyping) {
        showPartnerTypingIndicator();
      } else {
        hidePartnerTypingIndicator();
      }
    });

    socket.on("voice-call:request:incoming", () => {
      callRequestController?.handleIncoming?.();
    });

    socket.on("voice-call:request:accepted", (payload) => {
      callRequestController?.handleAccepted?.(payload);
      if (payload?.role === "caller") {
        voiceCallManager?.startOutgoingCall?.();
      }
    });

    socket.on("voice-call:request:rejected", (payload) => {
      callRequestController?.handleRejected?.(payload);
    });

    socket.on("voice-call:request:cancelled", (payload) => {
      callRequestController?.handleCancelled?.(payload);
    });

    socket.on("voice-call:request:error", () => {
      callRequestController?.handleError?.();
    });

    socket.on("voice-call:offer", (payload) => {
      voiceCallManager?.handleOffer?.(payload);
    });

    socket.on("voice-call:answer", (payload) => {
      voiceCallManager?.handleAnswer?.(payload);
    });

    socket.on("voice-call:candidate", (payload) => {
      voiceCallManager?.handleCandidate?.(payload);
    });

    socket.on("voice-call:ended", () => {
      voiceCallManager?.handlePeerEnded?.();
    });

    socket.on("voice-call:peer-ended", () => {
      voiceCallManager?.handlePeerEnded?.();
    });

    socket.on("reported", (payload) => {
      const message =
        payload && typeof payload === "object" && typeof payload.message === "string"
          ? payload.message
          : BLOCK_SEARCH_TEXT;
      if (searchCountdownReason !== "report") {
        beginReportCountdown(message);
      }
    });

    socket.on("report:error", () => {
      closeReportOverlay({ immediate: true });
      if (searchCountdownReason === "report" || isSearchCountdownActive) {
        resetChat("Raporlama gerçekleştirilemedi. Lütfen tekrar dene.");
      } else {
        appendMessage("Raporlama gerçekleştirilemedi. Lütfen tekrar dene.", "system");
        updateControls();
      }
    });

    socket.on("ended", () => {
      hidePartnerTypingIndicator();
      beginMatchSearch({
        countdownSeconds: DISCONNECT_SEARCH_COUNTDOWN_SECONDS,
        messagePrefix: DISCONNECT_SEARCH_MESSAGE,
        countdownFormatter: (remainingSeconds) => {
          const safeRemaining = Math.max(remainingSeconds, 0);
          const parts = [];
          for (let value = safeRemaining; value >= 1; value -= 1) {
            parts.push(value);
          }
          const suffix = parts.length ? ` ${parts.join(",")}` : "";
          return `${DISCONNECT_SEARCH_MESSAGE}${suffix}`;
        },
        onCountdownFinished: () => {
          if (nickname) {
            socket.emit("join", getJoinPayload());
          }
        },
      });
    });

    socket.on("disconnect", () => {
      setMatchedState(false);
      voiceCallManager?.handleDisconnect?.();
      callRequestController?.handleDisconnect?.();
    });

    if (callBtn) {
      callBtn.addEventListener("click", () => {
        if (callBtn.disabled) {
          return;
        }
        callRequestController?.startOutgoingRequest?.();
      });
    }

    if (attachmentButton) {
      attachmentButton.addEventListener("click", () => {
        if (attachmentButton.disabled || !isMatched) {
          return;
        }
        if (isAttachmentSheetOpen) {
          closeAttachmentSheet();
        } else {
          openAttachmentSheet();
        }
      });
    }

    if (attachmentBackdrop) {
      attachmentBackdrop.addEventListener("click", () => {
        closeAttachmentSheet();
      });
    }

    if (attachmentSheet) {
      attachmentSheet.addEventListener("keydown", (event) => {
        if (!isAttachmentSheetOpen) {
          return;
        }
        if (event.key === "Escape") {
          event.preventDefault();
          closeAttachmentSheet();
          return;
        }
        if (event.key !== "Tab") {
          return;
        }
        const focusable = Array.from(
          attachmentSheet.querySelectorAll("button:not(:disabled)") || [],
        );
        if (!focusable.length) {
          return;
        }
        const currentIndex = focusable.indexOf(document.activeElement);
        let nextIndex = currentIndex;
        if (event.shiftKey) {
          nextIndex = currentIndex <= 0 ? focusable.length - 1 : currentIndex - 1;
        } else {
          nextIndex = currentIndex === focusable.length - 1 ? 0 : currentIndex + 1;
        }
        event.preventDefault();
        focusable[nextIndex]?.focus({ preventScroll: true });
      });
    }

    if (attachmentCameraBtn) {
      attachmentCameraBtn.addEventListener("click", () => {
        if (!isMatched) {
          return;
        }
        closeAttachmentSheet({ restoreFocus: false });
        triggerAttachmentInput(cameraInput);
      });
    }

    if (attachmentPhotoBtn) {
      attachmentPhotoBtn.addEventListener("click", () => {
        if (!isMatched) {
          return;
        }
        closeAttachmentSheet({ restoreFocus: false });
        triggerAttachmentInput(photoInput);
      });
    }

    if (cameraInput) {
      cameraInput.addEventListener("change", (event) => {
        const file = event.target?.files?.[0];
        if (file) {
          handleImageFileSelection(file).catch((error) => {
            console.error("Kamera görseli gönderilemedi", error);
          });
        }
        cameraInput.value = "";
      });
    }

    if (photoInput) {
      photoInput.addEventListener("change", (event) => {
        const file = event.target?.files?.[0];
        if (file) {
          handleImageFileSelection(file).catch((error) => {
            console.error("Fotoğraf yüklenemedi", error);
          });
        }
        photoInput.value = "";
      });
    }

    if (imagePreviewOverlay) {
      imagePreviewOverlay.addEventListener("click", (event) => {
        event.preventDefault();
        closeImagePreview();
      });
    }

    if (reportBtn) {
      reportBtn.addEventListener("click", () => {
        if (reportBtn.disabled) {
          return;
        }
        openReportOverlay();
      });
    }

    if (reportCancelBtn) {
      reportCancelBtn.addEventListener("click", () => {
        closeReportOverlay();
        reportBtn?.focus({ preventScroll: true });
      });
    }

    if (reportConfirmBtn) {
      reportConfirmBtn.addEventListener("click", () => {
        if (!isMatched || !currentPartnerId) {
          closeReportOverlay({ immediate: true });
          return;
        }
        reportConfirmBtn.disabled = true;
        if (reportCancelBtn) {
          reportCancelBtn.disabled = true;
        }
        blockedUsers.add(currentPartnerId);
        persistBlockedUsers();
        beginReportCountdown(BLOCK_SEARCH_TEXT);
        socket.emit("report", { partnerId: currentPartnerId });
        closeReportOverlay();
      });
    }

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }

      if (imagePreviewOverlay && !imagePreviewOverlay.hidden) {
        event.preventDefault();
        closeImagePreview();
        return;
      }

      if (isAttachmentSheetOpen) {
        event.preventDefault();
        closeAttachmentSheet();
        return;
      }

      if (reportOverlayOpen) {
        event.preventDefault();
        closeReportOverlay();
        reportBtn?.focus({ preventScroll: true });
      }
    });

    sendBtn.onclick = () => {
      if (!isMatched || !nickname || !msg.value.trim() || isCoolingDown) return;

      const messageText = msg.value.trim().slice(0, 2000);
      socket.emit("message", { text: messageText, nickname });
      appendMessage(messageText, "me", nickname);
      msg.value = "";
      setUserTypingState(false);
      startCooldown();
      updateControls();
      msg.focus();
    };

    nextBtn.onclick = async () => {
      if (!isMatched || isSearchCountdownActive) {
        return;
      }

      const shouldSkip = await openSkipConfirmModal();

      if (!shouldSkip) {
        return;
      }

      setMatchedState(false);
      beginMatchSearch({ countdownSeconds: SKIP_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("next");
    };

    msg.addEventListener("input", () => {
      updateControls();
      const hasMessage = Boolean(msg.value.trim());
      setUserTypingState(hasMessage);
    });
    msg.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendBtn.click();
        }
      }
    });

    nicknameSubmit.addEventListener("click", handleNicknameSubmit);

    nicknameInput.addEventListener("input", () => {
      updateNicknameValidity({ preserveCaret: true });
    });

    nicknameInput.addEventListener("paste", (event) => {
      event.preventDefault();
      const pasteData =
        (event.clipboardData || window.clipboardData)?.getData("text") ?? "";
      const selectionStart = nicknameInput.selectionStart ?? nicknameInput.value.length;
      const selectionEnd = nicknameInput.selectionEnd ?? selectionStart;
      const rawValue = nicknameInput.value ?? "";
      const before = rawValue.slice(0, selectionStart);
      const after = rawValue.slice(selectionEnd);
      nicknameInput.value = `${before}${sanitizeNickname(pasteData)}${after}`;
      const caretTarget = (before + sanitizeNickname(pasteData)).length;
      nicknameInput.setSelectionRange(caretTarget, caretTarget);
      updateNicknameValidity({ preserveCaret: true });
    });

    nicknameInput.addEventListener("keydown", (event) => {
      if (!event.altKey && !event.metaKey && !event.ctrlKey && /^[0-9]$/.test(event.key)) {
        event.preventDefault();
        updateNicknameValidity({ preserveCaret: true });
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        if (!nicknameSubmit.disabled) {
          handleNicknameSubmit();
        }
      }
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/assets/sw.js", { scope: "/" })
          .catch((error) => {
            console.error("Service worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
