<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ekşi Anın Sohbeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 class="app-header__title">Ekşi Anın Sohbeti</h1>
      <p class="app-header__subtitle">Anonim olarak sohbet et, bağ kur ve bir sonraki hikâyeye geç.</p>
    </header>

    <div id="statusBadge" class="status-badge status-badge--idle">Eşleşme bekleniyor</div>

    <section class="chat-panel" aria-live="polite">
      <div id="log" class="message-feed" role="log"></div>
      <div
        id="overlayPortal"
        class="overlay-portal"
        aria-live="assertive"
        aria-atomic="true"
      ></div>
      <form id="controls" class="controls" autocomplete="off">
        <label class="sr-only" for="msg">Mesaj yaz</label>
        <input id="msg" class="controls__input" placeholder="Mesaj yaz..." aria-label="Mesaj yaz" required>
        <button id="send" class="button button--primary" type="submit" aria-label="Gönder">
          <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M3.4 20.6 21.5 12 3.4 3.4l.1 6.7 11.1 1.9-11.1 1.9z" fill="currentColor" />
          </svg>
          <span class="sr-only">Gönder</span>
        </button>
        <button id="next" class="button button--secondary" type="button" aria-label="Sonraki eşleşme">
          <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M7 5.5a1 1 0 0 1 1.6-.8l6.9 6.5a1 1 0 0 1 0 1.6l-6.9 6.5A1 1 0 0 1 7 18.5l5.6-5.2L7 8.1a1 1 0 0 1-.3-.7z" fill="currentColor" />
          </svg>
          <span class="sr-only">Sonraki</span>
        </button>
      </form>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" integrity="sha384-CTSz1McYT9whm8+AVlC1OVQoWTnx57uFD7Y1nUmkxBp4IBQ658kQP+PrpA7/lf1k" crossorigin="anonymous"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const controls = document.getElementById("controls");
    const statusBadge = document.getElementById("statusBadge");
    const nextButton = document.getElementById("next");

    const sendButton = document.getElementById("send");

    let hasPartner = false;
    let isQueued = false;
    let partnerNickname = "Yabancı";

    const overlayPortal = document.getElementById("overlayPortal");
    const chatPanel = document.querySelector(".chat-panel");
    const rootElement = document.documentElement;
    const mobileLayoutQuery = window.matchMedia("(max-width: 768px)");

    const overlayOrigins = new Map();
    const overlaySelectors = [
      "[data-overlay]",
      "[data-role=\"call-overlay\"]",
      "[data-role=\"next-overlay\"]",
      ".call-overlay",
      ".incoming-call-overlay",
      "#callOverlay",
      ".next-overlay",
      ".sonraki-overlay",
      "#nextOverlay",
    ];

    function scrollToBottom({ smooth = true } = {}) {
      const behavior = smooth && typeof log.scrollTo === "function" ? "smooth" : "auto";

      requestAnimationFrame(() => {
        if (typeof log.scrollTo === "function") {
          log.scrollTo({ top: log.scrollHeight, behavior });
        } else {
          log.scrollTop = log.scrollHeight;
        }
      });
    }

    function updateStickyMetrics() {
      if (!mobileLayoutQuery.matches) {
        rootElement.style.removeProperty("--controls-height");
        rootElement.style.removeProperty("--feed-bottom-gap");
        return;
      }

      const controlsHeight = controls?.offsetHeight || 0;
      const overlayHeight =
        overlayPortal && overlayPortal.childElementCount
          ? overlayPortal.offsetHeight
          : 0;

      rootElement.style.setProperty("--controls-height", `${controlsHeight}px`);
      rootElement.style.setProperty(
        "--feed-bottom-gap",
        `${controlsHeight + overlayHeight}px`
      );
    }

    function restoreOverlay(overlay) {
      const origin = overlayOrigins.get(overlay);
      if (!origin || !origin.parent) {
        return;
      }

      if (overlay.parentElement === origin.parent) {
        return;
      }

      if (origin.nextSibling && origin.nextSibling.parentNode === origin.parent) {
        origin.parent.insertBefore(overlay, origin.nextSibling);
        return;
      }

      origin.parent.appendChild(overlay);
    }

    function relocateOverlays() {
      if (!chatPanel || !overlayPortal) {
        updateStickyMetrics();
        return;
      }

      const overlays = new Set();
      overlaySelectors.forEach((selector) => {
        chatPanel.querySelectorAll(selector).forEach((node) => overlays.add(node));
      });

      overlayOrigins.forEach((_value, overlay) => {
        if (!document.contains(overlay)) {
          overlayOrigins.delete(overlay);
        }
      });

      let moved = false;

      overlays.forEach((overlay) => {
        if (!overlayOrigins.has(overlay)) {
          overlayOrigins.set(overlay, {
            parent: overlay.parentElement,
            nextSibling: overlay.nextElementSibling,
          });
        }

        if (mobileLayoutQuery.matches) {
          if (overlay.parentElement !== overlayPortal) {
            overlayPortal.appendChild(overlay);
            moved = true;
          }
        } else {
          restoreOverlay(overlay);
        }
      });

      overlayPortal.classList.toggle(
        "overlay-portal--active",
        mobileLayoutQuery.matches && overlayPortal.childElementCount > 0
      );

      updateStickyMetrics();

      if (moved) {
        scrollToBottom({ smooth: true });
      }
    }

    const handleLayoutChange = () => {
      relocateOverlays();
      scrollToBottom({ smooth: mobileLayoutQuery.matches });
    };

    if (typeof mobileLayoutQuery.addEventListener === "function") {
      mobileLayoutQuery.addEventListener("change", handleLayoutChange);
    } else if (typeof mobileLayoutQuery.addListener === "function") {
      mobileLayoutQuery.addListener(handleLayoutChange);
    }

    if (chatPanel) {
      const chatMutationObserver = new MutationObserver((mutations) => {
        const shouldRelocate = mutations.some((mutation) => {
          if (mutation.type !== "childList") {
            return false;
          }

          if (mutation.addedNodes.length || mutation.removedNodes.length) {
            return true;
          }

          return false;
        });

        if (shouldRelocate) {
          relocateOverlays();
        }
      });

      chatMutationObserver.observe(chatPanel, { childList: true, subtree: true });
    }

    if ("ResizeObserver" in window) {
      const resizeObserver = new ResizeObserver(() => {
        updateStickyMetrics();
      });

      resizeObserver.observe(controls);

      if (overlayPortal) {
        resizeObserver.observe(overlayPortal);
      }
    }

    window.addEventListener("resize", () => {
      updateStickyMetrics();
      relocateOverlays();
    });

    window.addEventListener("orientationchange", () => {
      updateStickyMetrics();
      relocateOverlays();
      scrollToBottom({ smooth: mobileLayoutQuery.matches });
    });

    relocateOverlays();
    scrollToBottom({ smooth: false });
    updateStickyMetrics();

    function setStatus(text, state = "idle") {
      statusBadge.textContent = text;
      statusBadge.className = `status-badge status-badge--${state}`;
    }


    function setControlsState(state) {
      if (state === "active") {
        msg.disabled = false;
        sendButton.disabled = false;
        nextButton.disabled = false;
        controls.classList.remove("controls--disabled", "controls--waiting");
        updateStickyMetrics();
        return;
      }

      msg.disabled = true;
      sendButton.disabled = true;

      if (state === "waiting") {
        nextButton.disabled = false;
        controls.classList.add("controls--waiting");
        controls.classList.remove("controls--disabled");
        updateStickyMetrics();
        return;
      }

      nextButton.disabled = true;
      controls.classList.add("controls--disabled");
      controls.classList.remove("controls--waiting");
      updateStickyMetrics();
    }

    function queueForMatch({ message, statusText = "Eşleşme bekleniyor" } = {}) {
      if (hasPartner || !socket.connected) {
        return;
      }

      if (!isQueued) {
        socket.emit("join");
        isQueued = true;
      }

      if (message) {
        line(message, "system");
      }

      setStatus(statusText, "idle");
      setControlsState("waiting");
    }

    setControlsState("locked");

    function formatTime(date) {
      return date.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
    }

    function line(text, type = "system") {
      const article = document.createElement("article");
      article.className = `message message--${type}`;

      const bubble = document.createElement("div");
      bubble.className = "message__bubble";
      bubble.textContent = text;
      article.appendChild(bubble);

      const now = new Date();

      if (type !== "system") {
        const meta = document.createElement("div");
        meta.className = "message__meta";

        const author = document.createElement("span");
        author.textContent = type === "me" ? "Sen" : partnerNickname;

        const timestamp = document.createElement("span");
        timestamp.textContent = formatTime(now);

        meta.append(author, timestamp);
        article.appendChild(meta);
      } else {
        const timestamp = document.createElement("div");
        timestamp.className = "message__meta";
        timestamp.style.justifyContent = "center";
        timestamp.textContent = formatTime(now);
        article.appendChild(timestamp);
      }

      log.appendChild(article);
      scrollToBottom({ smooth: true });
    }

    socket.on("connect", () => {
      hasPartner = false;
      isQueued = false;
      queueForMatch({ message: "Eşleşme bekleniyor..." });
    });

    socket.on("matched", (payload = {}) => {
      hasPartner = true;
      isQueued = false;
      partnerNickname = payload.nickname || "Yabancı";
      setControlsState("active");
      setStatus(`${partnerNickname} ile eşleştiniz`, "active");
      line(`✓ ${partnerNickname} ile eşleştiniz!`, "system");
      msg.focus();
    });

    socket.on("message", (txt) => {
      line(txt, "stranger");
    });

    socket.on("ended", () => {
      hasPartner = false;
      isQueued = false;
      partnerNickname = "Yabancı";
      setControlsState("waiting");
      setStatus("Bağlantı sonlandı", "ended");
      line("— Bağlantı sonlandı.", "system");
      queueForMatch({
        message: "Yeni eşleşme aranıyor...",
        statusText: "Yeni eşleşme aranıyor",
      });
    });

    socket.on("disconnect", () => {
      hasPartner = false;
      isQueued = false;
      setControlsState("locked");

      setStatus("Bağlantı koptu", "ended");
      line("Bağlantı koptu. Yeniden bağlanmaya çalışılıyor...", "system");
    });

    controls.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!hasPartner || !msg.value.trim()) {

        return;
      }
      socket.emit("message", msg.value);
      line(msg.value, "me");
      msg.value = "";
      msg.focus();
    });

    nextButton.addEventListener("click", () => {

      if (hasPartner) {
        socket.emit("next");
      }
      hasPartner = false;
      isQueued = false;
      queueForMatch({
        message: "Yeni eşleşme aranıyor...",
        statusText: "Yeni eşleşme aranıyor",
      });

    });

    msg.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        msg.blur();
      }
    });
  </script>
</body>
</html>
