<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anın Sohbeti - Anlık anonim sohbet ve yeni insanlarla tanış</title>
  <meta name="description" content="Anın Sohbeti ile rastgele insanlarla anlık olarak sohbet et. Hızlı, basit ve tamamen anonim chat deneyimi.">
  <meta name="keywords" content="anonim chat, anlık sohbet, rastgele sohbet, yeni insanlarla tanış, online chat, ekşi dertleşecek insan veritabanı">
  <meta name="application-name" content="Anın Sohbeti">

  <link rel="apple-touch-icon" sizes="57x57" href="/assets/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/assets/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/assets/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/assets/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/assets/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/assets/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/assets/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="/assets/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="manifest" href="/assets/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/assets/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">

  <meta property="og:title" content="Anın Sohbeti">
  <meta property="og:description" content="Anın Sohbeti ile anlık anonim sohbet, eşleş ve yeni insanlarla tanış.">
  <meta property="og:image" content="/assets/logo.png">
  <meta property="og:url" content="https://chat.aninfotografi.online">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Anın Sohbeti">
  <meta name="twitter:description" content="Anlık anonim sohbet, eşleş ve yeni insanlarla tanış.">
  <meta name="twitter:image" content="/assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f4f7f1;
      --bg-panel: #ffffff;
      --border-soft: #d6e4d4;
      --accent: #2f7b45;
      --accent-strong: #216238;
      --bubble-me: #ffffff;
      --bubble-stranger: #e6f5e8;
      --bubble-border: #c6dac5;
      --text-primary: #1f3324;
      --text-muted: #5f6f60;
      --system-bg: #eef4ec;
      --shadow-soft: 0 32px 62px -40px rgba(34, 72, 41, 0.55);
      --radius-lg: 28px;
      --radius-md: 20px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(196, 219, 196, 0.55), transparent 55%) var(--bg-body);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
    }

    .app-shell {
      width: min(520px, 100%);
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 64px);
      max-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    [hidden] {
      display: none !important;
    }

    .nickname-overlay {
      position: absolute;
      inset: 0;
      background: rgba(244, 247, 241, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 3;
      backdrop-filter: blur(6px);
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: rgba(20, 34, 24, 0.45);
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .modal-overlay[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    .confirm-modal {
      background: #ffffff;
      border-radius: var(--radius-md);
      box-shadow: 0 28px 60px -32px rgba(34, 72, 41, 0.45);
      padding: 28px 26px 24px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .confirm-modal p {
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text-primary);
      font-weight: 500;
    }

    .confirm-modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .confirm-modal button {
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .confirm-modal button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.2);
    }

    .confirm-cancel {
      background: #f5faf4;
      color: var(--accent);
      border-color: rgba(47, 123, 69, 0.18);
    }

    .confirm-cancel:hover,
    .confirm-cancel:focus-visible {
      background: #ebf6ea;
      transform: translateY(-1px);
    }

    .confirm-accept {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    .confirm-accept:hover,
    .confirm-accept:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    @media (min-width: 480px) {
      .confirm-modal-actions {
        flex-direction: row;
      }

      .confirm-modal-actions button {
        flex: 1;
      }
    }

    .nickname-modal {
      background: #ffffff;
      border-radius: var(--radius-md);
      box-shadow: 0 28px 60px -32px rgba(34, 72, 41, 0.45);
      padding: 28px 26px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .nickname-modal__logo {
      width: 160px;
      max-width: 70%;
      height: auto;
      margin: -6px auto 10px;
      display: block;
    }

    .nickname-modal h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .nickname-modal p {
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .nickname-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nickname-form input {
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      background: #f7fbf6;
    }

    .nickname-form input:focus {
      outline: none;
      border-color: rgba(47, 123, 69, 0.45);
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.18);
    }

    .nickname-form button {
      background: var(--accent);
      color: #ffffff;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    .nickname-form button:hover,
    .nickname-form button:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    header {
      padding: 28px 32px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(230, 243, 228, 0.75) 0%, rgba(255, 255, 255, 0) 100%);
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      margin: 10px auto 0;
      max-width: 360px;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg-panel);
    }

    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, rgba(238, 245, 235, 0.65) 0%, rgba(255, 255, 255, 0.95) 100%);
      border-top: 1px solid var(--border-soft);
      border-bottom: 1px solid var(--border-soft);
    }

    #log {
      flex: 1;
      padding: 28px 28px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      scroll-padding-bottom: 32px;
    }

    #log::-webkit-scrollbar {
      width: 6px;
    }

    #log::-webkit-scrollbar-thumb {
      background: rgba(47, 123, 69, 0.25);
      border-radius: 999px;
    }

    .message {
      max-width: 86%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: none;
    }

    .message__prefix {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .message__text {
      font-size: 16px;
    }

    .message--me {
      align-self: flex-end;
      background: var(--bubble-me);
      border: 1px solid var(--bubble-border);
      box-shadow: 0 16px 34px -28px rgba(29, 72, 42, 0.6);
    }

    .message--stranger {
      align-self: flex-start;
      background: var(--bubble-stranger);
      border: 1px solid var(--bubble-border);
    }

    .message--system {
      align-self: center;
      background: var(--system-bg);
      color: var(--text-muted);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-block;
      text-align: center;
      max-width: min(100%, 420px);
      white-space: normal;
      word-break: break-word;
      box-sizing: border-box;
      line-height: 1.5;
    }

    .message--system.waiting-status {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      text-align: center;
      padding: 18px 20px;
      border-radius: 24px;
      max-width: 100%;
      box-shadow: 0 26px 48px -34px rgba(34, 72, 41, 0.55);
    }

    .waiting-status__invite-text {
      margin: 0;
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .waiting-status__start-button {
      align-self: center;
      background: var(--accent);
      color: #ffffff;
      min-height: 0;
      padding: 10px 22px;
      font-size: 15px;
      border-radius: 999px;
      box-shadow: 0 18px 34px -28px rgba(34, 72, 41, 0.65);
    }

    .waiting-status__start-button:hover,
    .waiting-status__start-button:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .waiting-status__start-button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.2);
    }

    .waiting-status__start-button:disabled {
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .waiting-status__message {
      margin: 0;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-muted);
    }

    .waiting-mini-game {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
      background: #ffffff;
      border-radius: 18px;
      padding: 14px 16px 16px;
      border: 1px solid rgba(47, 123, 69, 0.16);
      box-shadow: 0 22px 46px -36px rgba(34, 72, 41, 0.45);
    }

    .waiting-mini-game[data-active="true"] {
      display: flex;
    }

    .waiting-mini-game__hud {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    .waiting-mini-game__hud span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .waiting-mini-game__hud-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }

    .waiting-mini-game__hud-value {
      font-size: 16px;
      color: var(--text-primary);
    }

    .waiting-mini-game__playfield {
      position: relative;
      height: 180px;
      border-radius: 16px;
      background: linear-gradient(180deg, #f7fcf6 0%, #e4f1e5 100%);
      overflow: hidden;
    }

    .waiting-mini-game__balloon {
      position: absolute;
      bottom: -120px;
      left: 0;
      width: 48px;
      height: 62px;
      transform: translate(-50%, 18%);
      border-radius: 50% 50% 45% 45%;
      background: var(--balloon-color, #ff6b6b);
      border: none;
      cursor: pointer;
      box-shadow: 0 20px 34px -28px rgba(34, 72, 41, 0.6);
      animation:
        waitingMiniGameRise
        var(--rise-duration, 6200ms)
        var(--rise-curve, cubic-bezier(0.32, 0.64, 0.45, 1))
        forwards;
      transition: transform 180ms ease, opacity 180ms ease;
      will-change: transform, opacity, bottom;
    }

    .waiting-mini-game__balloon::after {
      content: "";
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 70px;
      background: rgba(47, 123, 69, 0.28);
    }

    .waiting-mini-game__balloon--popped {
      opacity: 0;
      transform: translate(-50%, -10%) scale(0.45);
    }

    .waiting-mini-game__result {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
    }

    @keyframes waitingMiniGameRise {
      0% {
        bottom: -120px;
        transform: translate(-50%, 18%) scale(1);
      }

      65% {
        transform: translate(-50%, -4%) scale(1.04);
      }

      100% {
        bottom: calc(50% - 31px);
        transform: translate(-50%, -6%) scale(1.07);
      }
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      padding: 18px 24px calc(18px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.98);
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--border-soft);
      box-shadow: 0 -18px 40px -34px rgba(34, 72, 41, 0.55);
      z-index: 1;
    }

    #msg {
      flex: 1 1 220px;
      min-width: 0;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 16px;
      background: #f7fbf6;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    #msg:focus {
      outline: none;
      border-color: rgba(47, 123, 69, 0.45);
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.18);
    }

    button {
      min-height: 52px;
      padding: 14px 26px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    #controls button {
      flex: 0 1 132px;
      white-space: nowrap;
      min-width: 0;
    }

    #send {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    #send:not(:disabled):hover,
    #send:not(:disabled):focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    #next {
      background: #eff7ee;
      color: var(--accent);
      border: 1px solid var(--bubble-border);
    }

    #next:not(:disabled):hover,
    #next:not(:disabled):focus-visible {
      background: #e2f0e3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
        align-items: stretch;
        background: var(--bg-panel);
      }

      .app-shell {
        width: 100%;
        border-radius: 0;
        box-shadow: none;
        min-height: 100dvh;
        max-height: none;
      }

      header {
        padding: 24px 20px 12px;
      }

      header h1 {
        font-size: 24px;
      }

      #log {
        padding: 22px 18px 28px;
      }

      #controls {
        padding: 16px 18px calc(18px + env(safe-area-inset-bottom));
      }

    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 22px;
      }

      header p {
        font-size: 15px;
      }

      .message {
        max-width: 90%;
      }
    }

    @media (max-width: 767px) {
      #controls {
        flex-wrap: wrap;
        align-items: stretch;
      }

      #msg {
        flex: 1 1 auto;
      }

      #send {
        flex: 0 0 auto;
      }

      #next {
        flex: 1 1 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Ekşi Anın Sohbeti</h1>
      <p>Anlık eşleş, sohbet et ve yeni insanlarla tanış.</p>
    </header>
    <div class="nickname-overlay" id="nickname-overlay" role="dialog" aria-modal="true">
      <div class="nickname-modal">
        <img
          src="/assets/logo.png"
          alt="Anın Sohbeti logosu"
          class="nickname-modal__logo"
        >
        <h2>Rumuzunu seç</h2>
        <p>Sohbete katılmadan önce seni tanıyabileceğimiz bir rumuz belirle.</p>
        <div class="nickname-form">
          <input id="nickname" type="text" maxlength="24" autocomplete="off" placeholder="Örn. Pesimist">
          <button id="nickname-submit" type="button">Sohbete Başla</button>
        </div>
      </div>
    </div>
    <div
      id="skip-confirm-overlay"
      class="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="skip-confirm-text"
      hidden
    >
      <div class="confirm-modal">
        <p id="skip-confirm-text">Bu kişiyi geçmek istediğinize emin misin? Bak sonra bulamayabilirsin.</p>
        <div class="confirm-modal-actions">
          <button id="skip-confirm-cancel" type="button" class="confirm-cancel">Vazgeç</button>
          <button id="skip-confirm-confirm" type="button" class="confirm-accept">Devam Et</button>
        </div>
      </div>
    </div>
    <div id="chat">
      <div class="chat-window">
        <div id="log"></div>
      </div>
      <div id="controls">
        <input id="msg" placeholder="Mesaj yaz...">
        <button id="send">Gönder</button>
        <button id="next">Sonraki</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const nextBtn = document.getElementById("next");
    const nicknameOverlay = document.getElementById("nickname-overlay");
    const nicknameInput = document.getElementById("nickname");
    const nicknameSubmit = document.getElementById("nickname-submit");
    const skipConfirmOverlay = document.getElementById("skip-confirm-overlay");
    const skipConfirmCancel = document.getElementById("skip-confirm-cancel");
    const skipConfirmConfirm = document.getElementById("skip-confirm-confirm");
    const MATCH_SEARCH_TEXT = "Yeni eşleşme aranıyor...";
    const WAITING_STATUS_TEXT =
      "Şu anda herkes meşgul ya da eşleşecek kişi yok. Birisi ile eşleştiğinizde size bildirim göndereceğiz :)";
    const MATCH_SEARCH_COUNTDOWN_SECONDS = 5;
    const SKIP_SEARCH_COUNTDOWN_SECONDS = 5;
    const SUPPORTS_NOTIFICATIONS = "Notification" in window;

    let isMatched = false;
    let nickname = "";
    let isCoolingDown = false;
    let cooldownTimer = null;
    let waitingStatusBubble = null;
    let waitingStatusMessageEl = null;
    let waitingStatusInviteTextEl = null;
    let waitingMiniGameContainer = null;
    let waitingMiniGameStartButton = null;
    let waitingMiniGameController = null;
    let shouldShowMiniGameInvitation = false;
    let audioContext = null;
    let searchCountdownTimer = null;
    let searchCountdownRemaining = 0;
    let isSearchCountdownActive = false;
    let notificationsEnabled =
      SUPPORTS_NOTIFICATIONS && Notification.permission === "granted";
    let notificationPermissionWatcher = null;

    function createWaitingMiniGame(container, startButton) {
      const GAME_DURATION_SECONDS = 60;
      const EASY_STAGE_SECONDS = 30;
      const DIFFICULT_STAGE_SECONDS = GAME_DURATION_SECONDS - EASY_STAGE_SECONDS;
      const BALLOON_COLORS = [
        "#ff6b6b",
        "#f9a34d",
        "#6ecb63",
        "#4d96ff",
        "#d96bff",
      ];
      const EASY_STAGE = {
        spawnInterval: { start: [900, 1300], end: [520, 780] },
        riseDuration: { start: [5200, 6400], end: [3600, 4600] },
        maxConcurrent: { start: 5, end: 8 },
      };
      const HARD_STAGE = {
        spawnInterval: { start: [380, 600], end: [200, 320] },
        riseDuration: { start: [2600, 3200], end: [1500, 2100] },
        maxConcurrent: { start: 8, end: 14 },
      };
      const state = {
        running: false,
        spawnTimer: null,
        countdownTimer: null,
        timeLeft: GAME_DURATION_SECONDS,
        score: 0,
        startedAt: 0,
        hasSpawned: false,
      };

      const hud = document.createElement("div");
      hud.className = "waiting-mini-game__hud";

      const scoreWrapper = document.createElement("span");
      const scoreLabel = document.createElement("span");
      scoreLabel.className = "waiting-mini-game__hud-label";
      scoreLabel.textContent = "Skor";
      const scoreValue = document.createElement("strong");
      scoreValue.className = "waiting-mini-game__hud-value";
      scoreValue.textContent = "0";
      scoreWrapper.append(scoreLabel, scoreValue);

      const timerWrapper = document.createElement("span");
      const timerLabel = document.createElement("span");
      timerLabel.className = "waiting-mini-game__hud-label";
      timerLabel.textContent = "Süre";
      const timerValue = document.createElement("strong");
      timerValue.className = "waiting-mini-game__hud-value";
      timerValue.textContent = `${GAME_DURATION_SECONDS}sn`;
      timerWrapper.append(timerLabel, timerValue);

      hud.append(scoreWrapper, timerWrapper);

      const playfield = document.createElement("div");
      playfield.className = "waiting-mini-game__playfield";

      const result = document.createElement("p");
      result.className = "waiting-mini-game__result";
      result.hidden = true;

      container.append(hud, playfield, result);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeInOut(t) {
        return t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function interpolateRange(range, t) {
        const eased = easeInOut(clamp(t, 0, 1));
        return [
          lerp(range.start[0], range.end[0], eased),
          lerp(range.start[1], range.end[1], eased),
        ];
      }

      function interpolateMaxConcurrent(range, t) {
        return Math.round(lerp(range.start, range.end, easeInOut(clamp(t, 0, 1))));
      }

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function getElapsedSeconds() {
        if (!state.startedAt) {
          return 0;
        }
        return clamp((Date.now() - state.startedAt) / 1000, 0, GAME_DURATION_SECONDS);
      }

      function getDifficultySettings(elapsedSeconds) {
        if (elapsedSeconds < EASY_STAGE_SECONDS) {
          const progress = elapsedSeconds / EASY_STAGE_SECONDS;
          return {
            spawnInterval: interpolateRange(EASY_STAGE.spawnInterval, progress),
            riseDuration: interpolateRange(EASY_STAGE.riseDuration, progress),
            maxConcurrent: interpolateMaxConcurrent(EASY_STAGE.maxConcurrent, progress),
          };
        }

        const difficultElapsed = elapsedSeconds - EASY_STAGE_SECONDS;
        const difficultProgress =
          DIFFICULT_STAGE_SECONDS > 0
            ? difficultElapsed / DIFFICULT_STAGE_SECONDS
            : 1;

        return {
          spawnInterval: interpolateRange(HARD_STAGE.spawnInterval, difficultProgress),
          riseDuration: interpolateRange(HARD_STAGE.riseDuration, difficultProgress),
          maxConcurrent: interpolateMaxConcurrent(HARD_STAGE.maxConcurrent, difficultProgress),
        };
      }

      function clearTimers() {
        if (state.spawnTimer) {
          window.clearTimeout(state.spawnTimer);
          state.spawnTimer = null;
        }
        if (state.countdownTimer) {
          window.clearInterval(state.countdownTimer);
          state.countdownTimer = null;
        }
      }

      function clearBalloons() {
        playfield
          .querySelectorAll(".waiting-mini-game__balloon")
          .forEach((node) => node.remove());
      }

      function updateHud() {
        scoreValue.textContent = state.score.toString();
        timerValue.textContent = `${Math.max(0, Math.round(state.timeLeft))}sn`;
      }

      function scheduleNextSpawn(customDelay) {
        if (!state.running) {
          return;
        }
        if (state.spawnTimer) {
          window.clearTimeout(state.spawnTimer);
        }

        const elapsed = getElapsedSeconds();
        const difficulty = getDifficultySettings(elapsed);
        let delay =
          typeof customDelay === "number"
            ? customDelay
            : randomInRange(difficulty.spawnInterval[0], difficulty.spawnInterval[1]);

        const progressRatio =
          GAME_DURATION_SECONDS > 0
            ? Math.min(elapsed / GAME_DURATION_SECONDS, 1)
            : 0;
        const spawnAcceleration = 1 - progressRatio * 0.35;
        delay *= Math.max(0.45, spawnAcceleration);

        if (!state.hasSpawned) {
          delay = Math.min(delay, 1800);
        }

        state.spawnTimer = window.setTimeout(() => {
          spawnBalloon();
        }, Math.max(120, Math.round(delay)));
      }

      function spawnBalloon() {
        if (!state.running) {
          return;
        }

        const elapsed = getElapsedSeconds();
        const difficulty = getDifficultySettings(elapsed);
        if (playfield.childElementCount >= difficulty.maxConcurrent) {
          scheduleNextSpawn(160);
          return;
        }

        const balloon = document.createElement("button");
        balloon.type = "button";
        balloon.className = "waiting-mini-game__balloon";
        const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
        balloon.style.setProperty("--balloon-color", color);
        const left = 12 + Math.random() * 76;
        balloon.style.left = `${left}%`;
        const baseDuration = randomInRange(
          difficulty.riseDuration[0],
          difficulty.riseDuration[1]
        );
        const progressRatio =
          GAME_DURATION_SECONDS > 0
            ? Math.min(elapsed / GAME_DURATION_SECONDS, 1)
            : 0;
        const accelerationMultiplier = Math.max(0.55, 1 - progressRatio * 0.35);
        const adjustedDuration = Math.max(1200, baseDuration * accelerationMultiplier);
        balloon.style.setProperty(
          "--rise-duration",
          `${Math.round(adjustedDuration)}ms`
        );

        const riseCurve =
          elapsed < EASY_STAGE_SECONDS
            ? "cubic-bezier(0.35, 0.6, 0.45, 1)"
            : "cubic-bezier(0.2, 0.82, 0.38, 1)";
        balloon.style.setProperty("--rise-curve", riseCurve);

        let removed = false;
        const removeBalloon = () => {
          if (removed) {
            return;
          }
          removed = true;
          balloon.removeEventListener("animationend", handleAnimationEnd);
          balloon.removeEventListener("click", handleClick);
          if (balloon.parentNode) {
            balloon.parentNode.removeChild(balloon);
          }
        };

        const handleAnimationEnd = () => {
          removeBalloon();
        };

        const handleClick = () => {
          if (
            !state.running ||
            balloon.classList.contains("waiting-mini-game__balloon--popped")
          ) {
            return;
          }
          balloon.classList.add("waiting-mini-game__balloon--popped");
          state.score += 1;
          updateHud();
          window.setTimeout(removeBalloon, 200);
        };

        balloon.addEventListener("animationend", handleAnimationEnd);
        balloon.addEventListener("click", handleClick);

        playfield.appendChild(balloon);
        state.hasSpawned = true;

        scheduleNextSpawn();
      }

      function finishGame() {
        if (!state.running) {
          return;
        }
        state.running = false;
        clearTimers();
        clearBalloons();
        state.timeLeft = 0;
        state.hasSpawned = false;
        updateHud();
        startButton.disabled = false;
        startButton.textContent = "Başla";
        result.hidden = false;
        result.textContent = `Süren doldu! Skorun: ${state.score}`;
      }

      function start() {
        if (state.running) {
          return;
        }

        container.dataset.active = "true";
        result.hidden = true;
        result.textContent = "";
        state.running = true;
        state.score = 0;
        state.timeLeft = GAME_DURATION_SECONDS;
        state.startedAt = Date.now();
        state.hasSpawned = false;
        clearBalloons();
        updateHud();
        startButton.disabled = true;
        startButton.textContent = "Oynanıyor...";

        scheduleNextSpawn(randomInRange(280, 900));

        if (state.countdownTimer) {
          window.clearInterval(state.countdownTimer);
        }

        state.countdownTimer = window.setInterval(() => {
          if (!state.running) {
            return;
          }
          const elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
          const nextTimeLeft = Math.max(0, GAME_DURATION_SECONDS - elapsed);
          if (nextTimeLeft !== Math.round(state.timeLeft)) {
            state.timeLeft = nextTimeLeft;
            updateHud();
          }
          if (nextTimeLeft <= 0) {
            finishGame();
          }
        }, 250);
      }

      function stop({ hide = false } = {}) {
        clearTimers();
        clearBalloons();
        state.running = false;
        state.score = 0;
        state.timeLeft = GAME_DURATION_SECONDS;
        state.startedAt = 0;
        updateHud();
        result.hidden = true;
        result.textContent = "";
        startButton.disabled = false;
        startButton.textContent = "Başla";
        if (hide) {
          container.dataset.active = "false";
        } else if (!container.dataset.active) {
          container.dataset.active = "false";
        }
      }

      updateHud();
      container.dataset.active = "false";

      return {
        start,
        stop,
        finish: finishGame,
      };
    }

    function updateMiniGameInvitationVisibility() {
      const isVisible =
        shouldShowMiniGameInvitation && !isSearchCountdownActive;

      if (waitingStatusInviteTextEl) {
        waitingStatusInviteTextEl.hidden = !isVisible;
      }

      if (waitingMiniGameStartButton) {
        waitingMiniGameStartButton.hidden = !isVisible;
      }
    }

    function ensureWaitingStatusElements() {
      if (!waitingStatusBubble || !waitingStatusBubble.isConnected) {
        waitingStatusBubble = appendMessage("", "system");
      }

      if (!waitingStatusBubble) {
        return;
      }

      waitingStatusBubble.classList.add("waiting-status");

      const hasStructure = Boolean(
        waitingStatusBubble.querySelector(".waiting-status__message")
      );

      if (!hasStructure) {
        waitingStatusBubble.textContent = "";

        waitingStatusMessageEl = document.createElement("p");
        waitingStatusMessageEl.className = "waiting-status__message";

        waitingStatusInviteTextEl = document.createElement("p");
        waitingStatusInviteTextEl.className = "waiting-status__invite-text";
        waitingStatusInviteTextEl.textContent =
          "Beklerken minik bir oyun oynasan mı acaba?";

        waitingMiniGameStartButton = document.createElement("button");
        waitingMiniGameStartButton.type = "button";
        waitingMiniGameStartButton.className = "waiting-status__start-button";
        waitingMiniGameStartButton.textContent = "Başla";

        waitingMiniGameContainer = document.createElement("div");
        waitingMiniGameContainer.className = "waiting-mini-game";
        waitingMiniGameContainer.dataset.active = "false";

        waitingStatusBubble.append(
          waitingStatusMessageEl,
          waitingStatusInviteTextEl,
          waitingMiniGameStartButton,
          waitingMiniGameContainer
        );

        waitingMiniGameController = createWaitingMiniGame(
          waitingMiniGameContainer,
          waitingMiniGameStartButton
        );

        waitingMiniGameStartButton.addEventListener("click", () => {
          if (waitingMiniGameController) {
            waitingMiniGameController.start();
          }
        });
        waitingMiniGameStartButton.dataset.gameBound = "true";
        waitingMiniGameContainer.dataset.initialized = "true";
      }

      if (!waitingStatusMessageEl) {
        waitingStatusMessageEl = waitingStatusBubble.querySelector(
          ".waiting-status__message"
        );
      }

      if (!waitingStatusInviteTextEl) {
        waitingStatusInviteTextEl = waitingStatusBubble.querySelector(
          ".waiting-status__invite-text"
        );
      }

      waitingStatusBubble.dataset.waitingStatus = "true";
      waitingStatusBubble.classList.add("waiting-status");
      updateMiniGameInvitationVisibility();
    }

    function setWaitingStatusText(text) {
      if (!text) {
        return;
      }

      ensureWaitingStatusElements();

      shouldShowMiniGameInvitation = text === WAITING_STATUS_TEXT;
      updateMiniGameInvitationVisibility();

      if (waitingStatusMessageEl) {
        waitingStatusMessageEl.textContent = text;
      }
    }

    function stopSearchCountdownTimer() {
      if (searchCountdownTimer) {
        clearInterval(searchCountdownTimer);
        searchCountdownTimer = null;
      }
    }

    function clearSearchCountdown() {
      stopSearchCountdownTimer();
      searchCountdownRemaining = 0;
      if (isSearchCountdownActive) {
        isSearchCountdownActive = false;
        updateControls();
      }
      updateMiniGameInvitationVisibility();
    }

    function startSearchCountdown(
      seconds,
      {
        prefix = MATCH_SEARCH_TEXT,
        finalText = WAITING_STATUS_TEXT,
        countdownFormatter,
        onCountdownFinished,
      } = {}
    ) {
      clearSearchCountdown();

      if (seconds <= 0) {
        setWaitingStatusText(finalText);
        return;
      }

      const formatCountdown =
        typeof countdownFormatter === "function"
          ? countdownFormatter
          : (value) => `${prefix} ${value}`;

      isSearchCountdownActive = true;
      searchCountdownRemaining = seconds;
      setWaitingStatusText(formatCountdown(searchCountdownRemaining));
      updateControls();
      updateMiniGameInvitationVisibility();

      searchCountdownTimer = window.setInterval(() => {
        searchCountdownRemaining -= 1;
        if (searchCountdownRemaining >= 0) {
          setWaitingStatusText(formatCountdown(searchCountdownRemaining));
        }

        if (searchCountdownRemaining > 0) {
          return;
        }

        stopSearchCountdownTimer();
        searchCountdownRemaining = 0;
        isSearchCountdownActive = false;
        updateControls();
        updateMiniGameInvitationVisibility();

        if (typeof onCountdownFinished === "function") {
          onCountdownFinished();
        }

        if (finalText) {
          requestAnimationFrame(() => {
            setWaitingStatusText(finalText);
          });
        }
      }, 1000);
    }

    function updateNotificationState(permissionState) {
      notificationsEnabled = permissionState === "granted";
    }

    async function setupNotificationPermissionWatcher() {
      if (!SUPPORTS_NOTIFICATIONS || !navigator.permissions?.query) {
        return;
      }

      try {
        notificationPermissionWatcher = await navigator.permissions.query({ name: "notifications" });
        updateNotificationState(notificationPermissionWatcher.state);
        notificationPermissionWatcher.onchange = () => {
          updateNotificationState(notificationPermissionWatcher.state);
        };
      } catch (error) {
        // Tarayıcı izin sorgusunu desteklemiyorsa sessizce devam et.
      }
    }

    function openSkipConfirmModal() {
      if (!skipConfirmOverlay || !skipConfirmCancel || !skipConfirmConfirm) {
        return Promise.resolve(false);
      }

      if (skipConfirmOverlay.dataset.open === "true") {
        return Promise.resolve(false);
      }

      return new Promise((resolve) => {
        const previouslyFocused = document.activeElement;

        const restoreFocus = () => {
          if (previouslyFocused && typeof previouslyFocused.focus === "function") {
            try {
              previouslyFocused.focus({ preventScroll: true });
            } catch (error) {
              previouslyFocused.focus();
            }
          }
        };

        const cleanup = () => {
          document.removeEventListener("keydown", handleKeydown);
          skipConfirmOverlay.removeEventListener("click", handleOverlayClick);
          skipConfirmCancel.removeEventListener("click", handleCancel);
          skipConfirmConfirm.removeEventListener("click", handleConfirm);
          delete skipConfirmOverlay.dataset.open;
          skipConfirmOverlay.setAttribute("aria-hidden", "true");
          skipConfirmOverlay.setAttribute("hidden", "");
        };

        const close = (result) => {
          cleanup();
          restoreFocus();
          resolve(result);
        };

        const handleCancel = (event) => {
          event.preventDefault();
          close(false);
        };

        const handleConfirm = (event) => {
          event.preventDefault();
          close(true);
        };

        const handleOverlayClick = (event) => {
          if (event.target === skipConfirmOverlay) {
            close(false);
          }
        };

        const handleKeydown = (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            close(false);
          }
        };

        skipConfirmOverlay.removeAttribute("hidden");
        skipConfirmOverlay.setAttribute("aria-hidden", "false");
        skipConfirmOverlay.dataset.open = "true";
        skipConfirmCancel.addEventListener("click", handleCancel);
        skipConfirmConfirm.addEventListener("click", handleConfirm);
        skipConfirmOverlay.addEventListener("click", handleOverlayClick);
        document.addEventListener("keydown", handleKeydown);

        requestAnimationFrame(() => {
          skipConfirmConfirm.focus({ preventScroll: true });
        });
      });
    }

    async function requestNotificationPermission() {
      if (!SUPPORTS_NOTIFICATIONS) {
        return;
      }

      if (Notification.permission === "granted") {
        updateNotificationState("granted");
        return;
      }

      try {
        const result = await Notification.requestPermission();
        updateNotificationState(result);
        if (result !== "granted") {
          window.alert(
            "Tarayıcı bildirimlerine izin vermediğiniz için eşleşme ve yeni mesaj bildirimleri gönderilemeyecek."
          );
        }
      } catch (error) {
        // İzin isteme başarısız olursa sessizce devam et.
      }
    }

    function triggerChatNotification(title, body) {
      if (!SUPPORTS_NOTIFICATIONS) {
        return;
      }

      if (Notification.permission !== "granted") {
        notificationsEnabled = false;
        return;
      }

      if (!notificationsEnabled || document.visibilityState !== "hidden") {
        return;
      }

      try {
        const notification = new Notification(title, { body });
        notification.onclick = () => {
          window.focus();
        };
      } catch (error) {
        // Bildirim oluşturulamazsa sessizce devam et.
      }
    }

    function ensureAudioContext() {
      if (audioContext) {
        return audioContext;
      }
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        return null;
      }
      audioContext = new Ctx();
      return audioContext;
    }

    function playMatchSound() {
      const ctx = ensureAudioContext();
      if (!ctx) {
        return;
      }

      if (ctx.state === "suspended") {
        ctx.resume().catch(() => {});
      }

      const duration = 0.2;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = "sine";
      oscillator.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      oscillator.connect(gain).connect(ctx.destination);
      oscillator.start();
      oscillator.stop(ctx.currentTime + duration + 0.02);
    }

    function sanitizeNickname(value) {
      return value.replace(/\s+/g, " ").trim();
    }

    function showNicknameOverlay() {
      nicknameOverlay.hidden = false;
      nicknameOverlay.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => nicknameInput.focus());
    }

    function hideNicknameOverlay() {
      nicknameOverlay.hidden = true;
      nicknameOverlay.setAttribute("aria-hidden", "true");
    }

    function clearCooldown() {
      if (cooldownTimer) {
        clearTimeout(cooldownTimer);
        cooldownTimer = null;
      }
      isCoolingDown = false;
    }

    function startCooldown() {
      clearCooldown();
      isCoolingDown = true;
      updateControls();
      cooldownTimer = setTimeout(() => {
        isCoolingDown = false;
        cooldownTimer = null;
        updateControls();
      }, 2000);
    }

    function updateControls() {
      const hasMessage = Boolean(msg.value.trim());
      msg.disabled = !isMatched;
      sendBtn.disabled = !isMatched || !hasMessage || isCoolingDown;
      nextBtn.disabled = !isMatched || isSearchCountdownActive;
    }

    function setMatchedState(state) {
      isMatched = state;
      if (!state) {
        clearCooldown();
      } else {
        hideWaitingStatus();
      }
      updateControls();
    }

    function createMessageElement(txt, type, prefixText) {
      const bubble = document.createElement("div");
      bubble.classList.add("message", `message--${type}`);

      if (type === "stranger" || type === "me") {
        if (prefixText) {
          const prefix = document.createElement("span");
          prefix.className = "message__prefix";
          prefix.textContent = `${prefixText}:`;
          bubble.appendChild(prefix);
        }

        const content = document.createElement("span");
        content.className = "message__text";
        content.textContent = txt;
        bubble.appendChild(content);
      } else {
        bubble.textContent = txt;
      }

      return bubble;
    }

    function appendMessage(txt, type = "system", prefixText) {
      const bubble = createMessageElement(txt, type, prefixText);
      log.appendChild(bubble);
      log.scrollTop = log.scrollHeight;
      return bubble;
    }

    function resetChat(statusText) {
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      hideWaitingStatus();
      updateControls();
      if (statusText) {
        appendMessage(statusText, "system");
      }
    }

    function beginMatchSearch(arg) {
      const options =
        arg && typeof arg === "object"
          ? arg
          : { messagePrefix: typeof arg === "string" ? arg : MATCH_SEARCH_TEXT };

      const countdownSeconds =
        typeof options.countdownSeconds === "number"
          ? options.countdownSeconds
          : MATCH_SEARCH_COUNTDOWN_SECONDS;
      const messagePrefix = options.messagePrefix || MATCH_SEARCH_TEXT;
      const finalText = options.finalText || WAITING_STATUS_TEXT;
      const onCountdownFinished = options.onCountdownFinished;
      const countdownFormatter = options.countdownFormatter;

      hideWaitingStatus();
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      setMatchedState(false);
      updateControls();
      startSearchCountdown(countdownSeconds, {
        prefix: messagePrefix,
        finalText,
        countdownFormatter,
        onCountdownFinished,
      });
    }

    function showWaitingStatus(text) {
      setWaitingStatusText(text);
    }

    function hideWaitingStatus() {
      clearSearchCountdown();
      shouldShowMiniGameInvitation = false;
      updateMiniGameInvitationVisibility();
      if (waitingMiniGameController) {
        waitingMiniGameController.stop({ hide: true });
      }
      if (waitingStatusBubble && waitingStatusBubble.parentNode) {
        waitingStatusBubble.remove();
      }
      waitingStatusBubble = null;
      waitingStatusMessageEl = null;
      waitingStatusInviteTextEl = null;
      waitingMiniGameContainer = null;
      waitingMiniGameStartButton = null;
      waitingMiniGameController = null;
      updateControls();
    }

    function joinQueue() {
      if (!nickname || !socket.connected) {
        return;
      }
      beginMatchSearch({ countdownSeconds: MATCH_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("join");
    }

    function handleNicknameSubmit() {
      const cleaned = sanitizeNickname(nicknameInput.value).slice(0, 24);
      if (!cleaned) {
        nicknameInput.focus();
        return;
      }

      nickname = cleaned;
      nicknameInput.value = cleaned;
      sessionStorage.setItem("nickname", nickname);
      hideNicknameOverlay();
      requestNotificationPermission();
      joinQueue();
    }

    const storedNickname = sessionStorage.getItem("nickname");
    if (storedNickname) {
      const cleanedStored = sanitizeNickname(storedNickname).slice(0, 24);
      if (cleanedStored) {
        nickname = cleanedStored;
        sessionStorage.setItem("nickname", nickname);
        hideNicknameOverlay();
      } else {
        sessionStorage.removeItem("nickname");
        showNicknameOverlay();
      }
    } else {
      showNicknameOverlay();
    }

    updateControls();
    setupNotificationPermissionWatcher();

    socket.on("connect", () => {
      setMatchedState(false);
      if (nickname) {
        joinQueue();
      } else {
        resetChat("Sohbete katılmak için bir rumuz seç.");
        showNicknameOverlay();
      }
    });

    socket.on("matched", () => {
      resetChat("✓ Bir yabancı ile eşleştiniz!");
      setMatchedState(true);
      playMatchSound();
      triggerChatNotification("Yeni eşleşme!", "Bir yabancı ile eşleştiniz.");
      if (!isCoolingDown) {
        msg.focus();
      }
    });

    socket.on("waitingStatus", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? payload
          : { active: Boolean(payload), message: MATCH_SEARCH_TEXT };
      if (data.active) {
        clearSearchCountdown();
        showWaitingStatus((data.message || WAITING_STATUS_TEXT).toString());
      } else {
        if (!isSearchCountdownActive) {
          hideWaitingStatus();
        }
      }
    });

    socket.on("message", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? {
              text: (payload.text ?? "").toString(),
              nickname: (payload.nickname ?? "").toString(),
            }
          : { text: (payload ?? "").toString(), nickname: "" };

      const senderName = sanitizeNickname(data.nickname).slice(0, 50) || "Yabancı";
      appendMessage(data.text, "stranger", senderName);
      if (data.text) {
        const previewText = data.text.length > 120 ? `${data.text.slice(0, 117)}...` : data.text;
        triggerChatNotification("Yeni mesaj", `${senderName}: ${previewText}`);
      }
    });

    socket.on("ended", () => {
      const endedStatusText = "Bağlantı sonlandı. Yeni eşleşme bekleniyor…";
      beginMatchSearch({
        countdownSeconds: MATCH_SEARCH_COUNTDOWN_SECONDS,
        messagePrefix: MATCH_SEARCH_TEXT,
        onCountdownFinished: () => {
          if (nickname) {
            socket.emit("join");
          }
        },
      });
      appendMessage(endedStatusText, "system");
    });

    socket.on("disconnect", () => {
      setMatchedState(false);
    });

    sendBtn.onclick = () => {
      if (!isMatched || !nickname || !msg.value.trim() || isCoolingDown) return;

      const messageText = msg.value.trim().slice(0, 2000);
      socket.emit("message", { text: messageText, nickname });
      appendMessage(messageText, "me", nickname);
      msg.value = "";
      startCooldown();
      updateControls();
      msg.focus();
    };

    nextBtn.onclick = async () => {
      if (!isMatched || isSearchCountdownActive) {
        return;
      }

      const shouldSkip = await openSkipConfirmModal();

      if (!shouldSkip) {
        return;
      }

      setMatchedState(false);
      beginMatchSearch({ countdownSeconds: SKIP_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("next");
    };

    msg.addEventListener("input", updateControls);
    msg.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendBtn.click();
        }
      }
    });

    nicknameSubmit.addEventListener("click", handleNicknameSubmit);
    nicknameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleNicknameSubmit();
      }
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/assets/sw.js", { scope: "/" })
          .catch((error) => {
            console.error("Service worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
