  <style>
    :root {
      --bg-body: #f4f7f1;
      --bg-panel: #ffffff;
      --border-soft: #d6e4d4;
      --accent: #2f7b45;
      --accent-strong: #216238;
      --bubble-me: #ffffff;
      --bubble-stranger: #e6f5e8;
      --bubble-border: #c6dac5;
      --text-primary: #1f3324;
      --text-muted: #5f6f60;
      --system-bg: #eef4ec;
      --shadow-soft: 0 32px 62px -40px rgba(34, 72, 41, 0.55);
      --radius-lg: 28px;
      --radius-md: 20px;
      --controls-offset: 0px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(196, 219, 196, 0.55), transparent 55%) var(--bg-body);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
    }

    .app-shell {
      width: min(520px, 100%);
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 64px);
      max-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    [hidden] {
      display: none !important;
    }

    .nickname-overlay {
      position: absolute;
      inset: 0;
      background: rgba(244, 247, 241, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 3;
      backdrop-filter: blur(6px);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: rgba(20, 34, 24, 0.45);
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .modal-overlay[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    .call-request-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: rgba(18, 34, 24, 0.35);
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .call-request-overlay[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    .call-request-overlay__card {
      width: min(400px, 80vw);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 32px 60px -34px rgba(33, 64, 41, 0.55);
      padding: 26px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transform: translateY(12px);
      opacity: 0;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .call-request-overlay[data-open="true"] .call-request-overlay__card {
      transform: translateY(0);
      opacity: 1;
    }

    .call-request-overlay__title {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--accent-strong);
    }

    .call-request-overlay__text {
      margin: 0;
      font-size: 15px;
      color: var(--text-muted);
    }

    .call-request-overlay__countdown {
      margin: -6px 0 0;
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
    }

    .call-request-overlay__actions {
      display: none;
      gap: 12px;
      justify-content: center;
    }

    .call-request-overlay[data-mode="outgoing"] #call-request-actions-outgoing {
      display: flex;
    }

    .call-request-overlay[data-mode="incoming"] #call-request-actions-incoming {
      display: flex;
    }

    .call-request-button {
      flex: 1;
      min-height: 46px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .call-request-button:focus-visible {
      outline: 3px solid rgba(33, 98, 56, 0.2);
      outline-offset: 2px;
    }

    .call-request-button--accept {
      background: #45a263;
      color: #ffffff;
      box-shadow: 0 20px 44px -28px rgba(69, 162, 99, 0.6);
    }

    .call-request-button--accept:hover,
    .call-request-button--accept:focus-visible {
      background: #3c8e56;
      transform: translateY(-1px);
    }

    .call-request-button--danger {
      background: #f55b5b;
      color: #ffffff;
      box-shadow: 0 18px 40px -30px rgba(245, 91, 91, 0.6);
    }

    .call-request-button--danger:hover,
    .call-request-button--danger:focus-visible {
      background: #e04c4c;
      transform: translateY(-1px);
    }

    .voice-call-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: rgba(12, 26, 18, 0.55);
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      backdrop-filter: blur(6px);
    }

    .voice-call-overlay[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    .voice-call-overlay__panel {
      background: #ffffff;
      border-radius: 28px;
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 28px 26px 32px;
      box-shadow: 0 32px 68px -38px rgba(30, 64, 38, 0.55);
      transform: translateY(18px);
      opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .voice-call-overlay[data-open="true"] .voice-call-overlay__panel {
      transform: translateY(0);
      opacity: 1;
    }

    .voice-call-overlay__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .voice-call-overlay__title {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .voice-call-overlay__close {
      width: 44px;
      height: 44px;
      min-height: 0;
      padding: 0;
      border-radius: 50%;
      background: #eff7ee;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .voice-call-overlay__close svg {
      width: 18px;
      height: 18px;
    }

    .voice-call-overlay__close:hover,
    .voice-call-overlay__close:focus-visible {
      background: #e6f3e5;
      transform: translateY(-1px);
    }

    .voice-call-overlay__status {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      background: #f5faf4;
      border-radius: 16px;
      border: 1px solid rgba(47, 123, 69, 0.18);
      padding: 12px 16px;
    }

    .voice-call-overlay__status[data-state="connected"] {
      color: var(--accent-strong);
      background: #e9f7ec;
      border-color: rgba(47, 123, 69, 0.24);
    }

    .voice-call-overlay__status[data-state="permission"] {
      color: #c13c3c;
      background: #fff4f4;
      border-color: rgba(193, 60, 60, 0.28);
    }

    .voice-call-overlay__status[data-state="ended"] {
      color: #c13c3c;
      background: #fff2f2;
      border-color: rgba(193, 60, 60, 0.28);
    }

    .voice-call-overlay__permission {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      background: #fff1f1;
      border: 1px solid rgba(209, 68, 68, 0.26);
      color: #c13c3c;
      border-radius: 16px;
      padding: 12px 16px;
    }

    .voice-call-overlay__permission button {
      min-height: 0;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 999px;
      background: #f55b5b;
      color: #ffffff;
      box-shadow: none;
    }

    .voice-call-overlay__permission button:hover,
    .voice-call-overlay__permission button:focus-visible {
      background: #e04c4c;
      transform: translateY(-1px);
    }

    .voice-call-overlay__levels {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .voice-call-level {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f7fbf6 0%, #eef6ef 100%);
      border: 1px solid rgba(47, 123, 69, 0.14);
    }

    .voice-call-level__label {
      font-weight: 600;
      font-size: 15px;
      color: var(--accent-strong);
      min-width: 80px;
    }

    .voice-call-level__visual {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .voice-call-level__bar {
      position: relative;
      flex: 1;
      height: 10px;
      background: rgba(47, 123, 69, 0.18);
      border-radius: 999px;
      overflow: hidden;
    }

    .voice-call-level__fill {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #2f7b45, #64b774);
      transform-origin: left center;
      transform: scaleX(var(--level, 0));
      transition: transform 120ms ease-out;
    }

    .voice-call-remote-pulse {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .voice-call-remote-pulse span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(33, 98, 56, var(--pulse-alpha, 0.25));
      transform: scale(calc(1 + var(--pulse-intensity, 0) * 0.7));
      opacity: calc(0.45 + var(--pulse-intensity, 0) * 0.55);
      transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
    }

    .voice-call-remote-pulse span:nth-child(2) {
      transition-delay: 30ms;
    }

    .voice-call-remote-pulse span:nth-child(3) {
      transition-delay: 60ms;
    }

    .voice-call-overlay__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .voice-call-action {
      flex: 1 1 calc(50% - 6px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      min-height: 52px;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease;
    }

    .voice-call-action__icon svg {
      width: 20px;
      height: 20px;
    }

    .voice-call-action--mute {
      background: #eff7ee;
      color: var(--accent);
      box-shadow: 0 18px 34px -30px rgba(34, 72, 41, 0.6);
    }

    .voice-call-action--mute .icon--mic-off {
      display: none;
    }

    .voice-call-action--mute[data-muted="true"] .icon--mic-on {
      display: none;
    }

    .voice-call-action--mute[data-muted="true"] .icon--mic-off {
      display: block;
    }

    .voice-call-action--mute:not(:disabled):hover,
    .voice-call-action--mute:not(:disabled):focus-visible {
      background: #e6f3e5;
      transform: translateY(-1px);
    }

    .voice-call-action--mute[data-muted="true"] {
      background: rgba(255, 236, 236, 0.95);
      color: #c13c3c;
      box-shadow: none;
    }

    .voice-call-action--mute[data-muted="true"]:hover,
    .voice-call-action--mute[data-muted="true"]:focus-visible {
      background: rgba(255, 224, 224, 0.95);
      transform: translateY(-1px);
    }

    .voice-call-action--end {
      background: #f55b5b;
      color: #ffffff;
      box-shadow: 0 20px 44px -30px rgba(245, 91, 91, 0.65);
    }

    .voice-call-action--end:hover,
    .voice-call-action--end:focus-visible {
      background: #e04c4c;
      transform: translateY(-1px);
    }

    .voice-call-action:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .confirm-modal {
      background: #ffffff;
      border-radius: var(--radius-md);
      box-shadow: 0 28px 60px -32px rgba(34, 72, 41, 0.45);
      padding: 28px 26px 24px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .confirm-modal p {
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text-primary);
      font-weight: 500;
    }

    .confirm-modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .confirm-modal button {
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .confirm-modal button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.2);
    }

    .confirm-cancel {
      background: #f5faf4;
      color: var(--accent);
      border-color: rgba(47, 123, 69, 0.18);
    }

    .confirm-cancel:hover,
    .confirm-cancel:focus-visible {
      background: #ebf6ea;
      transform: translateY(-1px);
    }

    .confirm-accept {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    .confirm-accept:hover,
    .confirm-accept:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    @media (min-width: 480px) {
      .confirm-modal-actions {
        flex-direction: row;
      }

      .confirm-modal-actions button {
        flex: 1;
      }
    }

    .nickname-modal {
      background: #ffffff;
      border-radius: var(--radius-md);
      box-shadow: 0 28px 60px -32px rgba(34, 72, 41, 0.45);
      padding: 28px 26px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .nickname-modal__logo {
      width: 160px;
      max-width: 70%;
      height: auto;
      margin: -6px auto 10px;
      display: block;
    }

    .nickname-modal h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .nickname-modal p {
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .nickname-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }

    .nickname-form input {
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      background: #f7fbf6;
      letter-spacing: 0.08em;
    }

    .nickname-form input:focus {
      outline: none;
      border-color: rgba(47, 123, 69, 0.45);
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.18);
    }

    .nickname-form__helper {
      margin: 0;
      font-size: 13px;
      color: var(--accent-strong);
      min-height: 18px;
    }

    .nickname-form button {
      background: var(--accent);
      color: #ffffff;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, opacity 180ms ease;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    .nickname-form button[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .nickname-form button:hover:not([disabled]),
    .nickname-form button:focus-visible:not([disabled]) {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    header {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 8px 20px;
      min-height: 48px;
      background: linear-gradient(180deg, #f3faf4 0%, #e5f2e8 100%);
      border-bottom: 1px solid rgba(46, 125, 82, 0.14);
      box-shadow: 0 18px 42px -28px rgba(46, 125, 82, 0.55);
    }

    .nickname-overlay-open .app-header {
      display: none;
    }

    .app-header__container {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(48px, 12vw, 64px) minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 56px;
    }

    .app-header__nickname {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: min(42vw, 200px);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-header__avatar {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(46, 125, 82, 0.18);
      background: #ffffff;
      object-fit: cover;
    }

    .app-header__logo {
      justify-self: center;
      width: clamp(48px, 12vw, 64px);
      height: clamp(48px, 12vw, 64px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-header__logo img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: contain;
    }

    .app-header__actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header__action {
      width: 44px;
      height: 44px;
      min-height: 0;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(46, 125, 82, 0.12);
      background: #ffffff;
      color: #2e7d52;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px -20px rgba(46, 125, 82, 0.35);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .app-header__action-icon {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
    }

    .app-header__action svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .app-header__action-label {
      display: none;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: var(--accent);
    }

    .app-header__action[data-countdown="true"] .app-header__action-icon {
      display: none;
    }

    .app-header__action[data-countdown="true"] .app-header__action-label {
      display: inline;
    }

    .app-header__action:hover,
    .app-header__action:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px -18px rgba(46, 125, 82, 0.45);
      background: #f8fcf9;
    }

    .app-header__action:focus-visible {
      outline: 3px solid rgba(46, 125, 82, 0.38);
      outline-offset: 2px;
    }

    .app-header__action:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: 0 4px 12px -10px rgba(46, 125, 82, 0.4);
      transform: none;
      background: #f2f7f3;

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const callBtn = document.getElementById("header-call");
    const callBtnIcon = callBtn ? callBtn.querySelector(".app-header__action-icon") : null;
    const callBtnLabel = callBtn ? callBtn.querySelector(".app-header__action-label") : null;

    if (controls) {

        controlsObserver.observe(controls);

    }

    if (headerEl) {
      updateHeaderOffset();

      if ("ResizeObserver" in window) {
        const headerObserver = new ResizeObserver(() => updateHeaderOffset());
        headerObserver.observe(headerEl);

      window.addEventListener("resize", updateHeaderOffset);
    }

    const voiceCallOverlay = document.getElementById("voice-call-overlay");
    const voiceCallStatus = document.getElementById("voice-call-status");
    const voiceCallPermissionNotice = document.getElementById("voice-call-permission");

    const voiceCallCloseBtn = document.getElementById("voice-call-close");

    const nicknameOverlay = document.getElementById("nickname-overlay");
