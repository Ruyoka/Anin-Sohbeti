<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ekşi Anın Sohbeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --wa-teal-dark: #054c44;
      --wa-teal: #075e54;
      --wa-teal-light: #128c7e;
      --wa-lime: #25d366;
      --wa-outgoing: #d9fdd3;
      --wa-incoming: #ffffff;
      --wa-system: rgba(4, 133, 113, 0.16);
      --wa-text: #1d2825;
      --wa-muted: #6a7c75;
      --wa-border: rgba(7, 94, 84, 0.16);
      --wa-border-strong: rgba(7, 94, 84, 0.35);
      --wa-panel: rgba(255, 255, 255, 0.95);
      --wa-panel-strong: rgba(255, 255, 255, 0.98);
      --wa-bg: #efeae2;
      --wa-shadow: 0 24px 60px -32px rgba(7, 94, 84, 0.45);
      --radius-lg: 26px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --transition-fast: 180ms ease;
      --transition-medium: 240ms ease;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--wa-text);
      background: linear-gradient(160deg, rgba(7, 94, 84, 0.16) 0%, rgba(7, 94, 84, 0.05) 26%, rgba(239, 234, 226, 1) 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(1200px at 20% 10%, rgba(7, 94, 84, 0.15), transparent 58%),
                  radial-gradient(800px at 80% 12%, rgba(18, 140, 126, 0.18), transparent 60%);
      opacity: 0.85;
      z-index: -1;
    }

    .app-shell {
      width: min(1040px, 100%);
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex: 1;
    }

    header {
      text-align: center;
      color: var(--wa-text);
    }

    header h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 46px);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--wa-muted);
      font-size: clamp(16px, 2.2vw, 18px);
      line-height: 1.6;
    }

    #chat {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .chat-card {
      width: min(420px, 100%);
      background: var(--wa-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--wa-border);
      box-shadow: var(--wa-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: clamp(540px, 75vh, 760px);
      backdrop-filter: blur(16px);
    }

    .chat-header {
      background: linear-gradient(135deg, var(--wa-teal) 0%, var(--wa-teal-light) 100%);
      color: #f7fbf9;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      position: relative;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .chat-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .chat-title {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.01em;
    }

    .chat-status {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.82);
      transition: color var(--transition-medium);
    }

    .chat-status[data-state="active"] {
      color: #d9fdd3;
    }

    .chat-status[data-state="offline"] {
      color: rgba(255, 255, 255, 0.65);
    }

    .chat-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-action {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      display: grid;
      place-items: center;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.95);
    }

    .chat-window {
      flex: 1;
      background: var(--wa-panel-strong);
      position: relative;
      overflow: hidden;
    }

    .chat-window::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 0 0, rgba(7, 94, 84, 0.08) 0, rgba(7, 94, 84, 0.08) 2px, transparent 2px),
                        radial-gradient(circle at 35px 35px, rgba(7, 94, 84, 0.05) 0, rgba(7, 94, 84, 0.05) 1px, transparent 1px);
      background-size: 70px 70px;
      opacity: 0.35;
      pointer-events: none;
    }

    #log {
      position: relative;
      inset: 0;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      height: 100%;
      z-index: 1;
      scroll-behavior: smooth;
      scroll-padding-bottom: 140px;
    }

    #log::-webkit-scrollbar {
      width: 8px;
    }

    #log::-webkit-scrollbar-thumb {
      background: rgba(7, 94, 84, 0.24);
      border-radius: 999px;
    }

    #log div {
      max-width: min(82%, 320px);
      padding: 12px 16px 16px;
      border-radius: 18px 18px 18px 6px;
      box-shadow: 0 18px 40px -28px rgba(7, 94, 84, 0.65);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    #log .me {
      align-self: flex-end;
      background: var(--wa-outgoing);
      border-radius: 18px 6px 18px 18px;
      border: 1px solid rgba(37, 211, 102, 0.15);
    }

    #log .stranger {
      align-self: flex-start;
      background: var(--wa-incoming);
      border: 1px solid var(--wa-border-strong);
    }

    #log .system {
      align-self: center;
      background: var(--wa-system);
      color: var(--wa-teal);
      font-weight: 500;
      border-radius: 999px;
      padding: 10px 18px;
      border: 1px dashed rgba(7, 94, 84, 0.25);
      box-shadow: none;
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #f0f2f5;
      border-top: 1px solid rgba(7, 94, 84, 0.12);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border-radius: 999px;
      padding: 10px 18px;
      border: 1px solid rgba(7, 94, 84, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .input-wrap span {
      font-size: 18px;
      color: var(--wa-muted);
    }

    #msg {
      flex: 1;
      border: none;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--wa-text);
    }

    #msg:focus {
      outline: none;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 120px;
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 211, 102, 0.3);
      outline-offset: 2px;
    }

    #send {
      background: var(--wa-teal-light);
      color: #f4fffb;
      box-shadow: 0 22px 44px -26px rgba(7, 94, 84, 0.6);
    }

    #send:hover {
      background: #0e7d6f;
      transform: translateY(-1px);
    }

    #send:active {
      transform: translateY(1px);
      box-shadow: 0 16px 32px -24px rgba(7, 94, 84, 0.55);
    }

    #next {
      background: #ffffff;
      color: var(--wa-teal);
      border: 1px solid rgba(7, 94, 84, 0.18);
      box-shadow: 0 18px 32px -30px rgba(7, 94, 84, 0.45);
    }

    #next:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-1px);
    }

    #next:active {
      transform: translateY(1px);
    }

    @media (max-width: 960px) {
      body {
        padding: 36px 16px;
      }

      .app-shell {
        gap: 22px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
        background: var(--wa-bg);
      }

      .app-shell {
        width: 100%;
        min-height: 100dvh;
        gap: 0;
      }

      header {
        padding: calc(22px + env(safe-area-inset-top)) calc(22px + env(safe-area-inset-right)) 18px calc(22px + env(safe-area-inset-left));
        text-align: left;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 6px 30px -24px rgba(0, 0, 0, 0.32);
        border-bottom: 1px solid rgba(7, 94, 84, 0.08);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      #chat {
        flex: 1;
      }

      .chat-card {
        border-radius: 0;
        width: 100%;
        min-height: calc(100dvh - 92px);
        box-shadow: none;
        border-left: none;
        border-right: none;
      }

      .chat-header {
        padding: 14px 18px;
      }

      #log {
        padding: 20px 16px 120px;
        font-size: 16px;
      }

      #log div {
        max-width: 92%;
      }

      #controls {
        position: sticky;
        bottom: 0;
        padding: 14px calc(16px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
      }

      button {
        min-width: auto;
        padding: 12px 18px;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 26px;
      }

      header p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Ekşi Anın Sohbeti</h1>
      <p>WhatsApp benzeri sohbet arayüzüyle anlık olarak yeni kişilerle bağlantı kurun.</p>
    </header>
    <div id="chat">
      <div class="chat-card">
        <div class="chat-header">
          <div class="chat-avatar" aria-hidden="true">💬</div>
          <div class="chat-info">
            <div class="chat-title">Yabancı</div>
            <div class="chat-status" id="status" data-state="waiting">Bağlantı kuruluyor...</div>
          </div>
          <div class="chat-actions" aria-hidden="true">
            <div class="chat-action">🔇</div>
            <div class="chat-action">⋮</div>
          </div>
        </div>
        <div class="chat-window">
          <div id="log"></div>
        </div>
        <div id="controls">
          <div class="input-wrap">
            <span aria-hidden="true">😊</span>
            <input id="msg" placeholder="Mesaj yazın..." autocomplete="off" maxlength="2000">
          </div>
          <button id="send" type="button">Gönder</button>
          <button id="next" type="button">Sonraki</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" integrity="sha384-PTdLFzKuXzwhmABF7jAFGZgdOU5so6CPl0XGWxWZVCGtenMxVdZ8SwsRHaYlIY2z" crossorigin="anonymous"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const statusEl = document.getElementById("status");

    function setStatus(text, state = "waiting") {
      if (!statusEl) return;
      statusEl.textContent = text;
      statusEl.dataset.state = state;
    }

    function line(txt, cls = "system") {
      const p = document.createElement("div");
      p.textContent = txt;
      p.className = cls;
      if (cls === "system") {
        p.setAttribute("role", "status");
      }
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }

    socket.on("connect", () => {
      setStatus("Eşleşme bekleniyor...", "waiting");
      line("Eşleşme bekleniyor...");
      socket.emit("join");
    });

    socket.on("matched", () => {
      setStatus("Sohbet aktif", "active");
      line("✓ Bir yabancı ile eşleştiniz!", "system");
    });

    socket.on("message", (txt) => {
      line("Yabancı: " + txt, "stranger");
    });

    socket.on("ended", () => {
      setStatus("Yeni eşleşme aranıyor...", "waiting");
      line("— Bağlantı sonlandı.", "system");
      socket.emit("join");
    });

    document.getElementById("send").onclick = () => {
      if (!msg.value.trim()) return;
      socket.emit("message", msg.value);
      line("Sen: " + msg.value, "me");
      msg.value = "";
      msg.focus();
    };

    document.getElementById("next").onclick = () => {
      setStatus("Yeni eşleşme aranıyor...", "waiting");
      socket.emit("next");
      line("Yeni eşleşme aranıyor...", "system");
    };

    msg.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("send").click();
      }
    });
  </script>
</body>
</html>
