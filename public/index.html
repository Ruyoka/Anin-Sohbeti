<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Anın Sohbeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f7f2e7;
      --bg-gradient: radial-gradient(circle at top, rgba(234, 240, 255, 0.7), rgba(247, 242, 231, 0.9));
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --border: rgba(67, 76, 94, 0.12);
      --border-strong: rgba(67, 76, 94, 0.2);
      --accent: #3a6ea5;
      --accent-soft: rgba(58, 110, 165, 0.14);
      --accent-strong: #2f5a85;
      --secondary: #e9c46a;
      --secondary-strong: #d7a94a;
      --text-primary: #1c1f26;
      --text-muted: #6b6f7a;
      --system-bg: rgba(58, 110, 165, 0.08);
      --shadow-soft: 0 18px 40px -28px rgba(45, 55, 72, 0.6);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --transition-fast: 180ms ease;
      --transition-slow: 260ms ease;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-gradient), var(--bg-base);
      color: var(--text-primary);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 48px 24px;
      transition: background var(--transition-slow);
    }

    .app-shell {
      width: min(960px, 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      background: transparent;
      text-align: center;
      padding: 0 12px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 10px auto 0;
      color: var(--text-muted);
      font-size: clamp(15px, 1.6vw, 18px);
      max-width: 480px;
      line-height: 1.5;
    }

    #chat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-height: 560px;
    }

    .chat-window {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #log {
      position: absolute;
      inset: 0;
      padding: 20px 18px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-size: 16px;
      line-height: 1.55;
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.7) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    #log::-webkit-scrollbar {
      width: 8px;
    }

    #log::-webkit-scrollbar-thumb {
      background: rgba(58, 110, 165, 0.25);
      border-radius: 999px;
    }

    #log div {
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      max-width: min(78ch, 85%);
      box-shadow: 0 12px 30px -24px rgba(28, 31, 38, 0.8);
      word-wrap: break-word;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      backdrop-filter: blur(6px);
    }

    #log div:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px -24px rgba(28, 31, 38, 0.75);
    }

    .system {
      align-self: center;
      background: var(--system-bg);
      color: var(--text-muted);
      font-weight: 500;
      border: 1px dashed rgba(58, 110, 165, 0.2);
    }

    .me {
      align-self: flex-end;
      background: rgba(58, 110, 165, 0.18);
      color: var(--text-primary);
      border: 1px solid rgba(58, 110, 165, 0.35);
    }

    .stranger {
      align-self: flex-start;
      background: var(--surface-strong);
      border: 1px solid var(--border-strong);
    }

    #controls {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius-md) + 6px);
      padding: 12px;
      box-shadow: 0 10px 30px -24px rgba(28, 31, 38, 0.6);
    }

    #msg {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      color: var(--text-primary);
      font-size: 16px;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }

    #msg:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      background: #fff;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 120px;
    }

    button:focus-visible {
      outline: 3px solid var(--accent-soft);
      outline-offset: 2px;
    }

    #send {
      background: var(--accent);
      color: #f9fbff;
      box-shadow: 0 18px 36px -24px rgba(58, 110, 165, 0.8);
    }

    #send:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
      box-shadow: 0 20px 42px -24px rgba(47, 90, 133, 0.85);
    }

    #send:active {
      transform: translateY(1px);
      box-shadow: 0 12px 24px -18px rgba(47, 90, 133, 0.75);
    }

    #next {
      background: rgba(233, 196, 106, 0.2);
      color: #8a6a21;
      border: 1px solid rgba(233, 196, 106, 0.3);
      box-shadow: 0 18px 36px -28px rgba(138, 106, 33, 0.4);
    }

    #next:hover {
      background: rgba(233, 196, 106, 0.3);
      color: #6f5311;
      transform: translateY(-1px);
    }

    #next:active {
      transform: translateY(1px);
      background: rgba(233, 196, 106, 0.24);
    }

    @media (max-width: 960px) {
      body {
        padding: 32px 18px;
      }

      #chat {
        padding: 24px;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 0;
        background: var(--bg-base);
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        gap: 0;
        background: var(--surface-strong);
      }

      header {
        padding: 20px 20px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 4px 20px -18px rgba(28, 31, 38, 0.35);
      }

      header h1 {
        font-size: 24px;
      }

      header p {
        font-size: 14px;
        margin-top: 6px;
      }

      #chat {
        flex: 1;
        padding: 16px 16px 20px;
        border-radius: 0;
        border: none;
        box-shadow: none;
        min-height: unset;
      }

      .chat-window {
        flex: 1;
      }

      #log {
        border-radius: 18px;
        font-size: 15px;
        padding: 18px 16px 22px;
      }

      #controls {
        padding: 14px 12px;
        border-radius: 20px;
        gap: 10px;
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      header h1 {
        font-size: 22px;
      }

      #log div {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Anın Sohbeti</h1>
      <p>Anlık eşleş, sohbet et ve yeni insanlarla tanış.</p>
    </header>
    <div id="chat">
      <div class="chat-window">
        <div id="log"></div>
      </div>
      <div id="controls">
        <input id="msg" placeholder="Mesaj yaz...">
        <button id="send">Gönder</button>
        <button id="next">Sonraki</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");

    function line(txt, cls="system") {
      const p=document.createElement("div");
      p.textContent=txt;
      p.className=cls;
      log.appendChild(p);
      log.scrollTop=log.scrollHeight;
    }

    socket.on("connect", ()=>{ line("Eşleşme bekleniyor..."); socket.emit("join"); });
    socket.on("matched", ()=>{ line("✓ Bir yabancı ile eşleştiniz!", "system"); });
    socket.on("message", (txt)=>{ line("Yabancı: "+txt, "stranger"); });
    socket.on("ended", ()=>{ line("— Bağlantı sonlandı.", "system"); socket.emit("join"); });

    document.getElementById("send").onclick = ()=>{
      if(!msg.value) return;
      socket.emit("message", msg.value);
      line("Sen: "+msg.value, "me");
      msg.value="";
    };
    document.getElementById("next").onclick = ()=>{
      socket.emit("next"); line("Yeni eşleşme aranıyor...", "system");
    };
    msg.addEventListener("keydown", (e)=>{ if(e.key==="Enter") document.getElementById("send").click(); });
  </script>
</body>
</html>
