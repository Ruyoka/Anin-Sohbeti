    const nicknameHelper = document.getElementById("nickname-helper");
    const skipConfirmOverlay = document.getElementById("skip-confirm-overlay");
    const skipConfirmCancel = document.getElementById("skip-confirm-cancel");
    const skipConfirmConfirm = document.getElementById("skip-confirm-confirm");
    const callRequestOverlay = document.getElementById("call-request-overlay");
    const callRequestTitle = document.getElementById("call-request-title");
    const callRequestText = document.getElementById("call-request-text");
    const callRequestCountdown = document.getElementById("call-request-countdown");
    const callRequestCancelBtn = document.getElementById("call-request-cancel");
    const callRequestAcceptBtn = document.getElementById("call-request-accept");
    const callRequestRejectBtn = document.getElementById("call-request-reject");
    const MATCH_SEARCH_TEXT = "Yeni eşleşme aranıyor...";
    const DISCONNECT_SEARCH_MESSAGE =
      "Bağlantı sonlandı, yeni eşleşme aranıyor…";
    const WAITING_STATUS_TEXT =
      "Şu anda herkes meşgul ya da eşleşecek kişi yok. Birisi ile eşleştiğinizde size bildirim göndereceğiz :)";
    const MATCH_SEARCH_COUNTDOWN_SECONDS = 5;
    const DISCONNECT_SEARCH_COUNTDOWN_SECONDS = 3;
    const SKIP_SEARCH_COUNTDOWN_SECONDS = 5;
    const CALL_COOLDOWN_SECONDS = 15;
    const CALL_REQUEST_TIMEOUT_SECONDS = 10;
    const SUPPORTS_NOTIFICATIONS = "Notification" in window;

    let isMatched = false;
    let nickname = "";
    let isCoolingDown = false;
    let cooldownTimer = null;
    let waitingStatusBubble = null;
    let waitingStatusMessageEl = null;
    let waitingStatusInviteTextEl = null;
    let waitingMiniGameContainer = null;
    let waitingMiniGameStartButton = null;
    let waitingMiniGameController = null;
    let shouldShowMiniGameInvitation = false;
    let audioContext = null;
    let searchCountdownTimer = null;
    let searchCountdownRemaining = 0;
    let isSearchCountdownActive = false;
    let notificationsEnabled =
      SUPPORTS_NOTIFICATIONS && Notification.permission === "granted";
    let notificationPermissionWatcher = null;
    let voiceCallManager = null;
    let callRequestController = null;
    let isCallCoolingDown = false;
    let callCooldownTimer = null;
    let callCooldownRemaining = 0;

    function createWaitingMiniGame(container, startButton) {
      const GAME_DURATION_SECONDS = 60;
      const EASY_STAGE_SECONDS = 30;
      const DIFFICULT_STAGE_SECONDS = GAME_DURATION_SECONDS - EASY_STAGE_SECONDS;
      const BALLOON_COLORS = [
        "#ff6b6b",
        "#f9a34d",
        "#6ecb63",
        "#4d96ff",
        "#d96bff",
      ];
      const EASY_STAGE = {
        spawnInterval: { start: [900, 1300], end: [520, 780] },
        riseDuration: { start: [5200, 6400], end: [3600, 4600] },
        maxConcurrent: { start: 5, end: 8 },
      };
      const HARD_STAGE = {
        spawnInterval: { start: [380, 600], end: [200, 320] },
        riseDuration: { start: [2600, 3200], end: [1500, 2100] },
        maxConcurrent: { start: 8, end: 14 },
      };
      const state = {
        running: false,
        spawnTimer: null,
        countdownTimer: null,
        timeLeft: GAME_DURATION_SECONDS,
        score: 0,
        startedAt: 0,
        hasSpawned: false,
      };

      const hud = document.createElement("div");
      hud.className = "waiting-mini-game__hud";

      const scoreWrapper = document.createElement("span");
      const scoreLabel = document.createElement("span");
      scoreLabel.className = "waiting-mini-game__hud-label";
      scoreLabel.textContent = "Skor";
      const scoreValue = document.createElement("strong");
      scoreValue.className = "waiting-mini-game__hud-value";
      scoreValue.textContent = "0";
      scoreWrapper.append(scoreLabel, scoreValue);

      const timerWrapper = document.createElement("span");
      const timerLabel = document.createElement("span");
      timerLabel.className = "waiting-mini-game__hud-label";
      timerLabel.textContent = "Süre";
      const timerValue = document.createElement("strong");
      timerValue.className = "waiting-mini-game__hud-value";
      timerValue.textContent = `${GAME_DURATION_SECONDS}sn`;
      timerWrapper.append(timerLabel, timerValue);

      hud.append(scoreWrapper, timerWrapper);

      const playfield = document.createElement("div");
      playfield.className = "waiting-mini-game__playfield";

      const result = document.createElement("p");
      result.className = "waiting-mini-game__result";
      result.hidden = true;

      container.append(hud, playfield, result);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeInOut(t) {
        return t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function interpolateRange(range, t) {
        const eased = easeInOut(clamp(t, 0, 1));
        return [
          lerp(range.start[0], range.end[0], eased),
          lerp(range.start[1], range.end[1], eased),
        ];
      }

      function interpolateMaxConcurrent(range, t) {
        return Math.round(lerp(range.start, range.end, easeInOut(clamp(t, 0, 1))));
      }

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function getElapsedSeconds() {
        if (!state.startedAt) {
          return 0;
        }
        return clamp((Date.now() - state.startedAt) / 1000, 0, GAME_DURATION_SECONDS);
      }

      function getDifficultySettings(elapsedSeconds) {
        if (elapsedSeconds < EASY_STAGE_SECONDS) {
          const progress = elapsedSeconds / EASY_STAGE_SECONDS;
          return {
            spawnInterval: interpolateRange(EASY_STAGE.spawnInterval, progress),
            riseDuration: interpolateRange(EASY_STAGE.riseDuration, progress),
            maxConcurrent: interpolateMaxConcurrent(EASY_STAGE.maxConcurrent, progress),
          };
        }

        const difficultElapsed = elapsedSeconds - EASY_STAGE_SECONDS;
        const difficultProgress =
          DIFFICULT_STAGE_SECONDS > 0
            ? difficultElapsed / DIFFICULT_STAGE_SECONDS
            : 1;

        return {
          spawnInterval: interpolateRange(HARD_STAGE.spawnInterval, difficultProgress),
          riseDuration: interpolateRange(HARD_STAGE.riseDuration, difficultProgress),
          maxConcurrent: interpolateMaxConcurrent(HARD_STAGE.maxConcurrent, difficultProgress),
        };
      }

      function clearTimers() {
        if (state.spawnTimer) {
          window.clearTimeout(state.spawnTimer);
          state.spawnTimer = null;
        }
        if (state.countdownTimer) {
          window.clearInterval(state.countdownTimer);
          state.countdownTimer = null;
        }
      }

      function clearBalloons() {
        playfield
          .querySelectorAll(".waiting-mini-game__balloon")
          .forEach((node) => node.remove());
      }

      function updateHud() {
        scoreValue.textContent = state.score.toString();
        timerValue.textContent = `${Math.max(0, Math.round(state.timeLeft))}sn`;
      }

      function scheduleNextSpawn(customDelay) {
        if (!state.running) {
          return;
        }
        if (state.spawnTimer) {
          window.clearTimeout(state.spawnTimer);
        }

        const elapsed = getElapsedSeconds();
        const difficulty = getDifficultySettings(elapsed);
        let delay =
          typeof customDelay === "number"
            ? customDelay
            : randomInRange(difficulty.spawnInterval[0], difficulty.spawnInterval[1]);

        const progressRatio =
          GAME_DURATION_SECONDS > 0
            ? Math.min(elapsed / GAME_DURATION_SECONDS, 1)
            : 0;
        const spawnAcceleration = 1 - progressRatio * 0.35;
        delay *= Math.max(0.45, spawnAcceleration);

        if (!state.hasSpawned) {
          delay = Math.min(delay, 1800);
        }

        state.spawnTimer = window.setTimeout(() => {
          spawnBalloon();
        }, Math.max(120, Math.round(delay)));
      }

      function spawnBalloon() {
        if (!state.running) {
          return;
        }

        const elapsed = getElapsedSeconds();
        const difficulty = getDifficultySettings(elapsed);
        if (playfield.childElementCount >= difficulty.maxConcurrent) {
          scheduleNextSpawn(160);
          return;
        }

        const balloon = document.createElement("button");
        balloon.type = "button";
        balloon.className = "waiting-mini-game__balloon";
        const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
        balloon.style.setProperty("--balloon-color", color);
        const left = 12 + Math.random() * 76;
        balloon.style.left = `${left}%`;
        const baseDuration = randomInRange(
          difficulty.riseDuration[0],
          difficulty.riseDuration[1]
        );
        const progressRatio =
          GAME_DURATION_SECONDS > 0
            ? Math.min(elapsed / GAME_DURATION_SECONDS, 1)
            : 0;
        const accelerationMultiplier = Math.max(0.55, 1 - progressRatio * 0.35);
        const adjustedDuration = Math.max(1200, baseDuration * accelerationMultiplier);
        balloon.style.setProperty(
          "--rise-duration",
          `${Math.round(adjustedDuration)}ms`
        );

        const riseCurve =
          elapsed < EASY_STAGE_SECONDS
            ? "cubic-bezier(0.35, 0.6, 0.45, 1)"
            : "cubic-bezier(0.2, 0.82, 0.38, 1)";
        balloon.style.setProperty("--rise-curve", riseCurve);

        let removed = false;
        const removeBalloon = () => {
          if (removed) {
            return;
          }
          removed = true;
          balloon.removeEventListener("animationend", handleAnimationEnd);
          balloon.removeEventListener("click", handleClick);
          if (balloon.parentNode) {
            balloon.parentNode.removeChild(balloon);
          }
        };

        const handleAnimationEnd = () => {
          removeBalloon();
        };

        const handleClick = () => {
          if (
            !state.running ||
            balloon.classList.contains("waiting-mini-game__balloon--popped")
          ) {
            return;
          }
          balloon.classList.add("waiting-mini-game__balloon--popped");
          state.score += 1;
          updateHud();
          window.setTimeout(removeBalloon, 200);
        };

        balloon.addEventListener("animationend", handleAnimationEnd);
        balloon.addEventListener("click", handleClick);

        playfield.appendChild(balloon);
        state.hasSpawned = true;

        scheduleNextSpawn();
      }

      function finishGame() {
        if (!state.running) {
          return;
        }
        state.running = false;
        clearTimers();
        clearBalloons();
        state.timeLeft = 0;
        state.hasSpawned = false;
        updateHud();
        startButton.disabled = false;
        startButton.textContent = "Başla";
        result.hidden = false;
        result.textContent = `Süren doldu! Skorun: ${state.score}`;
      }

      function start() {
        if (state.running) {
          return;
        }

        container.dataset.active = "true";
        result.hidden = true;
        result.textContent = "";
        state.running = true;
        state.score = 0;
        state.timeLeft = GAME_DURATION_SECONDS;
        state.startedAt = Date.now();
        state.hasSpawned = false;
        clearBalloons();
        updateHud();
        startButton.disabled = true;
        startButton.textContent = "Oynanıyor...";

        scheduleNextSpawn(randomInRange(280, 900));

        if (state.countdownTimer) {
          window.clearInterval(state.countdownTimer);
        }

        state.countdownTimer = window.setInterval(() => {
          if (!state.running) {
            return;
          }
          const elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
          const nextTimeLeft = Math.max(0, GAME_DURATION_SECONDS - elapsed);
          if (nextTimeLeft !== Math.round(state.timeLeft)) {
            state.timeLeft = nextTimeLeft;
            updateHud();
          }
          if (nextTimeLeft <= 0) {
            finishGame();
          }
        }, 250);
      }

      function stop({ hide = false } = {}) {
        clearTimers();
        clearBalloons();
        state.running = false;
        state.score = 0;
        state.timeLeft = GAME_DURATION_SECONDS;
        state.startedAt = 0;
        updateHud();
        result.hidden = true;
        result.textContent = "";
        startButton.disabled = false;
        startButton.textContent = "Başla";
        if (hide) {
          container.dataset.active = "false";
        } else if (!container.dataset.active) {
          container.dataset.active = "false";
        }
      }

      updateHud();
      container.dataset.active = "false";

      return {
        start,
        stop,
        finish: finishGame,
      };
    }

    function updateMiniGameInvitationVisibility() {
      const isVisible =
        shouldShowMiniGameInvitation && !isSearchCountdownActive;

      if (waitingStatusInviteTextEl) {
        waitingStatusInviteTextEl.hidden = !isVisible;
      }

      if (waitingMiniGameStartButton) {
        waitingMiniGameStartButton.hidden = !isVisible;
      }
    }

    function ensureWaitingStatusElements() {
      if (!waitingStatusBubble || !waitingStatusBubble.isConnected) {
        waitingStatusBubble = appendMessage("", "system");
      }

      if (!waitingStatusBubble) {
        return;
      }

      waitingStatusBubble.classList.add("waiting-status");

      const hasStructure = Boolean(
        waitingStatusBubble.querySelector(".waiting-status__message")
      );

      if (!hasStructure) {
        waitingStatusBubble.textContent = "";

        waitingStatusMessageEl = document.createElement("p");
        waitingStatusMessageEl.className = "waiting-status__message";

        waitingStatusInviteTextEl = document.createElement("p");
        waitingStatusInviteTextEl.className = "waiting-status__invite-text";
        waitingStatusInviteTextEl.textContent =
          "Beklerken minik bir oyun oynasan mı acaba?";

        waitingMiniGameStartButton = document.createElement("button");
        waitingMiniGameStartButton.type = "button";
        waitingMiniGameStartButton.className = "waiting-status__start-button";
        waitingMiniGameStartButton.textContent = "Başla";

        waitingMiniGameContainer = document.createElement("div");
        waitingMiniGameContainer.className = "waiting-mini-game";
        waitingMiniGameContainer.dataset.active = "false";

        waitingStatusBubble.append(
          waitingStatusMessageEl,
          waitingStatusInviteTextEl,
          waitingMiniGameStartButton,
          waitingMiniGameContainer
        );

        waitingMiniGameController = createWaitingMiniGame(
          waitingMiniGameContainer,
          waitingMiniGameStartButton
        );

        waitingMiniGameStartButton.addEventListener("click", () => {
          if (waitingMiniGameController) {
            waitingMiniGameController.start();
          }
        });
        waitingMiniGameStartButton.dataset.gameBound = "true";
        waitingMiniGameContainer.dataset.initialized = "true";
      }

      if (!waitingStatusMessageEl) {
        waitingStatusMessageEl = waitingStatusBubble.querySelector(
          ".waiting-status__message"
        );
      }

      if (!waitingStatusInviteTextEl) {
        waitingStatusInviteTextEl = waitingStatusBubble.querySelector(
          ".waiting-status__invite-text"
        );
      }

      waitingStatusBubble.dataset.waitingStatus = "true";
      waitingStatusBubble.classList.add("waiting-status");
      updateMiniGameInvitationVisibility();
    }

    function setWaitingStatusText(text) {
      if (!text) {
        return;
      }

      ensureWaitingStatusElements();

      shouldShowMiniGameInvitation = text === WAITING_STATUS_TEXT;
      updateMiniGameInvitationVisibility();

      if (waitingStatusMessageEl) {
        waitingStatusMessageEl.textContent = text;
      }
    }

    function stopSearchCountdownTimer() {
      if (searchCountdownTimer) {
        clearInterval(searchCountdownTimer);
        searchCountdownTimer = null;
      }
    }

    function clearSearchCountdown() {
      stopSearchCountdownTimer();
      searchCountdownRemaining = 0;
      if (isSearchCountdownActive) {
        isSearchCountdownActive = false;
        updateControls();
      }
      updateMiniGameInvitationVisibility();
    }

    function startSearchCountdown(
      seconds,
      {
        prefix = MATCH_SEARCH_TEXT,
        finalText = WAITING_STATUS_TEXT,
        countdownFormatter,
        onCountdownFinished,
      } = {}
    ) {
      clearSearchCountdown();

      if (seconds <= 0) {
        setWaitingStatusText(finalText);
        return;
      }

      const formatCountdown =
        typeof countdownFormatter === "function"
          ? countdownFormatter
          : (value) => `${prefix} ${value}`;

      isSearchCountdownActive = true;
      searchCountdownRemaining = seconds;
      setWaitingStatusText(formatCountdown(searchCountdownRemaining));
      updateControls();
      updateMiniGameInvitationVisibility();

      searchCountdownTimer = window.setInterval(() => {
        searchCountdownRemaining -= 1;
        if (searchCountdownRemaining >= 0) {
          setWaitingStatusText(formatCountdown(searchCountdownRemaining));
        }

        if (searchCountdownRemaining > 0) {
          return;
        }

        stopSearchCountdownTimer();
        searchCountdownRemaining = 0;
        isSearchCountdownActive = false;
        updateControls();
        updateMiniGameInvitationVisibility();

        if (typeof onCountdownFinished === "function") {
          onCountdownFinished();
        }

        if (finalText) {
          requestAnimationFrame(() => {
            setWaitingStatusText(finalText);
          });
        }
      }, 1000);
    }

    function updateNotificationState(permissionState) {
      notificationsEnabled = permissionState === "granted";
    }

    async function setupNotificationPermissionWatcher() {
      if (!SUPPORTS_NOTIFICATIONS || !navigator.permissions?.query) {
        return;
      }

      try {
        notificationPermissionWatcher = await navigator.permissions.query({ name: "notifications" });
        updateNotificationState(notificationPermissionWatcher.state);
        notificationPermissionWatcher.onchange = () => {
          updateNotificationState(notificationPermissionWatcher.state);
        };
      } catch {
        // Tarayıcı izin sorgusunu desteklemiyorsa sessizce devam et.
      }
    }

    function openSkipConfirmModal() {
      if (!skipConfirmOverlay || !skipConfirmCancel || !skipConfirmConfirm) {
        return Promise.resolve(false);
      }

      if (skipConfirmOverlay.dataset.open === "true") {
        return Promise.resolve(false);
      }

      return new Promise((resolve) => {
        const previouslyFocused = document.activeElement;

        const restoreFocus = () => {
          if (previouslyFocused && typeof previouslyFocused.focus === "function") {
            try {
              previouslyFocused.focus({ preventScroll: true });
            } catch {
              previouslyFocused.focus();
            }
          }
        };

        const cleanup = () => {
          document.removeEventListener("keydown", handleKeydown);
          skipConfirmOverlay.removeEventListener("click", handleOverlayClick);
          skipConfirmCancel.removeEventListener("click", handleCancel);
          skipConfirmConfirm.removeEventListener("click", handleConfirm);
          delete skipConfirmOverlay.dataset.open;
          skipConfirmOverlay.setAttribute("aria-hidden", "true");
          skipConfirmOverlay.setAttribute("hidden", "");
        };

        const close = (result) => {
          cleanup();
          restoreFocus();
          resolve(result);
        };

        const handleCancel = (event) => {
          event.preventDefault();
          close(false);
        };

        const handleConfirm = (event) => {
          event.preventDefault();
          close(true);
        };

        const handleOverlayClick = (event) => {
          if (event.target === skipConfirmOverlay) {
            close(false);
          }
        };

        const handleKeydown = (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            close(false);
          }
        };

        skipConfirmOverlay.removeAttribute("hidden");
        skipConfirmOverlay.setAttribute("aria-hidden", "false");
        skipConfirmOverlay.dataset.open = "true";
        skipConfirmCancel.addEventListener("click", handleCancel);
        skipConfirmConfirm.addEventListener("click", handleConfirm);
        skipConfirmOverlay.addEventListener("click", handleOverlayClick);
        document.addEventListener("keydown", handleKeydown);

        requestAnimationFrame(() => {
          skipConfirmConfirm.focus({ preventScroll: true });
        });
      });
    }

    async function requestNotificationPermission() {
      if (!SUPPORTS_NOTIFICATIONS) {
        return;
      }

      if (Notification.permission === "granted") {
        updateNotificationState("granted");
        return;
      }

      try {
        const result = await Notification.requestPermission();
        updateNotificationState(result);
        if (result !== "granted") {
          window.alert(
            "Tarayıcı bildirimlerine izin vermediğiniz için eşleşme ve yeni mesaj bildirimleri gönderilemeyecek."
          );
        }
      } catch {
        // İzin isteme başarısız olursa sessizce devam et.
      }
    }

    function triggerChatNotification(title, body) {
      if (!SUPPORTS_NOTIFICATIONS) {
        return;
      }

      if (Notification.permission !== "granted") {
        notificationsEnabled = false;
        return;
      }

      if (!notificationsEnabled || document.visibilityState !== "hidden") {
        return;
      }

      try {
        const notification = new Notification(title, { body });
        notification.onclick = () => {
          window.focus();
        };
      } catch {
        // Bildirim oluşturulamazsa sessizce devam et.
      }
    }

    function ensureAudioContext() {
      if (audioContext) {
        return audioContext;
      }
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        return null;
      }
      audioContext = new Ctx();
      return audioContext;
    }

    function playMatchSound() {
      const ctx = ensureAudioContext();
      if (!ctx) {
        return;
      }

      if (ctx.state === "suspended") {
        ctx.resume().catch(() => {});
      }

      const duration = 0.2;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = "sine";
      oscillator.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      oscillator.connect(gain).connect(ctx.destination);
      oscillator.start();
      oscillator.stop(ctx.currentTime + duration + 0.02);
    }

    function sanitizeNickname(value) {
      if (typeof value !== "string") {
        return "";
      }

      return value
        .toLocaleUpperCase("tr-TR")
        .replace(/[^\p{L}]/gu, "");
    }

    function isNicknameValid(value) {
      return /^[\p{L}]{1,12}$/u.test(value);
    }

    function normalizeNicknameInput(preserveCaret = false) {
      if (!nicknameInput) {
        return "";
      }

      const rawValue = nicknameInput.value ?? "";
      const sanitized = sanitizeNickname(rawValue).slice(0, 12);

      if (preserveCaret) {
        const selectionStart = nicknameInput.selectionStart ?? rawValue.length;
        const caretTarget = sanitizeNickname(rawValue.slice(0, selectionStart))
          .slice(0, 12)
          .length;
        if (rawValue !== sanitized) {
          nicknameInput.value = sanitized;
        }
        if (document.activeElement === nicknameInput) {
          nicknameInput.setSelectionRange(caretTarget, caretTarget);
        }
      } else if (rawValue !== sanitized) {
        nicknameInput.value = sanitized;
      }

      return sanitized;
    }

    function updateNicknameValidity(options = {}) {
      if (!nicknameInput || !nicknameSubmit) {
        return false;
      }

      const preserveCaret = Boolean(options.preserveCaret);
      const sanitized = normalizeNicknameInput(preserveCaret);
      const valid = isNicknameValid(sanitized);
      nicknameSubmit.disabled = !valid;

      if (nicknameHelper) {
        if (valid) {
          nicknameHelper.textContent = "";
          nicknameHelper.hidden = true;
        } else {
          nicknameHelper.hidden = false;
          nicknameHelper.textContent =
            "Rumuzun 1-12 harften oluşmalı. Rakam veya sembol kullanma.";
        }
      }

      return valid;
    }

    function updateHeaderNicknameDisplay(value) {
      if (!headerNicknameEl) {
        return;
      }

      const cleaned = sanitizeNickname(value ?? "").slice(0, 12);
      const displayValue = cleaned || "Sen";
      headerNicknameEl.textContent = displayValue;
      headerNicknameEl.title = displayValue;
    }

    updateHeaderNicknameDisplay(document.body?.dataset?.nickname || "");
    updateNicknameValidity();

    function showNicknameOverlay() {
      nicknameOverlay.hidden = false;
      nicknameOverlay.setAttribute("aria-hidden", "false");
      document.body.classList.add("nickname-overlay-open");
      updateNicknameValidity({ preserveCaret: true });
      requestAnimationFrame(() => nicknameInput.focus());
    }

    function hideNicknameOverlay() {
      nicknameOverlay.hidden = true;
      nicknameOverlay.setAttribute("aria-hidden", "true");
      document.body.classList.remove("nickname-overlay-open");
    }

    function clearCooldown() {
      if (cooldownTimer) {
        clearTimeout(cooldownTimer);
        cooldownTimer = null;
      }
      isCoolingDown = false;
    }

    function updateCallButtonVisualState() {
      if (!callBtn) {
        return;
      }
      if (isCallCoolingDown) {
        const safeRemaining = Math.max(callCooldownRemaining, 0);
        if (callBtnIcon) {
          callBtnIcon.hidden = true;
        }
        if (callBtnLabel) {
          callBtnLabel.textContent = `${safeRemaining} sn`;
        }
        callBtn.dataset.countdown = "true";
        callBtn.setAttribute("aria-label", `Arama (Call) - ${safeRemaining} saniye`);
      } else {
        if (callBtnIcon) {
          callBtnIcon.hidden = false;
        }
        if (callBtnLabel) {
          callBtnLabel.textContent = "Ara";
        }
        delete callBtn.dataset.countdown;
        callBtn.setAttribute("aria-label", "Arama (Call)");
      }
    }

    function clearCallCooldown() {
      if (callCooldownTimer) {
        clearInterval(callCooldownTimer);
        callCooldownTimer = null;
      }
      isCallCoolingDown = false;
      callCooldownRemaining = 0;
      updateCallButtonVisualState();
    }

    function startCallCooldown({ reset = true } = {}) {
      if (!callBtn) {
        return;
      }
      if (!reset && isCallCoolingDown) {
        return;
      }
      if (callCooldownTimer) {
        clearInterval(callCooldownTimer);
        callCooldownTimer = null;
      }
      isCallCoolingDown = true;
      callCooldownRemaining = CALL_COOLDOWN_SECONDS;
      updateCallButtonVisualState();
      callCooldownTimer = setInterval(() => {
        callCooldownRemaining -= 1;
        if (callCooldownRemaining <= 0) {
          clearCallCooldown();
          updateControls();
        } else {
          updateCallButtonVisualState();
        }
      }, 1000);
      updateControls();
    }

    function startCooldown() {
      clearCooldown();
      isCoolingDown = true;
      updateControls();
      cooldownTimer = setTimeout(() => {
        isCoolingDown = false;
        cooldownTimer = null;
        updateControls();
      }, 2000);
    }

    function updateControls() {
      const hasMessage = Boolean(msg.value.trim());
      msg.disabled = !isMatched;
      sendBtn.disabled = !isMatched || !hasMessage || isCoolingDown;
      const isNextDisabled = !isMatched || isSearchCountdownActive;
      if (nextBtn) {
        nextBtn.disabled = isNextDisabled;
      }

      const isCallBusy = voiceCallManager?.isBusy?.() ?? false;
      const hasActiveRequest = callRequestController?.isActive?.() ?? false;
      const isCallDisabled =
        !isMatched || isCallBusy || hasActiveRequest || isCallCoolingDown;

      if (callBtn) {
        callBtn.disabled = isCallDisabled;
        updateCallButtonVisualState();
      }
    }

    function setMatchedState(state) {
      isMatched = state;
      if (!state) {
        clearCooldown();
      } else {
        hideWaitingStatus();
      }
      voiceCallManager?.handleMatchStateChange?.(state);
      callRequestController?.handleMatchStateChange?.(state);
      updateControls();
    }

    voiceCallManager = (() => {
      if (!voiceCallOverlay || !voiceCallStatus || !voiceCallMuteBtn || !voiceCallEndBtn) {
        return {
          startOutgoingCall: () => {},
          handleOffer: () => {},
          handleAnswer: () => {},
          handleCandidate: () => {},
          handlePeerEnded: () => {},
          handleMatchStateChange: () => {},
          handleDisconnect: () => {},
          isBusy: () => false,
        };
      }

      const remotePulseDots = Array.from(
        voiceCallRemotePulse ? voiceCallRemotePulse.querySelectorAll("span") : []
      );
      const ICE_SERVERS = [
        { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
      ];

      let state = "idle";
      let role = null;
      let peerConnection = null;
      let localStream = null;
      let remoteStream = null;
      let hasAddedLocalTracks = false;
      let analyserContext = null;
      let localAnalyser = null;
      let remoteAnalyser = null;
      let localSource = null;
      let remoteSource = null;
      let levelAnimationFrame = null;
      let pendingRemoteCandidates = [];
      let pendingRemoteOffer = null;
      let closeTimer = null;
      let shouldNotifyPeerOnEnd = false;
      let hasSentEndSignal = false;
      let isCleaningUp = false;
      let lastIntent = null;
      let permissionDeniedActive = false;

      function overlayVisible() {
        return voiceCallOverlay?.dataset.open === "true";
      }

      function cleanupCloseTimer() {
        if (closeTimer) {
          clearTimeout(closeTimer);
          closeTimer = null;
        }
      }

      function showOverlay() {
        if (!voiceCallOverlay) {
          return;
        }
        cleanupCloseTimer();
        voiceCallOverlay.hidden = false;
        voiceCallOverlay.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => {
          voiceCallOverlay.dataset.open = "true";
        });
        updateControls();
        setTimeout(() => {
          voiceCallEndBtn?.focus({ preventScroll: true });
        }, 220);
      }

      function hideOverlay() {
        if (!voiceCallOverlay) {
          return;
        }
        cleanupCloseTimer();
        voiceCallOverlay.dataset.open = "false";
        voiceCallOverlay.setAttribute("aria-hidden", "true");
        const handleTransitionEnd = (event) => {
          if (event.target !== voiceCallOverlay) {
            return;
          }
          voiceCallOverlay.removeEventListener("transitionend", handleTransitionEnd);
          if (voiceCallOverlay.dataset.open !== "true") {
            voiceCallOverlay.hidden = true;
          }
        };
        voiceCallOverlay.addEventListener("transitionend", handleTransitionEnd);
        setTimeout(() => {
          if (voiceCallOverlay.dataset.open !== "true") {
            voiceCallOverlay.hidden = true;
          }
        }, 260);
        updateControls();
      }

      function scheduleOverlayClose(delay = 1400) {
        cleanupCloseTimer();
        closeTimer = setTimeout(() => {
          hideOverlay();
        }, delay);
      }

      function setStatus(text, stateKey = "connecting") {
        if (!voiceCallStatus) {
          return;
        }
        voiceCallStatus.textContent = text;
        voiceCallStatus.dataset.state = stateKey;
      }

      function updateLocalLevel(level) {
        voiceCallLocalLevel?.style.setProperty("--level", level.toFixed(3));
      }

      function updateRemoteLevel(level) {
        voiceCallRemotePulse?.style.setProperty("--level", level.toFixed(3));
        remotePulseDots.forEach((dot, index) => {
          const intensity = Math.min(1, level * (0.6 + index * 0.25));
          dot.style.setProperty("--pulse-intensity", intensity.toFixed(3));
          dot.style.setProperty("--pulse-alpha", (0.28 + intensity * 0.5).toFixed(3));
        });
      }

      function resetCallUi() {
        setStatus("Bağlanıyor…", "connecting");
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        updateLocalLevel(0);
        updateRemoteLevel(0);
        updateMuteState(false, { applyTracks: false });
        voiceCallMuteBtn.disabled = true;
      }

      function ensureAnalyserContext() {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          return null;
        }
        if (!analyserContext) {
          analyserContext = new AudioContextCtor();
        }
        if (analyserContext.state === "suspended") {
          analyserContext.resume().catch(() => {});
        }
        return analyserContext;
      }

      function computeLevel(analyser) {
        if (!analyser) {
          return 0;
        }
        const length = analyser.fftSize;
        const data = new Uint8Array(length);
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < length; i += 1) {
          const value = (data[i] - 128) / 128;
          sum += value * value;
        }
        const rms = Math.sqrt(sum / length);
        return Math.min(1, rms * 2.2);
      }

      function monitorLevels() {
        const localLevel = localAnalyser ? computeLevel(localAnalyser) : 0;
        const remoteLevel = remoteAnalyser ? computeLevel(remoteAnalyser) : 0;
        updateLocalLevel(localLevel);
        updateRemoteLevel(remoteLevel);
        levelAnimationFrame = requestAnimationFrame(monitorLevels);
      }

      function startLevelMonitoring() {
        if (levelAnimationFrame) {
          cancelAnimationFrame(levelAnimationFrame);
        }
        levelAnimationFrame = requestAnimationFrame(monitorLevels);
      }

      function stopLevelMonitoring() {
        if (levelAnimationFrame) {
          cancelAnimationFrame(levelAnimationFrame);
          levelAnimationFrame = null;
        }
        if (localSource) {
          try {
            localSource.disconnect();
          } catch {
            /* noop */
          }
          localSource = null;
        }
        if (remoteSource) {
          try {
            remoteSource.disconnect();
          } catch {
            /* noop */
          }
          remoteSource = null;
        }
        localAnalyser = null;
        remoteAnalyser = null;
        updateLocalLevel(0);
        updateRemoteLevel(0);
      }

      function connectLocalAnalyser(stream) {
        const context = ensureAnalyserContext();
        if (!context) {
          return;
        }
        if (localSource) {
          try {
            localSource.disconnect();
          } catch {
            /* noop */
          }
        }
        localAnalyser = context.createAnalyser();
        localAnalyser.fftSize = 512;
        localSource = context.createMediaStreamSource(stream);
        localSource.connect(localAnalyser);
        startLevelMonitoring();
      }

      function connectRemoteAnalyser(stream) {
        const context = ensureAnalyserContext();
        if (!context) {
          return;
        }
        if (remoteSource) {
          try {
            remoteSource.disconnect();
          } catch {
            /* noop */
          }
        }
        remoteAnalyser = context.createAnalyser();
        remoteAnalyser.fftSize = 512;
        remoteSource = context.createMediaStreamSource(stream);
        remoteSource.connect(remoteAnalyser);
        startLevelMonitoring();
      }

      function updateMuteState(muted, { applyTracks = true } = {}) {
        voiceCallMuteBtn.dataset.muted = muted ? "true" : "false";
        if (voiceCallMuteLabel) {
          voiceCallMuteLabel.textContent = muted ? "Sesi Aç" : "Sesi Kapat";
        }
        if (applyTracks && localStream) {
          localStream.getAudioTracks().forEach((track) => {
            track.enabled = !muted;
          });
        }
      }

      function toggleMute() {
        const nextMuted = voiceCallMuteBtn.dataset.muted !== "true";
        updateMuteState(nextMuted);
      }

      async function ensureLocalStream() {
        if (localStream) {
          return localStream;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true },
          });
          localStream = stream;
          voiceCallMuteBtn.disabled = false;
          updateMuteState(false);
          connectLocalAnalyser(stream);
          return stream;
        } catch (error) {
          handlePermissionDenied(error);
          throw error;
        }
      }

      function handlePermissionDenied(error) {
        console.error("Mikrofon izni alınamadı:", error);
        state = "permission-denied";
        permissionDeniedActive = true;
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = false;
        }
        setStatus("Mikrofon izni gerekli. Tekrar dene.", "permission");
        voiceCallMuteBtn.disabled = true;
        stopLevelMonitoring();
        updateControls();
      }

      function finalizePermissionDenied() {
        if (!permissionDeniedActive) {
          return;
        }
        permissionDeniedActive = false;
        const previousIntent = lastIntent;
        const shouldEmitEnd = socket.connected && !hasSentEndSignal;
        if (shouldEmitEnd) {
          socket.emit("voice-call:end");
          hasSentEndSignal = true;
        }
        const infoMessage =
          previousIntent === "incoming"
            ? "Mikrofon izni vermediğin için aramaya katılamadın."
            : "Mikrofon izni verilmediği için arama iptal edildi.";
        handleEnd({ notifyPeer: false, showStatus: false });
        appendMessage(infoMessage, "system");
      }

      function createPeerConnection() {
        if (peerConnection) {
          return peerConnection;
        }
        peerConnection = new RTCPeerConnection({ iceServers: ICE_SERVERS });
        peerConnection.onicecandidate = (event) => {
          if (event.candidate && socket.connected) {
            socket.emit("voice-call:candidate", { candidate: event.candidate.toJSON() });
          }
        };
        peerConnection.ontrack = (event) => {
          const [stream] = event.streams;
          if (!stream) {
            return;
          }
          remoteStream = stream;
          if (voiceCallRemoteAudio) {
            voiceCallRemoteAudio.srcObject = stream;
            voiceCallRemoteAudio.play?.().catch(() => {});
          }
          connectRemoteAnalyser(stream);
        };
        peerConnection.onconnectionstatechange = () => {
          if (!peerConnection) {
            return;
          }
          const connectionState = peerConnection.connectionState;
          if (connectionState === "connected") {
            state = "connected";
            setStatus("Görüşme başladı", "connected");
          } else if (
            (connectionState === "failed" || connectionState === "disconnected") &&
            !isCleaningUp
          ) {
            handlePeerEnded();
          }
        };
        peerConnection.oniceconnectionstatechange = () => {
          if (!peerConnection) {
            return;
          }
          const iceState = peerConnection.iceConnectionState;
          if ((iceState === "failed" || iceState === "disconnected") && !isCleaningUp) {
            handlePeerEnded();
          }
        };
        if (localStream && !hasAddedLocalTracks) {
          addLocalTracks(peerConnection, localStream);
        }
        return peerConnection;
      }

      function addLocalTracks(pc, stream) {
        if (hasAddedLocalTracks) {
          return;
        }
        stream.getAudioTracks().forEach((track) => {
          pc.addTrack(track, stream);
        });
        hasAddedLocalTracks = true;
      }

      async function flushPendingCandidates() {
        if (!peerConnection || !peerConnection.remoteDescription) {
          return;
        }
        const candidates = [...pendingRemoteCandidates];
        pendingRemoteCandidates = [];
        for (const candidateInit of candidates) {
          try {
            await peerConnection.addIceCandidate(candidateInit);
          } catch (error) {
            console.error("ICE adayı eklenemedi:", error);
          }
        }
      }

      async function startOutgoingCall({ fromRetry = false } = {}) {
        if (!isMatched) {
          return;
        }
        if (!fromRetry && state !== "idle") {
          return;
        }
        if (fromRetry && state !== "permission-denied") {
          return;
        }
        lastIntent = "outgoing";
        if (!fromRetry) {
          resetCallUi();
          showOverlay();
        } else {
          if (voiceCallPermissionNotice) {
            voiceCallPermissionNotice.hidden = true;
          }
          setStatus("Bağlanıyor…", "connecting");
        }
        state = "requesting-stream";
        try {
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          addLocalTracks(pc, stream);
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          role = "caller";
          shouldNotifyPeerOnEnd = true;
          hasSentEndSignal = false;
          state = "awaiting-answer";
          socket.emit("voice-call:offer", { sdp: offer });
        } catch (error) {
          if (state === "permission-denied") {
            finalizePermissionDenied();
            return;
          }
          console.error("Sesli arama başlatılamadı:", error);
          handleEnd({ notifyPeer: false, showStatus: true });
        }
      }

      async function beginIncomingCall() {
        if (!pendingRemoteOffer) {
          return;
        }
        state = "requesting-stream";
        try {
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          addLocalTracks(pc, stream);
          await pc.setRemoteDescription(pendingRemoteOffer);
          pendingRemoteOffer = null;
          await flushPendingCandidates();
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          role = "callee";
          state = "connecting";
          socket.emit("voice-call:answer", { sdp: answer });
        } catch (error) {
          if (state === "permission-denied") {
            finalizePermissionDenied();
            return;
          }
          console.error("Sesli arama yanıtı gönderilemedi:", error);
          handleEnd({ notifyPeer: true, showStatus: true });
        }
      }

      async function handleOffer(payload) {
        if (!payload || !payload.sdp) {
          return;
        }
        if (!isMatched) {
          socket.emit("voice-call:end");
          return;
        }
        if (overlayVisible() && state !== "permission-denied") {
          socket.emit("voice-call:end");
          return;
        }
        pendingRemoteOffer = payload.sdp;
        lastIntent = "incoming";
        shouldNotifyPeerOnEnd = true;
        hasSentEndSignal = false;
        resetCallUi();
        showOverlay();
        state = "incoming";
        await beginIncomingCall();
      }

      async function handleAnswer(payload) {
        if (!payload || !payload.sdp) {
          return;
        }
        if (!peerConnection || role !== "caller") {
          return;
        }
        try {
          await peerConnection.setRemoteDescription(payload.sdp);
          await flushPendingCandidates();
        } catch (error) {
          console.error("Sesli arama cevabı uygulanamadı:", error);
          handleEnd({ notifyPeer: false, showStatus: true });
        }
      }

      async function handleCandidate(payload) {
        if (!payload || !payload.candidate) {
          return;
        }
        if (!peerConnection || !peerConnection.remoteDescription) {
          pendingRemoteCandidates.push(payload.candidate);
          return;
        }
        try {
          await peerConnection.addIceCandidate(payload.candidate);
        } catch (error) {
          console.error("ICE adayı eklenemedi:", error);
        }
      }

      function handleRetry() {
        if (state !== "permission-denied") {
          return;
        }
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        setStatus("Bağlanıyor…", "connecting");
        if (lastIntent === "outgoing") {
          startOutgoingCall({ fromRetry: true });
        } else if (lastIntent === "incoming") {
          beginIncomingCall();
        }
      }

      function handlePeerEnded() {
        if (isCleaningUp) {
          return;
        }
        shouldNotifyPeerOnEnd = false;
        hasSentEndSignal = true;
        setStatus("Bağlantı koptu", "ended");
        teardown({ keepOverlay: true });
        scheduleOverlayClose();
      }

      function handleEnd({ notifyPeer = true, showStatus = true } = {}) {
        if (!overlayVisible() && state === "idle" && !peerConnection) {
          hideOverlay();
          return;
        }
        const permissionBlocked = state === "permission-denied";
        if (notifyPeer && shouldNotifyPeerOnEnd && !hasSentEndSignal && socket.connected) {
          socket.emit("voice-call:end");
          hasSentEndSignal = true;
        }
        if (showStatus && !permissionBlocked) {
          setStatus("Bağlantı koptu", "ended");
        }
        const keepOverlay = showStatus && !permissionBlocked;
        teardown({ keepOverlay });
        if (showStatus && !permissionBlocked) {
          scheduleOverlayClose();
        }
      }

      function teardown({ keepOverlay = false } = {}) {
        isCleaningUp = true;
        cleanupCloseTimer();
        stopLevelMonitoring();
        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }
        if (remoteStream) {
          remoteStream.getTracks().forEach((track) => track.stop());
          remoteStream = null;
        }
        if (voiceCallRemoteAudio) {
          voiceCallRemoteAudio.srcObject = null;
        }
        if (peerConnection) {
          try {
            peerConnection.close();
          } catch {
            /* noop */
          }
        }
        if (peerConnection) {
          peerConnection.onicecandidate = null;
          peerConnection.ontrack = null;
          peerConnection.onconnectionstatechange = null;
          peerConnection.oniceconnectionstatechange = null;
        }
        peerConnection = null;
        hasAddedLocalTracks = false;
        pendingRemoteCandidates = [];
        pendingRemoteOffer = null;
        updateMuteState(false, { applyTracks: false });
        voiceCallMuteBtn.disabled = true;
        if (voiceCallPermissionNotice) {
          voiceCallPermissionNotice.hidden = true;
        }
        shouldNotifyPeerOnEnd = false;
        hasSentEndSignal = false;
        role = null;
        lastIntent = null;
        state = "idle";
        permissionDeniedActive = false;
        isCleaningUp = false;
        updateControls();
        if (!keepOverlay) {
          hideOverlay();
        }
      }

      function handleMatchStateChange(isActive) {
        if (!isActive && (overlayVisible() || state !== "idle")) {
          handleEnd({ notifyPeer: true, showStatus: false });
        }
      }

      function handleDisconnect() {
        if (overlayVisible() || state !== "idle") {
          shouldNotifyPeerOnEnd = false;
          hasSentEndSignal = true;
          handleEnd({ notifyPeer: false, showStatus: false });
        }
      }

      function isBusy() {
        return overlayVisible() || state !== "idle";
      }

      voiceCallMuteBtn.addEventListener("click", () => {
        if (voiceCallMuteBtn.disabled) {
          return;
        }
        toggleMute();
      });

      voiceCallEndBtn.addEventListener("click", () => {
        const shouldShowStatus = state !== "permission-denied";
        handleEnd({ notifyPeer: true, showStatus: shouldShowStatus });
      });

      voiceCallCloseBtn?.addEventListener("click", () => {
        const shouldShowStatus = state !== "permission-denied";
        handleEnd({ notifyPeer: true, showStatus: shouldShowStatus });
      });

      voiceCallRetryBtn?.addEventListener("click", () => {
        handleRetry();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && overlayVisible()) {
          handleEnd({ notifyPeer: true, showStatus: false });
        }
      });

      return {
        startOutgoingCall,
        handleOffer,
        handleAnswer,
        handleCandidate,
        handlePeerEnded,
        handleMatchStateChange,
        handleDisconnect,
        isBusy,
      };
    })();

    callRequestOverlay?.setAttribute("aria-labelledby", "call-request-title");

    callRequestController = (() => {
      if (
        !callRequestOverlay ||
        !callRequestTitle ||
        !callRequestText ||
        !callRequestCancelBtn ||
        !callRequestAcceptBtn ||
        !callRequestRejectBtn
      ) {
        return {
          startOutgoingRequest: () => {
            startCallCooldown({ reset: true });
            socket.emit("voice-call:request");
          },
          handleIncoming: () => {
            socket.emit("voice-call:request-response", { accepted: false });
          },
          handleAccepted: () => {},
          handleRejected: (payload) => {
            if (payload?.recipientRole === "caller") {
              appendMessage("Bu kişi aramanızı reddetti.", "system");
              startCallCooldown({ reset: true });
            }
          },
          handleCancelled: () => {},
          handleError: () => {},
          handleMatchStateChange: () => {},
          handleDisconnect: () => {},
          isActive: () => false,
        };
      }

      const overlay = callRequestOverlay;
      const titleEl = callRequestTitle;
      const textEl = callRequestText;
      const countdownEl = callRequestCountdown;
      const cancelBtn = callRequestCancelBtn;
      const acceptBtn = callRequestAcceptBtn;
      const rejectBtn = callRequestRejectBtn;

      let state = "idle";
      let autoRejectTimer = null;
      let autoRejectRemaining = 0;
      let hasResponded = false;

      function isOverlayOpen() {
        return overlay.dataset.open === "true";
      }

      function openOverlay(mode) {
        overlay.dataset.mode = mode;
        overlay.hidden = false;
        overlay.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => {
          overlay.dataset.open = "true";
        });
        updateControls();
      }

      function closeOverlay() {
        overlay.dataset.open = "false";
        overlay.setAttribute("aria-hidden", "true");
        const handleTransitionEnd = (event) => {
          if (event.target !== overlay) {
            return;
          }
          overlay.removeEventListener("transitionend", handleTransitionEnd);
          if (!isOverlayOpen()) {
            overlay.hidden = true;
          }
        };
        overlay.addEventListener("transitionend", handleTransitionEnd);
        setTimeout(() => {
          if (!isOverlayOpen()) {
            overlay.hidden = true;
          }
        }, 220);
        updateControls();
      }

      function clearAutoRejectTimer() {
        if (autoRejectTimer) {
          clearInterval(autoRejectTimer);
          autoRejectTimer = null;
        }
      }

      function resetState() {
        clearAutoRejectTimer();
        hasResponded = false;
        state = "idle";
        overlay.dataset.mode = "";
        if (countdownEl) {
          countdownEl.hidden = true;
          countdownEl.textContent = "";
        }
        cancelBtn.disabled = false;
        acceptBtn.disabled = false;
        rejectBtn.disabled = false;
      }

      function closeAndResetOverlay() {
        resetState();
        closeOverlay();
      }

      function updateCountdownText() {
        if (!countdownEl) {
          return;
        }
        countdownEl.textContent = `${Math.max(autoRejectRemaining, 0)} sn içinde otomatik reddedilecek.`;
      }

      function scheduleAutoReject() {
        clearAutoRejectTimer();
        if (!countdownEl) {
          autoRejectTimer = setTimeout(() => {
            triggerAutoReject();
          }, CALL_REQUEST_TIMEOUT_SECONDS * 1000);
          return;
        }
        autoRejectRemaining = CALL_REQUEST_TIMEOUT_SECONDS;
        countdownEl.hidden = false;
        updateCountdownText();
        autoRejectTimer = setInterval(() => {
          autoRejectRemaining -= 1;
          if (autoRejectRemaining <= 0) {
            clearAutoRejectTimer();
            triggerAutoReject();
          } else {
            updateCountdownText();
          }
        }, 1000);
      }

      function sendResponse(accepted, reason) {
        if (hasResponded) {
          return;
        }
        hasResponded = true;
        clearAutoRejectTimer();
        const payload = accepted ? { accepted: true } : { accepted: false };
        if (!accepted && reason) {
          payload.reason = reason;
        }
        socket.emit("voice-call:request-response", payload);
      }

      function triggerAutoReject() {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        sendResponse(false, "timeout");
        closeAndResetOverlay();
      }

      function startOutgoingRequest() {
        if (!isMatched || state !== "idle" || voiceCallManager?.isBusy?.()) {
          return;
        }
        startCallCooldown({ reset: true });
        state = "outgoing";
        titleEl.textContent = "Arama başlatılıyor…";
        textEl.textContent = "Karşı tarafın yanıtı bekleniyor.";
        if (countdownEl) {
          countdownEl.hidden = true;
          countdownEl.textContent = "";
        }
        cancelBtn.disabled = false;
        openOverlay("outgoing");
        socket.emit("voice-call:request");
      }

      function handleIncomingRequest() {
        if (!isMatched || state !== "idle") {
          socket.emit("voice-call:request-response", { accepted: false, reason: "busy" });
          return;
        }
        if (voiceCallManager?.isBusy?.()) {
          socket.emit("voice-call:request-response", { accepted: false, reason: "busy" });
          return;
        }
        state = "incoming";
        hasResponded = false;
        titleEl.textContent = "Bu kişi sesinizi duymak istiyor.";
        textEl.textContent = "Yanıtlamak için 10 saniyen var.";
        if (countdownEl) {
          countdownEl.hidden = false;
        }
        cancelBtn.disabled = false;
        acceptBtn.disabled = false;
        rejectBtn.disabled = false;
        openOverlay("incoming");
        scheduleAutoReject();
      }

      function handleRequestAccepted() {
        if (state === "outgoing" || state === "incoming") {
          closeAndResetOverlay();
        } else {
          resetState();
        }
        updateControls();
      }

      function handleRequestRejected(payload) {
        if (state === "outgoing" || state === "incoming") {
          closeAndResetOverlay();
        } else {
          resetState();
        }
        if (payload?.recipientRole === "caller") {
          appendMessage("Bu kişi aramanızı reddetti.", "system");
          startCallCooldown({ reset: true });
        }
        updateControls();
      }

      function handleRequestCancelled() {
        if (state === "incoming" || state === "outgoing") {
          closeAndResetOverlay();
        } else {
          resetState();
          if (!isOverlayOpen()) {
            overlay.hidden = true;
            overlay.setAttribute("aria-hidden", "true");
          }
        }
        updateControls();
      }

      function handleRequestError() {
        closeAndResetOverlay();
        appendMessage("Arama başlatılamadı. Lütfen tekrar deneyin.", "system");
        updateControls();
      }

      function handleMatchStateChange(isActive) {
        if (!isActive && (state === "incoming" || state === "outgoing")) {
          closeAndResetOverlay();
        }
      }

      function handleDisconnect() {
        if (state === "incoming" || state === "outgoing") {
          closeAndResetOverlay();
        }
      }

      cancelBtn.addEventListener("click", () => {
        if (state !== "outgoing") {
          return;
        }
        cancelBtn.disabled = true;
        socket.emit("voice-call:cancel-request");
        closeAndResetOverlay();
      });

      acceptBtn.addEventListener("click", () => {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        acceptBtn.disabled = true;
        rejectBtn.disabled = true;
        sendResponse(true);
        closeAndResetOverlay();
      });

      rejectBtn.addEventListener("click", () => {
        if (state !== "incoming" || hasResponded) {
          return;
        }
        acceptBtn.disabled = true;
        rejectBtn.disabled = true;
        sendResponse(false, "declined");
        closeAndResetOverlay();
      });

      return {
        startOutgoingRequest,
        handleIncoming: handleIncomingRequest,
        handleAccepted: handleRequestAccepted,
        handleRejected: handleRequestRejected,
        handleCancelled: handleRequestCancelled,
        handleError: handleRequestError,
        handleMatchStateChange,
        handleDisconnect,
        isActive: () => state === "incoming" || state === "outgoing",
      };
    })();

    function createMessageElement(txt, type, prefixText) {
      const bubble = document.createElement("div");
      bubble.classList.add("message", `message--${type}`);

      if (type === "stranger" || type === "me") {
        if (prefixText) {
          const prefix = document.createElement("span");
          prefix.className = "message__prefix";
          prefix.textContent = `${prefixText}:`;
          bubble.appendChild(prefix);
        }

        const content = document.createElement("span");
        content.className = "message__text";
        content.textContent = txt;
        bubble.appendChild(content);
      } else {
        bubble.textContent = txt;
      }

      return bubble;
    }

    function scrollChatToBottom() {
      log.scrollTop = log.scrollHeight;

      if (!mobileViewportMatcher.matches) {
        return;
      }

      window.requestAnimationFrame(() => {
        const scrollElement = document.scrollingElement || document.documentElement;
        if (!scrollElement) {
          return;
        }
        scrollElement.scrollTop = scrollElement.scrollHeight;
      });
    }

    function appendMessage(txt, type = "system", prefixText) {
      const bubble = createMessageElement(txt, type, prefixText);
      log.appendChild(bubble);
      scrollChatToBottom();
      return bubble;
    }

    function resetChat(statusText) {
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      hideWaitingStatus();
      updateControls();
      if (statusText) {
        appendMessage(statusText, "system");
      }
    }

    function beginMatchSearch(arg) {
      const options =
        arg && typeof arg === "object"
          ? arg
          : { messagePrefix: typeof arg === "string" ? arg : MATCH_SEARCH_TEXT };

      const countdownSeconds =
        typeof options.countdownSeconds === "number"
          ? options.countdownSeconds
          : MATCH_SEARCH_COUNTDOWN_SECONDS;
      const messagePrefix = options.messagePrefix || MATCH_SEARCH_TEXT;
      const finalText = options.finalText || WAITING_STATUS_TEXT;
      const onCountdownFinished = options.onCountdownFinished;
      const countdownFormatter = options.countdownFormatter;

      hideWaitingStatus();
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      setMatchedState(false);
      updateControls();
      startSearchCountdown(countdownSeconds, {
        prefix: messagePrefix,
        finalText,
        countdownFormatter,
        onCountdownFinished,
      });
    }

    function showWaitingStatus(text) {
      setWaitingStatusText(text);
    }

    function hideWaitingStatus() {
      clearSearchCountdown();
      shouldShowMiniGameInvitation = false;
      updateMiniGameInvitationVisibility();
      if (waitingMiniGameController) {
        waitingMiniGameController.stop({ hide: true });
      }
      if (waitingStatusBubble && waitingStatusBubble.parentNode) {
        waitingStatusBubble.remove();
      }
      waitingStatusBubble = null;
      waitingStatusMessageEl = null;
      waitingStatusInviteTextEl = null;
      waitingMiniGameContainer = null;
      waitingMiniGameStartButton = null;
      waitingMiniGameController = null;
      updateControls();
    }

    function joinQueue() {
      if (!nickname || !socket.connected) {
        return;
      }
      beginMatchSearch({ countdownSeconds: MATCH_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("join", { nickname });
    }

    function handleNicknameSubmit() {
      const isValid = updateNicknameValidity();
      const cleaned = sanitizeNickname(nicknameInput.value).slice(0, 12);
      if (!isValid) {
        nicknameInput.focus();
        return;
      }

      nickname = cleaned;
      nicknameInput.value = cleaned;
      updateNicknameValidity();
      updateHeaderNicknameDisplay(nickname);
      sessionStorage.setItem("nickname", nickname);
      hideNicknameOverlay();
      requestNotificationPermission();
      joinQueue();
    }

    const storedNickname = sessionStorage.getItem("nickname");
    if (storedNickname) {
      const cleanedStored = sanitizeNickname(storedNickname).slice(0, 12);
      if (cleanedStored) {
        nickname = cleanedStored;
        sessionStorage.setItem("nickname", nickname);
        updateHeaderNicknameDisplay(nickname);
        hideNicknameOverlay();
        if (nicknameInput) {
          nicknameInput.value = nickname;
          updateNicknameValidity();
        }
      } else {
        sessionStorage.removeItem("nickname");
        updateHeaderNicknameDisplay("");
        nicknameInput.value = sanitizeNickname(storedNickname).slice(0, 12);
        updateNicknameValidity({ preserveCaret: true });
        showNicknameOverlay();
      }
    } else {
      updateHeaderNicknameDisplay("");
      nicknameInput.value = "";
      updateNicknameValidity();
      showNicknameOverlay();
    }

    updateControls();
    setupNotificationPermissionWatcher();

    socket.on("connect", () => {
      setMatchedState(false);
      if (nickname) {
        joinQueue();
      } else {
        resetChat("Sohbete katılmak için bir rumuz seç.");
        showNicknameOverlay();
      }
    });

    socket.on("matched", (payload) => {
      const partnerNickname =
        payload && typeof payload === "object"
          ? sanitizeNickname(payload.partnerNickname).slice(0, 50)
          : "";
      const displayNickname = partnerNickname || "YABANCI";
      const matchText = `${displayNickname} İLE EŞLEŞTİN`;
      resetChat(`✓ ${matchText}`);
      setMatchedState(true);
      playMatchSound();
      triggerChatNotification("Yeni eşleşme!", matchText);
      if (!isCoolingDown) {
        msg.focus();
      }
    });

    socket.on("waitingStatus", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? payload
          : { active: Boolean(payload), message: MATCH_SEARCH_TEXT };
      if (data.active) {
        clearSearchCountdown();
        showWaitingStatus((data.message || WAITING_STATUS_TEXT).toString());
      } else {
        if (!isSearchCountdownActive) {
          hideWaitingStatus();
        }
      }
    });

    socket.on("message", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? {
              text: (payload.text ?? "").toString(),
              nickname: (payload.nickname ?? "").toString(),
            }
          : { text: (payload ?? "").toString(), nickname: "" };

      const senderName = sanitizeNickname(data.nickname).slice(0, 50) || "YABANCI";
      appendMessage(data.text, "stranger", senderName);
      if (data.text) {
        const previewText = data.text.length > 120 ? `${data.text.slice(0, 117)}...` : data.text;
        triggerChatNotification("Yeni mesaj", `${senderName}: ${previewText}`);
      }
    });

    socket.on("voice-call:request:incoming", () => {
      callRequestController?.handleIncoming?.();
    });

    socket.on("voice-call:request:accepted", (payload) => {
      callRequestController?.handleAccepted?.(payload);
      if (payload?.role === "caller") {
        voiceCallManager?.startOutgoingCall?.();
      }
    });

    socket.on("voice-call:request:rejected", (payload) => {
      callRequestController?.handleRejected?.(payload);
    });

    socket.on("voice-call:request:cancelled", (payload) => {
      callRequestController?.handleCancelled?.(payload);
    });

    socket.on("voice-call:request:error", () => {
      callRequestController?.handleError?.();
    });

    socket.on("voice-call:offer", (payload) => {
      voiceCallManager?.handleOffer?.(payload);
    });

    socket.on("voice-call:answer", (payload) => {
      voiceCallManager?.handleAnswer?.(payload);
    });

    socket.on("voice-call:candidate", (payload) => {
      voiceCallManager?.handleCandidate?.(payload);
    });

    socket.on("voice-call:ended", () => {
      voiceCallManager?.handlePeerEnded?.();
    });

    socket.on("voice-call:peer-ended", () => {
      voiceCallManager?.handlePeerEnded?.();
    });

    socket.on("ended", () => {
      beginMatchSearch({
        countdownSeconds: DISCONNECT_SEARCH_COUNTDOWN_SECONDS,
        messagePrefix: DISCONNECT_SEARCH_MESSAGE,
        countdownFormatter: (remainingSeconds) => {
          const safeRemaining = Math.max(remainingSeconds, 0);
          const parts = [];
          for (let value = safeRemaining; value >= 1; value -= 1) {
            parts.push(value);
          }
          const suffix = parts.length ? ` ${parts.join(",")}` : "";
          return `${DISCONNECT_SEARCH_MESSAGE}${suffix}`;
        },
        onCountdownFinished: () => {
          if (nickname) {
            socket.emit("join", { nickname });
          }
        },
      });
    });

    socket.on("disconnect", () => {
      setMatchedState(false);
      voiceCallManager?.handleDisconnect?.();
      callRequestController?.handleDisconnect?.();
    });

    if (callBtn) {
      callBtn.addEventListener("click", () => {
        if (callBtn.disabled) {
          return;
        }
        callRequestController?.startOutgoingRequest?.();
      });
    }

    sendBtn.onclick = () => {
      if (!isMatched || !nickname || !msg.value.trim() || isCoolingDown) return;

      const messageText = msg.value.trim().slice(0, 2000);
      socket.emit("message", { text: messageText, nickname });
      appendMessage(messageText, "me", nickname);
      msg.value = "";
      startCooldown();
      updateControls();
      msg.focus();
    };

    nextBtn.onclick = async () => {
      if (!isMatched || isSearchCountdownActive) {
        return;
      }

      const shouldSkip = await openSkipConfirmModal();

      if (!shouldSkip) {
        return;
      }

      setMatchedState(false);
      beginMatchSearch({ countdownSeconds: SKIP_SEARCH_COUNTDOWN_SECONDS });
      socket.emit("next");
    };

    msg.addEventListener("input", updateControls);
    msg.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendBtn.click();
        }
      }
    });

    nicknameSubmit.addEventListener("click", handleNicknameSubmit);

    nicknameInput.addEventListener("input", () => {
      updateNicknameValidity({ preserveCaret: true });
    });

    nicknameInput.addEventListener("paste", (event) => {
      event.preventDefault();
      const pasteData =
        (event.clipboardData || window.clipboardData)?.getData("text") ?? "";
      const selectionStart = nicknameInput.selectionStart ?? nicknameInput.value.length;
      const selectionEnd = nicknameInput.selectionEnd ?? selectionStart;
      const rawValue = nicknameInput.value ?? "";
      const before = rawValue.slice(0, selectionStart);
      const after = rawValue.slice(selectionEnd);
      nicknameInput.value = `${before}${sanitizeNickname(pasteData)}${after}`;
      const caretTarget = (before + sanitizeNickname(pasteData)).length;
      nicknameInput.setSelectionRange(caretTarget, caretTarget);
      updateNicknameValidity({ preserveCaret: true });
    });

    nicknameInput.addEventListener("keydown", (event) => {
      if (!event.altKey && !event.metaKey && !event.ctrlKey && /^[0-9]$/.test(event.key)) {
        event.preventDefault();
        updateNicknameValidity({ preserveCaret: true });
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        if (!nicknameSubmit.disabled) {
          handleNicknameSubmit();
        }
      }
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/assets/sw.js", { scope: "/" })
          .catch((error) => {
            console.error("Service worker registration failed:", error);
          });
      });
    }
  </script>
</body>
