<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekşi Anın Sohbeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f4f7f1;
      --bg-panel: #ffffff;
      --border-soft: #d6e4d4;
      --accent: #2f7b45;
      --accent-strong: #216238;
      --bubble-me: #ffffff;
      --bubble-stranger: #e6f5e8;
      --bubble-border: #c6dac5;
      --text-primary: #1f3324;
      --text-muted: #5f6f60;
      --system-bg: #eef4ec;
      --shadow-soft: 0 32px 62px -40px rgba(34, 72, 41, 0.55);
      --radius-lg: 28px;
      --radius-md: 20px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(196, 219, 196, 0.55), transparent 55%) var(--bg-body);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
    }

    .app-shell {
      width: min(520px, 100%);
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 64px);
      max-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    [hidden] {
      display: none !important;
    }

    .nickname-overlay {
      position: absolute;
      inset: 0;
      background: rgba(244, 247, 241, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 3;
      backdrop-filter: blur(6px);
    }

    .nickname-modal {
      background: #ffffff;
      border-radius: var(--radius-md);
      box-shadow: 0 28px 60px -32px rgba(34, 72, 41, 0.45);
      padding: 28px 26px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .nickname-modal h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .nickname-modal p {
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .nickname-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nickname-form input {
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      background: #f7fbf6;
    }

    .nickname-form input:focus {
      outline: none;
      border-color: rgba(47, 123, 69, 0.45);
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.18);
    }

    .nickname-form button {
      background: var(--accent);
      color: #ffffff;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    .nickname-form button:hover,
    .nickname-form button:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    header {
      padding: 28px 32px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(230, 243, 228, 0.75) 0%, rgba(255, 255, 255, 0) 100%);
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      margin: 10px auto 0;
      max-width: 360px;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg-panel);
    }

    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, rgba(238, 245, 235, 0.65) 0%, rgba(255, 255, 255, 0.95) 100%);
      border-top: 1px solid var(--border-soft);
      border-bottom: 1px solid var(--border-soft);
    }

    #log {
      flex: 1;
      padding: 28px 28px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      scroll-padding-bottom: 32px;
    }

    #log::-webkit-scrollbar {
      width: 6px;
    }

    #log::-webkit-scrollbar-thumb {
      background: rgba(47, 123, 69, 0.25);
      border-radius: 999px;
    }

    .message {
      max-width: 86%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: none;
    }

    .message__prefix {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .message__text {
      font-size: 16px;
    }

    .message--me {
      align-self: flex-end;
      background: var(--bubble-me);
      border: 1px solid var(--bubble-border);
      box-shadow: 0 16px 34px -28px rgba(29, 72, 42, 0.6);
    }

    .message--stranger {
      align-self: flex-start;
      background: var(--bubble-stranger);
      border: 1px solid var(--bubble-border);
    }

    .message--system {
      align-self: center;
      background: var(--system-bg);
      color: var(--text-muted);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-flex;
      flex-direction: row;
      gap: 0;
      justify-content: center;
      text-align: center;
      max-width: 100%;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      padding: 18px 24px calc(18px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.98);
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--border-soft);
      box-shadow: 0 -18px 40px -34px rgba(34, 72, 41, 0.55);
      z-index: 1;
    }

    #msg {
      flex: 1 1 220px;
      min-width: 0;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 16px;
      background: #f7fbf6;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    #msg:focus {
      outline: none;
      border-color: rgba(47, 123, 69, 0.45);
      box-shadow: 0 0 0 3px rgba(47, 123, 69, 0.18);
    }

    button {
      min-height: 52px;
      padding: 14px 26px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    #controls button {
      flex: 0 1 132px;
      white-space: nowrap;
      min-width: 0;
    }

    #send {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 16px 34px -26px rgba(34, 72, 41, 0.7);
    }

    #send:not(:disabled):hover,
    #send:not(:disabled):focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    #next {
      background: #eff7ee;
      color: var(--accent);
      border: 1px solid var(--bubble-border);
    }

    #next:not(:disabled):hover,
    #next:not(:disabled):focus-visible {
      background: #e2f0e3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
        align-items: stretch;
        background: var(--bg-panel);
      }

      .app-shell {
        width: 100%;
        border-radius: 0;
        box-shadow: none;
        min-height: 100dvh;
        max-height: none;
      }

      header {
        padding: 24px 20px 12px;
      }

      header h1 {
        font-size: 24px;
      }

      #log {
        padding: 22px 18px 28px;
      }

      #controls {
        padding: 16px 18px calc(18px + env(safe-area-inset-bottom));
      }

    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 22px;
      }

      header p {
        font-size: 15px;
      }

      .message {
        max-width: 90%;
      }
    }

    @media (max-width: 767px) {
      #controls {
        flex-wrap: wrap;
        align-items: stretch;
      }

      #msg {
        flex: 1 1 auto;
      }

      #send {
        flex: 0 0 auto;
      }

      #next {
        flex: 1 1 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Ekşi Anın Sohbeti</h1>
      <p>Anlık eşleş, sohbet et ve yeni insanlarla tanış.</p>
    </header>
    <div class="nickname-overlay" id="nickname-overlay" role="dialog" aria-modal="true">
      <div class="nickname-modal">
        <h2>Rumuzunu seç</h2>
        <p>Sohbete katılmadan önce seni tanıyabileceğimiz bir rumuz belirle.</p>
        <div class="nickname-form">
          <input id="nickname" type="text" maxlength="24" autocomplete="off" placeholder="Örn. Pesimist">
          <button id="nickname-submit" type="button">Sohbete Başla</button>
        </div>
      </div>
    </div>
    <div id="chat">
      <div class="chat-window">
        <div id="log"></div>
      </div>
      <div id="controls">
        <input id="msg" placeholder="Mesaj yaz...">
        <button id="send">Gönder</button>
        <button id="next">Sonraki</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const nextBtn = document.getElementById("next");
    const nicknameOverlay = document.getElementById("nickname-overlay");
    const nicknameInput = document.getElementById("nickname");
    const nicknameSubmit = document.getElementById("nickname-submit");

    let isMatched = false;
    let nickname = "";
    let isCoolingDown = false;
    let cooldownTimer = null;

    function sanitizeNickname(value) {
      return value.replace(/\s+/g, " ").trim();
    }

    function showNicknameOverlay() {
      nicknameOverlay.hidden = false;
      nicknameOverlay.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => nicknameInput.focus());
    }

    function hideNicknameOverlay() {
      nicknameOverlay.hidden = true;
      nicknameOverlay.setAttribute("aria-hidden", "true");
    }

    function clearCooldown() {
      if (cooldownTimer) {
        clearTimeout(cooldownTimer);
        cooldownTimer = null;
      }
      isCoolingDown = false;
    }

    function startCooldown() {
      clearCooldown();
      isCoolingDown = true;
      updateControls();
      cooldownTimer = setTimeout(() => {
        isCoolingDown = false;
        cooldownTimer = null;
        updateControls();
      }, 2000);
    }

    function updateControls() {
      msg.disabled = !isMatched;
      sendBtn.disabled = !isMatched || !msg.value.trim() || isCoolingDown;
    }

    function setMatchedState(state) {
      isMatched = state;
      if (!state) {
        clearCooldown();
      }
      updateControls();
    }

    function createMessageElement(txt, type, prefixText) {
      const bubble = document.createElement("div");
      bubble.classList.add("message", `message--${type}`);

      if (type === "stranger" || type === "me") {
        if (prefixText) {
          const prefix = document.createElement("span");
          prefix.className = "message__prefix";
          prefix.textContent = `${prefixText}:`;
          bubble.appendChild(prefix);
        }

        const content = document.createElement("span");
        content.className = "message__text";
        content.textContent = txt;
        bubble.appendChild(content);
      } else {
        bubble.textContent = txt;
      }

      return bubble;
    }

    function appendMessage(txt, type = "system", prefixText) {
      const bubble = createMessageElement(txt, type, prefixText);
      log.appendChild(bubble);
      log.scrollTop = log.scrollHeight;
    }

    function resetChat(statusText) {
      log.replaceChildren();
      msg.value = "";
      clearCooldown();
      updateControls();
      if (statusText) {
        appendMessage(statusText, "system");
      }
    }

    function joinQueue() {
      if (!nickname || !socket.connected) {
        return;
      }
      resetChat("Eşleşme bekleniyor...");
      socket.emit("join");
    }

    function handleNicknameSubmit() {
      const cleaned = sanitizeNickname(nicknameInput.value).slice(0, 24);
      if (!cleaned) {
        nicknameInput.focus();
        return;
      }

      nickname = cleaned;
      nicknameInput.value = cleaned;
      sessionStorage.setItem("nickname", nickname);
      hideNicknameOverlay();
      joinQueue();
    }

    const storedNickname = sessionStorage.getItem("nickname");
    if (storedNickname) {
      const cleanedStored = sanitizeNickname(storedNickname).slice(0, 24);
      if (cleanedStored) {
        nickname = cleanedStored;
        sessionStorage.setItem("nickname", nickname);
        hideNicknameOverlay();
      } else {
        sessionStorage.removeItem("nickname");
        showNicknameOverlay();
      }
    } else {
      showNicknameOverlay();
    }

    updateControls();

    socket.on("connect", () => {
      setMatchedState(false);
      if (nickname) {
        joinQueue();
      } else {
        resetChat("Sohbete katılmak için bir rumuz seç.");
        showNicknameOverlay();
      }
    });

    socket.on("matched", () => {
      resetChat("✓ Bir yabancı ile eşleştiniz!");
      setMatchedState(true);
      if (!isCoolingDown) {
        msg.focus();
      }
    });

    socket.on("message", (payload) => {
      const data =
        payload && typeof payload === "object"
          ? {
              text: (payload.text ?? "").toString(),
              nickname: (payload.nickname ?? "").toString(),
            }
          : { text: (payload ?? "").toString(), nickname: "" };

      const senderName = sanitizeNickname(data.nickname).slice(0, 50) || "Yabancı";
      appendMessage(data.text, "stranger", senderName);
    });

    socket.on("ended", () => {
      setMatchedState(false);
      resetChat("— Bağlantı sonlandı. Yeni eşleşme bekleniyor...");
      if (nickname) {
        socket.emit("join");
      }
    });

    socket.on("disconnect", () => {
      setMatchedState(false);
    });

    sendBtn.onclick = () => {
      if (!isMatched || !nickname || !msg.value.trim() || isCoolingDown) return;

      const messageText = msg.value.trim().slice(0, 2000);
      socket.emit("message", { text: messageText, nickname });
      appendMessage(messageText, "me", nickname);
      msg.value = "";
      startCooldown();
      updateControls();
      msg.focus();
    };

    nextBtn.onclick = () => {
      setMatchedState(false);
      resetChat("Yeni eşleşme aranıyor...");
      socket.emit("next");
    };

    msg.addEventListener("input", updateControls);
    msg.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        if (!sendBtn.disabled) {
          sendBtn.click();
        }
      }
    });

    nicknameSubmit.addEventListener("click", handleNicknameSubmit);
    nicknameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleNicknameSubmit();
      }
    });
  </script>
</body>
</html>
