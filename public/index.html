<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Anın Sohbeti</title>
  <style>
    body { font-family: "Arial", sans-serif; background: #f5f5f5; color: #222; margin: 0; }
    header { background: #c8e6c9; padding: 15px; text-align: center; border-bottom: 2px solid #81c784; }
    header h1 { margin: 0; font-size: 24px; color: #1b5e20; }
    #chat { width: 500px; margin: 30px auto; text-align: left; background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    #log { height: 350px; border-bottom: 1px solid #ddd; padding: 10px; overflow-y: auto; font-size: 14px; background: #fafafa; }
    #controls { display: flex; padding: 10px; }
    #msg { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-left: 8px; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; }
    #send { background: #81c784; color: #fff; }
    #next { background: #ffb74d; color: #fff; }
    .system { color: #888; font-style: italic; }
    .me { color: #1b5e20; }
    .stranger { color: #b71c1c; }
  </style>
</head>
<body>
  <header><h1>Anın Sohbeti</h1></header>
  <div id="chat">
    <div id="log"></div>
    <div id="controls">
      <input id="msg" placeholder="Mesaj yaz...">
      <button id="send">Gönder</button>
      <button id="next">Sonraki</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");

    function line(txt, cls="system") {
      const p=document.createElement("div");
      p.textContent=txt;
      p.className=cls;
      log.appendChild(p);
      log.scrollTop=log.scrollHeight;
    }

    socket.on("connect", ()=>{ line("Eşleşme bekleniyor..."); socket.emit("join"); });
    socket.on("matched", ()=>{ line("✓ Bir yabancı ile eşleştiniz!", "system"); });
    socket.on("message", (txt)=>{ line("Yabancı: "+txt, "stranger"); });
    socket.on("ended", ()=>{ line("— Bağlantı sonlandı.", "system"); socket.emit("join"); });

    document.getElementById("send").onclick = ()=>{
      if(!msg.value) return;
      socket.emit("message", msg.value);
      line("Sen: "+msg.value, "me");
      msg.value="";
    };
    document.getElementById("next").onclick = ()=>{
      socket.emit("next"); line("Yeni eşleşme aranıyor...", "system");
    };
    msg.addEventListener("keydown", (e)=>{ if(e.key==="Enter") document.getElementById("send").click(); });
  </script>
</body>
</html>
